<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRM · Drum — prototipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-0:#081320;        /* fondo profundo */
    --navy-1:#0c1d31;
    --navy-2:#13314f;
    --cream:#ece4d4;         /* serif crema */
    --cream-dim:rgba(236,228,212,.55);
    --gold:#c9a24b;          /* acento dorado */
    --line:rgba(236,228,212,.16);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--navy-0);overflow:hidden}
  body{
    font-family:"Inter",-apple-system,sans-serif;
    color:var(--cream);
    background:
      radial-gradient(120% 90% at 50% 8%, #102740 0%, var(--navy-0) 60%, #05101b 100%);
    -webkit-font-smoothing:antialiased;
    position:relative;
  }

  /* ── etiqueta superior ── */
  .topbar{
    position:fixed;top:0;left:0;right:0;z-index:30;
    display:flex;justify-content:space-between;align-items:center;
    padding:26px 40px;
    font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--cream-dim);
  }
  .topbar .brand{font-family:"Fraunces";font-style:italic;font-size:20px;letter-spacing:.04em;color:var(--cream);text-transform:none}

  /* ── palabra gigante de fondo ── */
  .ghost{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-58%);
    font-family:"Fraunces";font-weight:300;
    font-size:clamp(80px,17vw,260px);line-height:.9;letter-spacing:.02em;
    color:rgba(236,228,212,.05);white-space:nowrap;z-index:1;pointer-events:none;user-select:none;
  }

  /* ── escenario del drum ── */
  #stage{position:fixed;inset:0;z-index:10}
  #drum{display:block;width:100%;height:100%}

  /* nombre serif sobre el drum */
  .slide-name{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:12;pointer-events:none;text-align:center;width:min(90vw,1100px);
    mix-blend-mode:screen;
  }
  .slide-name .nm{
    font-family:"Fraunces";font-weight:400;font-style:italic;
    font-size:clamp(34px,5.5vw,86px);line-height:1;color:rgba(236,228,212,.92);
    text-shadow:0 8px 40px rgba(0,0,0,.5);
    transition:opacity .5s ease;
  }

  /* ── pill de control ── */
  .pill{
    position:fixed;left:50%;bottom:38px;transform:translateX(-50%);z-index:30;
    display:flex;align-items:center;gap:22px;
    padding:14px 16px 14px 14px;
    background:rgba(10,22,37,.66);
    border:1px solid var(--line);
    border-radius:100px;
    backdrop-filter:blur(18px) saturate(1.1);
    -webkit-backdrop-filter:blur(18px) saturate(1.1);
    box-shadow:0 24px 60px -20px rgba(0,0,0,.7);
    max-width:calc(100vw - 36px);
  }
  .pill-thumb{
    width:54px;height:54px;border-radius:50%;object-fit:cover;flex:none;
    border:1px solid var(--line);
  }
  .pill-meta{display:flex;flex-direction:column;gap:3px;min-width:0}
  .pill-counter{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold)}
  .pill-loc{font-size:13px;color:var(--cream-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:34vw}
  .pill-price{font-family:"Fraunces";font-size:17px;color:var(--cream)}
  .pill-price b{font-weight:500}
  .pill-price span{font-size:11px;color:var(--cream-dim);font-family:"Inter";letter-spacing:.05em}

  .pill-arrows{display:flex;gap:6px;margin-left:4px}
  .pill-arrows button{
    width:40px;height:40px;border-radius:50%;border:1px solid var(--line);
    background:transparent;color:var(--cream);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .25s,border-color .25s,transform .2s;
  }
  .pill-arrows button:hover{background:rgba(236,228,212,.08);border-color:var(--cream-dim)}
  .pill-arrows button:active{transform:scale(.92)}

  .pill-reserve{
    display:flex;align-items:center;gap:9px;
    padding:13px 22px;border-radius:100px;
    background:var(--gold);color:#1a1206;
    font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
    text-decoration:none;white-space:nowrap;flex:none;
    transition:transform .25s ease, box-shadow .25s ease, background .25s;
  }
  .pill-reserve:hover{transform:translateY(-2px);box-shadow:0 14px 30px -10px rgba(201,162,75,.6);background:#d9b15c}

  /* hint */
  .hint{
    position:fixed;left:50%;bottom:112px;transform:translateX(-50%);z-index:20;
    font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(236,228,212,.3);
    pointer-events:none;transition:opacity .6s;
  }

  /* loader */
  .ld{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
     background:var(--navy-0);transition:opacity .8s ease}
  .ld.gone{opacity:0;pointer-events:none}
  .ld .ring{width:64px;height:64px;border-radius:50%;border:1px solid var(--line);border-top-color:var(--gold);animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media (max-width:760px){
    .topbar{padding:18px 20px}
    .pill{gap:12px;padding:10px 10px 10px 10px;bottom:24px}
    .pill-loc{display:none}
    .pill-arrows{display:none}
    .pill-reserve{padding:11px 16px}
  }
  @media (prefers-reduced-motion:reduce){ .ld .ring{animation:none} }
</style>
</head>
<body>
  <div class="ld" id="ld"><div class="ring"></div></div>

  <div class="topbar">
    <div style="letter-spacing:.3em">Estancias seleccionadas</div>
    <div class="brand">vrm.</div>
  </div>

  <div class="ghost" id="ghost">Bahía</div>

  <div id="stage"><canvas id="drum"></canvas></div>

  <div class="slide-name"><div class="nm" id="slideName">Vallarta Gardens 2302</div></div>

  <div class="hint" id="hint">Arrastra · scroll · ← →</div>

  <div class="pill">
    <img class="pill-thumb" id="pThumb" alt="">
    <div class="pill-meta">
      <div class="pill-counter" id="pCounter">01 / 10</div>
      <div class="pill-loc" id="pLoc">La Cruz de Huanacaxtle</div>
    </div>
    <div class="pill-price"><b id="pPrice">$300</b> <span>USD/noche</span></div>
    <div class="pill-arrows">
      <button id="prev" aria-label="Anterior"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M15 6l-6 6 6 6"/></svg></button>
      <button id="next" aria-label="Siguiente"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>
    <a class="pill-reserve" id="pReserve" href="#">Reservar
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
  </div>

<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>

const PROPS = [
  {id:'2302', name:'Vallarta Gardens 2302', loc:'La Cruz de Huanacaxtle',          price:300, img:'https://i.imgur.com/e8ObYP6.jpeg'},
  {id:'6S',   name:'Marítima 6S',            loc:'Nuevo Vallarta · Flamingos',       price:190, img:'https://i.imgur.com/HtlrbEg.jpeg'},
  {id:'211',  name:'Bolongo 211',            loc:'Punta de Mita · Riviera Nayarit',  price:220, img:'https://a0.muscache.com/im/pictures/miso/Hosting-1023507574440292184/original/a2cbb607-d8f6-476d-b001-46d7baf3104c.jpeg?im_w=720'},
  {id:'PHN',  name:'Marítima Penthouse',     loc:'Nuevo Vallarta · Flamingos',       price:380, img:'https://i.imgur.com/xhooPKT.jpeg'},
  {id:'2403', name:'Vallarta Gardens 2403',  loc:'La Cruz de Huanacaxtle',           price:300, img:'https://i.imgur.com/RV3b2sb.jpeg'},
  {id:'L05',  name:'Bolongo L05',            loc:'Punta de Mita · Riviera Nayarit',  price:295, img:'https://a0.muscache.com/im/pictures/hosting/Hosting-U3RheVN1cHBseUxpc3Rpbmc6MTQ3MjUyODIwMjMwNTM0ODIzMw==/original/d4b94467-3074-4e98-a72c-e22aabce372b.jpeg?im_w=720'},
  {id:'G13',  name:'Bolongo G13',            loc:'Punta de Mita · Riviera Nayarit',  price:280, img:'https://i.imgur.com/ThY3A8L.jpeg'},
  {id:'9S',   name:'Marítima 9S',            loc:'Nuevo Vallarta · Flamingos',       price:215, img:'https://i.imgur.com/sgXZxMP.jpeg'},
  {id:'3N',   name:'Bolongo 3N',             loc:'Punta de Mita · Riviera Nayarit',  price:185, img:'https://a0.muscache.com/im/pictures/hosting/Hosting-1483418374242300943/original/5bdb38b9-52f2-4a2d-8e95-43b8fd972de7.jpeg?im_w=720'},
  {id:'3004', name:'Vallarta Gardens 3004',  loc:'La Cruz de Huanacaxtle',           price:250, img:'https://i.imgur.com/JV7Bscs.jpeg'},
];

const PW = 3.45, PH = 2.16;     // tamaño del panel (≈16:10)
const GAP = 0.55;               // separación
const SPACING = PW + GAP;

const canvas = document.getElementById('drum');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 100);
camera.position.set(0, 0, 5.4);

// pérdida de contexto: no crashear
canvas.addEventListener('webglcontextlost', (e)=>{ e.preventDefault(); }, false);

const VERT = `
  varying vec2 vUv;
  uniform float uCurveX;
  uniform float uCurveY;
  void main(){
    vUv = uv;
    vec3 p = position;
    float ax = uv.x - 0.5;
    float ay = uv.y - 0.5;
    p.z -= (ax*ax) * uCurveX;   // barril horizontal (bordes laterales retroceden)
    p.z -= (ay*ay) * uCurveY;   // barril vertical (arco arriba/abajo, el look de tambor)
    gl_Position = projectionMatrix * modelViewMatrix * vec4(p,1.0);
  }
`;
const FRAG = `
  precision highp float;
  varying vec2 vUv;
  uniform sampler2D uTex;
  uniform vec2  uRep;
  uniform vec2  uOff;
  uniform float uAberr;     // aberración (por velocidad)
  uniform float uOpacity;
  uniform float uReflect;   // 1 = reflejo
  uniform float uHasTex;
  void main(){
    vec2 uv = vUv * uRep + uOff;
    float a = uAberr;
    vec3 col;
    if(uHasTex > 0.5){
      float r = texture2D(uTex, uv + vec2(a, 0.0)).r;
      float g = texture2D(uTex, uv).g;
      float b = texture2D(uTex, uv - vec2(a, 0.0)).b;
      col = vec3(r,g,b);
    } else {
      col = vec3(0.06,0.13,0.22);
    }
    // vignette sutil en bordes
    float vx = smoothstep(0.0,0.18,vUv.x)*smoothstep(1.0,0.82,vUv.x);
    float vy = smoothstep(0.0,0.14,vUv.y)*smoothstep(1.0,0.86,vUv.y);
    col *= mix(0.80, 1.0, vx*vy);
    float alpha = uOpacity;
    if(uReflect > 0.5){
      // el reflejo se desvanece alejándose de la imagen (parte superior del reflejo = contacto)
      alpha *= smoothstep(0.0, 0.85, vUv.y) * 0.32;
    }
    gl_FragColor = vec4(col, alpha);
  }
`;

const geo = new THREE.PlaneGeometry(PW, PH, 60, 40);
const loader = new THREE.TextureLoader();
loader.crossOrigin = 'anonymous';
// proxy con headers CORS correctos (imgur/muscache no siempre los mandan → WebGL los rechaza)
const PX = (u) => 'https://images.weserv.nl/?url=' + encodeURIComponent(u.replace(/^https?:\/\//,'')) + '&output=jpg&q=88';

const slides = [];
let loaded = 0;

PROPS.forEach((prop, i) => {
  const mkMat = (reflect) => new THREE.ShaderMaterial({
    uniforms:{
      uTex:{value:null}, uRep:{value:new THREE.Vector2(1,1)}, uOff:{value:new THREE.Vector2(0,0)},
      uAberr:{value:0}, uOpacity:{value:1}, uReflect:{value:reflect?1:0}, uHasTex:{value:0},
      uCurveX:{value:0.55}, uCurveY:{value:1.15}
    },
    vertexShader:VERT, fragmentShader:FRAG, transparent:true, depthTest:false
  });
  const mat = mkMat(false);
  const rmat = mkMat(true);

  const mesh = new THREE.Mesh(geo, mat);
  const refl = new THREE.Mesh(geo, rmat);
  refl.scale.y = -1;
  refl.position.y = -(PH + 0.16);
  mesh.renderOrder = 2; refl.renderOrder = 1;
  scene.add(refl); scene.add(mesh);
  slides.push({ mesh, refl, mat, rmat });

  loader.load(PX(prop.img), (tex)=>{
    tex.colorSpace = THREE.SRGBColorSpace;
    const ia = tex.image.width / tex.image.height, pa = PW/PH;
    const rep = new THREE.Vector2(1,1), off = new THREE.Vector2(0,0);
    if(ia > pa){ rep.x = pa/ia; off.x = (1-rep.x)/2; }
    else { rep.y = ia/pa; off.y = (1-rep.y)/2; }
    [mat,rmat].forEach(m=>{ m.uniforms.uTex.value = tex; m.uniforms.uRep.value = rep; m.uniforms.uOff.value = off; m.uniforms.uHasTex.value = 1; });
    loaded++;
    if(loaded >= Math.min(3, PROPS.length)) hideLoader();
  }, undefined, ()=>{ loaded++; if(loaded >= Math.min(3, PROPS.length)) hideLoader(); });
});

// ── navegación / inercia ──
let current = 0, target = 0, prev = 0;
const N = PROPS.length;
const clampT = (v)=> Math.max(0, Math.min(N-1, v));

function go(d){ target = clampT(Math.round(target) + d); }

// wheel
let wheelLock = false;
window.addEventListener('wheel', (e)=>{
  e.preventDefault();
  if(wheelLock) return;
  if(Math.abs(e.deltaY) < 6 && Math.abs(e.deltaX) < 6) return;
  go((e.deltaY + e.deltaX) > 0 ? 1 : -1);
  wheelLock = true; setTimeout(()=>wheelLock=false, 260);
}, { passive:false });

// drag
let dragging=false, startX=0, startTarget=0;
const onDown=(x)=>{ dragging=true; startX=x; startTarget=target; document.getElementById('hint').style.opacity='0'; };
const onMove=(x)=>{ if(!dragging) return; const dx=(x-startX)/ (window.innerWidth*0.42); target = clampT(startTarget - dx); };
const onUp=()=>{ if(!dragging) return; dragging=false; target = clampT(Math.round(target)); };
canvas.addEventListener('pointerdown',(e)=>onDown(e.clientX));
window.addEventListener('pointermove',(e)=>onMove(e.clientX));
window.addEventListener('pointerup',onUp);
canvas.style.cursor='grab';
canvas.addEventListener('pointerdown',()=>canvas.style.cursor='grabbing');
window.addEventListener('pointerup',()=>canvas.style.cursor='grab');

// teclado + flechas
document.getElementById('next').addEventListener('click',()=>go(1));
document.getElementById('prev').addEventListener('click',()=>go(-1));
window.addEventListener('keydown',(e)=>{ if(e.key==='ArrowRight')go(1); if(e.key==='ArrowLeft')go(-1); });

// ── UI sync ──
const $name=document.getElementById('slideName'), $thumb=document.getElementById('pThumb'),
      $counter=document.getElementById('pCounter'), $loc=document.getElementById('pLoc'),
      $price=document.getElementById('pPrice'), $reserve=document.getElementById('pReserve'),
      $ghost=document.getElementById('ghost');
let lastIdx=-1;
function syncUI(idx){
  if(idx===lastIdx) return; lastIdx=idx;
  const p=PROPS[idx];
  $name.textContent=p.name;
  $thumb.src=p.img; $counter.textContent=String(idx+1).padStart(2,'0')+' / '+String(N).padStart(2,'0');
  $loc.textContent=p.loc; $price.textContent='$'+p.price;
  $reserve.href='vrm_property.html?id='+p.id;
  $ghost.textContent = p.loc.split(' · ')[0].split(' ')[0]==='La' ? 'La Cruz' : p.loc.split(' · ')[0];
}

function hideLoader(){ const l=document.getElementById('ld'); if(!l)return; l.classList.add('gone'); setTimeout(()=>l.remove(),800); }
setTimeout(hideLoader, 4000); // failsafe

// ── resize ──
function resize(){
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
  // en pantallas angostas, alejar la cámara para que quepa el panel
  camera.position.z = w < 760 ? 6.6 : 5.4;
}
window.addEventListener('resize', resize); resize();

// ── loop ──
const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
function tick(){
  current += (target - current) * (reduce ? 0.4 : 0.09);
  const vel = current - prev; prev = current;
  const aberr = Math.min(Math.abs(vel) * 0.10, 0.045);

  slides.forEach((s, i)=>{
    const x = (i - current) * SPACING;
    s.mesh.position.x = x; s.refl.position.x = x;
    const dist = Math.abs(i - current);
    const op = Math.max(0, 1 - Math.max(0, dist-0.5)*1.15);  // se desvanecen los lejanos
    s.mat.uniforms.uOpacity.value = op;
    s.rmat.uniforms.uOpacity.value = op;
    s.mat.uniforms.uAberr.value = aberr;
    s.rmat.uniforms.uAberr.value = aberr*0.6;
    const vis = dist < 1.8;
    s.mesh.visible = vis; s.refl.visible = vis;
  });

  // nombre se atenúa durante el movimiento
  $name.style.opacity = String(Math.max(0.15, 1 - Math.abs(vel)*9));

  syncUI(clampT(Math.round(current)));
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
