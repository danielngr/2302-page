<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRM — Registros Check-in</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0f10; --surface: #18181b; --surface2: #1f1f24;
    --border: #2a2a30; --accent: #e8c56a; --green: #5ae8a0;
    --red: #e86a6a; --blue: #6ab4e8; --purple: #c06ae8;
    --text: #f0f0f0; --muted: #888;
    --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 2px; }
  .header-right { display: flex; gap: 10px; align-items: center; }

  .btn-refresh {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
    font-family: var(--mono); transition: all .2s;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

  .filters {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: none; color: var(--muted); cursor: pointer; font-size: 12px;
    font-family: var(--mono); transition: all .2s;
  }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,197,106,.08); }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-num { font-size: 28px; font-weight: 600; font-family: var(--mono); color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; }

  .registros-grid { display: grid; gap: 12px; }

  .registro-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; transition: border-color .2s;
  }
  .registro-card:hover { border-color: #3a3a40; }
  .registro-card.generado { border-left: 3px solid var(--green); opacity: .7; }

  .card-header {
    padding: 14px 18px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px;
  }
  .card-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .tipo-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .card-depto { font-family: var(--mono); font-size: 14px; font-weight: 500; }
  .card-nombre { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-fechas { font-family: var(--mono); font-size: 11px; color: var(--muted); flex-shrink: 0; }

  .card-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-gen {
    padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer;
    font-size: 12px; font-family: var(--mono); font-weight: 500;
    background: var(--accent); color: #0f0f10; transition: all .2s;
  }
  .btn-gen:hover { background: #f0d070; }
  .btn-gen.done { background: rgba(90,232,160,.15); color: var(--green); border: 1px solid rgba(90,232,160,.3); }
  .btn-detail {
    padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: none; color: var(--muted); cursor: pointer; font-size: 12px;
    font-family: var(--mono); transition: all .2s;
  }
  .btn-detail:hover { border-color: var(--blue); color: var(--blue); }

  .card-detail {
    display: none; padding: 14px 18px; border-top: 1px solid var(--border);
    background: var(--surface2); font-size: 13px;
  }
  .card-detail.open { display: block; }
  .detail-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
  .detail-field { }
  .detail-label { font-size: 10px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  .detail-value { font-size: 13px; }
  .ocupantes-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .ocupante-tag {
    background: rgba(255,255,255,.05); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 8px; font-size: 12px; font-family: var(--mono);
  }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  .loading { text-align: center; padding: 40px; color: var(--muted); font-family: var(--mono); }

  .tipo-pdf { background: #e8a06a; }
  .tipo-whatsapp { background: #5ae8a0; }
  .tipo-correo { background: #6ab4e8; }
  .tipo-frakcio { background: #c06ae8; }
  .tipo-comunidad { background: #e86a9e; }
  .tipo-gforms { background: #e8c56a; }

  .tipo-label-pdf { color: #e8a06a; }
  .tipo-label-whatsapp { color: #5ae8a0; }
  .tipo-label-correo { color: #6ab4e8; }
  .tipo-label-frakcio { color: #c06ae8; }
  .tipo-label-comunidad { color: #e86a9e; }
  .tipo-label-gforms { color: #e8c56a; }

  @media(max-width:600px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .detail-grid { grid-template-columns: 1fr 1fr; }
    .card-fechas { display: none; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">VRM / REGISTROS</div>
  <div class="header-right">
    <span id="last-update" style="font-size:11px;color:var(--muted);font-family:var(--mono);"></span>
    <button class="btn-refresh" onclick="cargarRegistros()">↻ Actualizar</button>
  </div>
</header>

<div class="container">
  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total registros</div></div>
    <div class="stat"><div class="stat-num" id="stat-hoy">—</div><div class="stat-label">Check-in hoy</div></div>
    <div class="stat"><div class="stat-num" id="stat-pendientes">—</div><div class="stat-label">PDF pendiente</div></div>
    <div class="stat"><div class="stat-num" id="stat-generados">—</div><div class="stat-label">Generados</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFiltro('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFiltro('hoy',this)">Check-in hoy</button>
    <button class="filter-btn" onclick="setFiltro('semana',this)">Esta semana</button>
    <button class="filter-btn" onclick="setFiltro('pendientes',this)">Sin generar</button>
    <button class="filter-btn" onclick="setFiltro('pdf',this)">PDF</button>
    <button class="filter-btn" onclick="setFiltro('frakcio',this)">Frakcio</button>
    <button class="filter-btn" onclick="setFiltro('whatsapp',this)">WhatsApp</button>
  </div>

  <div id="registros-container" class="registros-grid">
    <div class="loading">Cargando registros...</div>
  </div>
</div>

let todosRegistros = [];
let filtroActual = "todos";

function fmtSlash(val) {
  if(!val) return "—";
  const [y,m,d] = val.split("-");
  return `${d}/${m}/${y}`;
}
function fmtFecha(val) {
  if(!val) return "—";
  const [y,m,d] = val.split("-");
  const meses = ["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];
  return `${parseInt(d)} ${meses[parseInt(m)-1]}`;
}

async function cargarRegistros() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/registros_checkin?select=*&order=fecha_entrada.asc,created_at.desc`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    todosRegistros = await res.json();
    // Infer template/tipo_formato for records saved before depto was mapped
    const DEPTO_TEMPLATE = {
      "QUIYA":   {template:"quiya",   tipo:"pdf"},
      "VENETIAN":{template:"venetian",tipo:"pdf"},
      "GD":      {template:"gd",      tipo:"pdf"},
      "FLAMINGOS":{template:"flamingos",tipo:"pdf"},
      "ALBATROS":{template:"albatros",tipo:"pdf"},
      "ALAMAR":  {template:"alamar",  tipo:"pdf"},
      "XIKIRI":  {template:"xikiri",  tipo:"pdf"},
    };
    todosRegistros = todosRegistros.map(r => {
      if(!r.template || !r.tipo_formato || r.tipo_formato === "general") {
        const prefix = (r.depto || "").split(" ")[0].toUpperCase();
        const mapped = DEPTO_TEMPLATE[prefix];
        if(mapped) {
          r.template = r.template || mapped.template;
          r.tipo_formato = (r.tipo_formato === "general" || !r.tipo_formato) ? mapped.tipo : r.tipo_formato;
        }
      }
      return r;
    });
    document.getElementById("last-update").textContent = "Actualizado " + new Date().toLocaleTimeString("es-MX", {hour:"2-digit",minute:"2-digit"});
    actualizarStats();
    renderRegistros();
  } catch(e) {
    document.getElementById("registros-container").innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Error cargando registros: ${e.message}</p></div>`;
  }
}

function actualizarStats() {
  const hoy = new Date().toISOString().split("T")[0];
  const total = todosRegistros.length;
  const checkinHoy = todosRegistros.filter(r => r.fecha_entrada === hoy).length;
  const pendientes = todosRegistros.filter(r => !r.pdf_generado).length;
  const generados = todosRegistros.filter(r => r.pdf_generado).length;
  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-hoy").textContent = checkinHoy;
  document.getElementById("stat-pendientes").textContent = pendientes;
  document.getElementById("stat-generados").textContent = generados;
}

function setFiltro(f, btn) {
  filtroActual = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderRegistros();
}

function filtrar(registros) {
  const hoy = new Date().toISOString().split("T")[0];
  const semana = new Date(); semana.setDate(semana.getDate()+7);
  const semanaStr = semana.toISOString().split("T")[0];
  switch(filtroActual) {
    case "hoy": return registros.filter(r => r.fecha_entrada === hoy);
    case "semana": return registros.filter(r => r.fecha_entrada >= hoy && r.fecha_entrada <= semanaStr);
    case "pendientes": return registros.filter(r => !r.pdf_generado);
    case "pdf": return registros.filter(r => r.tipo_formato === "pdf");
    case "frakcio": return registros.filter(r => r.tipo_formato === "frakcio");
    case "whatsapp": return registros.filter(r => r.tipo_formato === "whatsapp");
    default: return registros;
  }
}

function renderRegistros() {
  const container = document.getElementById("registros-container");
  const lista = filtrar(todosRegistros);
  if(!lista.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>No hay registros para este filtro.</p></div>`;
    return;
  }
  container.innerHTML = lista.map(r => cardHTML(r)).join("");
}

function cardHTML(r) {
  const ocupantes = Array.isArray(r.ocupantes) ? r.ocupantes : [];
  const ocupantesHTML = ocupantes.map(o => `<span class="ocupante-tag">${o.nombre}</span>`).join("");
  return `
  <div class="registro-card ${r.pdf_generado ? "generado":""}" id="card-${r.id}">
    <div class="card-header">
      <div class="card-left">
        <span class="tipo-dot tipo-${r.tipo_formato}"></span>
        <div>
          <div class="card-depto">${r.depto}</div>
          <div class="card-nombre">${r.nombre} · ${r.num_adultos}A${r.num_menores>0?" "+r.num_menores+"N":""}</div>
        </div>
      </div>
      <div class="card-fechas">${fmtFecha(r.fecha_entrada)} → ${fmtFecha(r.fecha_salida)}</div>
      <div class="card-actions">
        <button class="btn-detail" onclick="toggleDetail('${r.id}')">▾</button>
        <button class="btn-gen ${r.pdf_generado?"done":""}" onclick="generarFormato('${r.id}')">
          ${r.pdf_generado ? "✓ Generado" : "Generar"}
        </button>
      </div>
    </div>
    <div class="card-detail" id="detail-${r.id}">
      <div class="detail-grid">
        <div class="detail-field"><div class="detail-label">Teléfono</div><div class="detail-value">${r.telefono||"—"}</div></div>
        <div class="detail-field"><div class="detail-label">Email</div><div class="detail-value">${r.email||"—"}</div></div>
        <div class="detail-field"><div class="detail-label">Tipo formato</div><div class="detail-value tipo-label-${r.tipo_formato}">${r.tipo_formato.toUpperCase()}</div></div>
        <div class="detail-field"><div class="detail-label">Check-in</div><div class="detail-value">${fmtSlash(r.fecha_entrada)}</div></div>
        <div class="detail-field"><div class="detail-label">Check-out</div><div class="detail-value">${fmtSlash(r.fecha_salida)}</div></div>
        <div class="detail-field"><div class="detail-label">Mascotas</div><div class="detail-value">${r.num_mascotas||0}</div></div>
        <div class="detail-field"><div class="detail-label">Vehículo</div><div class="detail-value">${r.vehiculo_modelo||"—"}</div></div>
        <div class="detail-field"><div class="detail-label">Placas</div><div class="detail-value">${r.vehiculo_placas||"—"}</div></div>
        <div class="detail-field"><div class="detail-label">Registrado</div><div class="detail-value">${new Date(r.created_at).toLocaleDateString("es-MX")}</div></div>
      </div>
      ${ocupantes.length ? `<div class="detail-label">Ocupantes</div><div class="ocupantes-list">${ocupantesHTML}</div>` : ""}
    </div>
  </div>`;
}

function toggleDetail(id) {
  const d = document.getElementById(`detail-${id}`);
  d.classList.toggle("open");
}

async function marcarGenerado(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/registros_checkin?id=eq.${id}`, {
    method: "PATCH",
    headers: {
      "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json", "Prefer": "return=minimal"
    },
    body: JSON.stringify({pdf_generado: true})
  });
  const r = todosRegistros.find(x => x.id === id);
  if(r) r.pdf_generado = true;
  actualizarStats();
  const btn = document.querySelector(`#card-${id} .btn-gen`);
  if(btn) { btn.textContent = "✓ Generado"; btn.classList.add("done"); }
  document.getElementById(`card-${id}`)?.classList.add("generado");
}

function generarFormato(id) {
  const r = todosRegistros.find(x => x.id === id);
  if(!r) return;
  console.log("[GENERAR] id:", id, "depto:", r.depto, "template:", r.template, "tipo_formato:", r.tipo_formato);
  const datos = {
    depto: r.depto, nombre: r.nombre, telefono: r.telefono, correo: r.email,
    entrada: r.fecha_entrada, salida: r.fecha_salida,
    adultos: r.num_adultos, menores: r.num_menores, mascotas: r.num_mascotas,
    vehiculo: r.vehiculo_modelo, placas: r.vehiculo_placas,
    personas: r.num_adultos + r.num_menores,
  };
  const ocupantesArr = Array.isArray(r.ocupantes) ? r.ocupantes : [];

  if(r.tipo_formato === "pdf") {
    generarPDF(r, datos, ocupantesArr);
  } else {
    mostrarTexto(r, datos, ocupantesArr);
  }
  marcarGenerado(id);
}

// ── PDF generators (same as generador_formatos) ─────────────

function pdfLine(doc, y) {
  doc.setDrawColor(180); doc.setLineWidth(0.3); doc.line(14,y,196,y); return y+5;
}
function pdfSectionBar(doc, y, text) {
  doc.setFillColor(220,220,220); doc.rect(14,y,182,7,"F");
  doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(30,30,30);
  doc.text(text,105,y+5,{align:"center"}); return y+10;
}
function pdfField(doc, y, label, value, x1=14, x2=60) {
  doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(60,60,60);
  doc.text(label,x1,y);
  doc.setFont("helvetica","normal"); doc.setTextColor(0,0,0);
  doc.text(value||"___",x2,y); return y+6;
}

function generarPDF(r, datos, ocupantes) {
  console.log("[generarPDF] template:", r.template);
  const { jsPDF } = window.jspdf;
  let doc;
  if(r.template === "flamingos") doc = pdfFlamingos(datos, ocupantes);
  else if(r.template === "albatros") doc = pdfAlbatros(datos, ocupantes);
  else if(r.template === "gd") doc = pdfGD(datos, ocupantes);
  else if(r.template === "alamar") doc = pdfAlamar(datos, ocupantes);
  else if(r.template === "venetian") doc = pdfVenetian(datos, ocupantes);
  else if(r.template === "xikiri") doc = pdfArenablanca(datos, ocupantes);
  else if(r.template === "quiya") { pdfQuiya(datos, ocupantes); return; }
  else { mostrarTexto(r, datos, ocupantes); return; }
}

function pdfFlamingos(datos, ocupantes) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"mm",format:"letter"});
  doc.addImage(LOGOS.flamingos,"PNG",14,8,55,18);
  doc.setFont("helvetica","bold"); doc.setFontSize(14); doc.setTextColor(30,30,30);
  doc.text("SOLICITUD DE AUTORIZACIÓN DE INGRESO",196,16,{align:"right"});
  let y=32;
  doc.setDrawColor(0); doc.setLineWidth(0.5); doc.rect(14,y,182,14);

function pdfGD(datos, ocupantes) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"pt", format:"letter"});
  const W = 612, H = 792;
  const MARGIN = 40, RIGHT = W-40, TW = RIGHT-MARGIN;
  const bar_h = 90, logo_box_w = 110;

  const PROP_MAP = {
    "GD 103A":["100","Antonio Chavez Gonzalez"],
    "GD 202B":["100","Arturo Javier Ayo Polit"],
    "GD 303A":["200","Gustavo Adolfo Granados Corzo"],
    "GD 501B":["100","Saul de la Vega"],
    "GD 501E":["200","Rosabla Franco Jaime"],
  };
  const [torre, propietario] = PROP_MAP[datos.depto] || ["100","—"];
  const unidad = datos.depto.replace("GD ","");

  function fmtDate(val) {
    if(!val) return "___";
    const meses=["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];
    const [y,m,d] = val.split("-");
    return `${parseInt(d)} ${meses[parseInt(m)-1]}`;
  }

  // ── HEADER ──
  // Dark green logo box top-right
  doc.setFillColor(10,69,32);
  doc.rect(W-logo_box_w, H-bar_h, logo_box_w, bar_h, "F");

  // Green curved shape: top-left → bottom-left → bottom-right → curve back to top-left
  // Using triangle approximation with many points for smooth curve
  const GREEN = [13,90,42];
  doc.setFillColor(...GREEN);
  // Build curve as polygon with many steps
  const pts = [];
  pts.push([0, H]);           // top-left
  pts.push([0, H-bar_h]);     // bottom-left
  pts.push([W-logo_box_w, H-bar_h]); // bottom-right
  // bezier curve from bottom-right back to top-left
  // cp1: (W*0.55, H-bar_h), cp2: (W*0.45, H), end: (0, H)
  const steps = 30;
  for(let t=0; t<=steps; t++) {
    const s = t/steps;
    const x0=W-logo_box_w, y0=H-bar_h;
    const x1=W*0.55,       y1=H-bar_h;
    const x2=W*0.45,       y2=H;
    const x3=0,            y3=H;
    // cubic bezier
    const bx = Math.pow(1-s,3)*x0 + 3*Math.pow(1-s,2)*s*x1 + 3*(1-s)*s*s*x2 + s*s*s*x3;
    const by = Math.pow(1-s,3)*y0 + 3*Math.pow(1-s,2)*s*y1 + 3*(1-s)*s*s*y2 + s*s*s*y3;
    pts.push([bx, H - (H - by)]); // jsPDF y is from bottom, compensate
  }
  // draw as filled polygon
  doc.setDrawColor(...GREEN);
  doc.lines(
    pts.slice(1).map((p,i) => [p[0]-pts[i][0], p[1]-pts[i][1]]),
    pts[0][0], pts[0][1], [1,1], "F", true
  );

  // Logo
  doc.addImage(LOGOS.gd, "PNG", W-logo_box_w+20, H-bar_h+10, 68, 68);

  // ── CONTENT ──
  function hline(y) {
    doc.setDrawColor(0,0,0); doc.setLineWidth(0.5);
    doc.line(MARGIN, y, RIGHT, y);
  }
  function uline(x, y, w) {
    doc.setDrawColor(0,0,0); doc.setLineWidth(0.4);
    doc.line(x, y-2, x+w, y-2);
  }

  let y = H - bar_h - 30;
  doc.setFont("helvetica","normal"); doc.setFontSize(14); doc.setTextColor(0,0,0);
  doc.text("REGISTRO  DE  RENTISTAS", W/2, y, {align:"center"}); y-=18;
  hline(y); y-=18;

  doc.setFont("helvetica","normal"); doc.setFontSize(11);
  doc.text("Nombre del administrador de la unidad privativa:", MARGIN, y);
  doc.setFont("helvetica","bold"); doc.text("DANIELA RODRIGUEZ", MARGIN+275, y);
  y-=12; hline(y); y-=16;

  doc.setFont("helvetica","normal"); doc.text("Teléfono de contacto:", MARGIN, y);
  doc.setFont("helvetica","bold"); doc.text("3221170032", MARGIN+138, y);
  y-=12; hline(y); y-=16;

  doc.setFont("helvetica","normal"); doc.text("Torre:", MARGIN, y);
  doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.text(torre, MARGIN+42, y);
  uline(MARGIN+40, y, 55);
  doc.setFont("helvetica","normal"); doc.setFontSize(11); doc.text("Número de unidad:", MARGIN+175, y);
  doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.text(unidad, MARGIN+295, y);
  uline(MARGIN+292, y, 65);
  y-=12; hline(y); y-=16;

  doc.setFont("helvetica","normal"); doc.setFontSize(11);
  doc.text("Nombre del propietario que aprueba la renta:", MARGIN, y);
  doc.setFont("helvetica","bold"); doc.setFontSize(14); doc.text(propietario, MARGIN+278, y);
  y-=12; hline(y); y-=16;

  doc.setFont("helvetica","normal"); doc.setFontSize(11);
  const inst = `Nombre de todos los ocupantes autorizados por el propietario y quienes confirma en esta notificación han leído el reglamento de Torre ${torre[0]}_00 previo a su llegada a Ki Green, mismo que fue enviado en formato electrónico con antelación al responsable del grupo:`;
  doc.splitTextToSize(inst, TW).forEach(line => { doc.text(line, MARGIN, y); y-=15; });
  y-=4; uline(MARGIN, y+6, TW/2); y-=18;

  // 6 rentistas
  for(let i=0; i<6; i++) {
    const o = ocupantes[i] || null;
    const name = o?.nombre || "";
    doc.setFont("helvetica","normal"); doc.setFontSize(11); doc.setTextColor(0,0,0);
    if(i===0) {
      const label = "Rentista#1 y responsable del grupo: ";
      doc.text(label, MARGIN, y);
      doc.setFont("helvetica","bold");
      doc.text(name, MARGIN + doc.getTextWidth(label), y);
    } else {
      const label = `Rentista#${i+1}  `;
      const lw = doc.getTextWidth(label);
      doc.text(label, MARGIN, y);
      doc.setFont("helvetica","normal");
      doc.text(name, MARGIN+lw, y);
      uline(MARGIN+lw-2, y, TW-lw+2);
    }
    y-=20;

    doc.setFont("helvetica","normal"); doc.setFontSize(11);
    doc.text("Check in", MARGIN, y);
    doc.setFont("helvetica","bold");
    if(name) doc.text(fmtDate(datos.fecha_entrada), MARGIN+60, y);
    uline(MARGIN+58, y, 65);
    doc.setFont("helvetica","normal");
    doc.text("Check out", MARGIN+140, y);
    doc.setFont("helvetica","bold");
    if(name) doc.text(fmtDate(datos.fecha_salida), MARGIN+200, y);
    uline(MARGIN+198, y, TW-200);
    y-=14; hline(y+4); y-=14;
  }

  doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.setTextColor(0,0,0);
  doc.text("*El responsable del grupo debe ser mayor de 25 años para que se acepte la reserva.", MARGIN, y);

  // Footer bar
  doc.setFillColor(...GREEN);
  doc.rect(0, 0, W, 18, "F");

  doc.save(`GreenDistrict_${unidad}_${(datos.nombre||"huesped").split(" ")[0]}.pdf`);
}

function pdfQuiya(datos, ocupantes) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"pt", format:"letter"});
  const W = 612, H = 792;
  const MARGIN = 72, RIGHT = W-72, TW = RIGHT-MARGIN;

  const PROP_MAP = {
    "QUIYA 2005":"FATIMA GONZALEZ",
    "QUIYA 2103":"Ulises Herrera García",
    "QUIYA 2302":"Israel Granados",
    "QUIYA 2403":"RODRIGO CONTRERAS",
    "QUIYA 2701":"CECILIA CHICO",
    "QUIYA 2705":"ANTONIO CHICO",
    "QUIYA 2801":"MARIA ANTONIA TREVINO GARZA",
    "QUIYA 2805":"SENOR CHICO",
    "QUIYA 2905":"CECILIA CHICO",
    "QUIYA 3004":"Rocío Salinas Arias",
  };

  const propietario = PROP_MAP[datos.depto] || "—";
  const villa = datos.depto.replace("QUIYA ","VILLA ");

  function fmtLong(val) {
    if(!val) return "___";
    const meses=["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
    const [y,m,d] = val.split("-");
    return `${parseInt(d)} ${meses[parseInt(m)-1]} ${y}`;
  }

  function uline(x, y, w) {
    doc.setDrawColor(0,0,0); doc.setLineWidth(0.5);
    doc.line(x, y+3, x+w, y+3);
  }

  function field(label, value, y, gap=36) {
    doc.setFont("helvetica","normal"); doc.setFontSize(12); doc.setTextColor(0,0,0);
    doc.text(label, MARGIN, y);
    const lw = doc.getTextWidth(label);
    doc.setFont("helvetica","bold");
    doc.text(String(value||""), MARGIN+lw+8, y);
    uline(MARGIN+lw+6, y, RIGHT-MARGIN-lw-6);
    return y + gap;
  }

  // jsPDF y=0 is TOP, increases downward
  let y = 60;

  // Logo centered
  const logoSize = 100;
  doc.addImage(LOGOS.quiya, "JPEG", W/2-logoSize/2, y, logoSize, logoSize);
  y += logoSize + 20;

  // Administrador 2 lines

  doc.text("CLAUDIA DANIELA", MARGIN+alw+8, y);
  uline(MARGIN+alw+6, y, RIGHT-MARGIN-alw-6);
  y += 26;
  doc.text("RODRIGUEZ MELENDEZ", MARGIN, y);
  uline(MARGIN, y, TW);
  y += 38;

  y = field("Teléfono de contacto:", "322-117-0032", y, 38);
  y = field("No. De personas:", String(datos.personas || ""), y, 38);

  // Adultos
  doc.setFont("helvetica","normal"); doc.setFontSize(12); doc.setTextColor(0,0,0);
  doc.text("Adultos:", MARGIN, y);
  uline(MARGIN + doc.getTextWidth("Adultos:") + 6, y, 35);
  y += 26;
  const adultList = ocupantes.filter(o => o && o.nombre);

    doc.setFont("helvetica","bold"); doc.setFontSize(12);

  y += 16;

  // Menores
  doc.setFont("helvetica","normal"); doc.setFontSize(12); doc.setTextColor(0,0,0);
  doc.text("Menores:", MARGIN, y);

  doc.setDrawColor(204,165,26); doc.setLineWidth(2);

  y = field("Fecha de ingreso:", fmtLong(datos.fecha_entrada), y, 36);
  y = field("Fecha de salida:", fmtLong(datos.fecha_salida), y, 36);

  const villa2 = villa.replace("VILLA ","");
  doc.save(`Quiya_${villa2}_${(datos.nombre||"huesped").split(" ")[0]}.pdf`);
}

function mostrarTexto(r, datos, ocupantes) {
  const lista = ocupantes.map((o,i)=>`${i+1}. ${o.nombre} — ${o.tipo||"Adulto"}`).join("\n");
  let texto = "";
  const tipo = r.tipo_formato;

  if(tipo === "whatsapp") {
    const numeros = {
      "RINCON 104":"+52 322 327 3955","RINCON 403":"+52 322 327 3955","RINCON 502":"+52 322 327 3955",
      "PLAYA ESMERALDA":"+52 55 1800 8292","ARCANO":"+52 322 349 0930",
      "NAUTICO 9C":"+52 322 141 9001","NAUTICO 9E":"+52 322 141 9001",
      "NAUTICO 1G":"+52 322 141 9001","NAUTICO 3G":"+52 322 141 9001","NAUTICO 408":"+52 322 141 9001",
    };
    const num = numeros[r.depto] || "NÚMERO PENDIENTE";
    texto = `📱 Enviar a: ${num}\n\n📋 Registro — ${r.depto}\n\nTitular: ${datos.nombre}\nTel: ${datos.telefono||"—"}\nLlegada: ${fmtSlash(datos.entrada)}\nSalida: ${fmtSlash(datos.salida)}\nPersonas: ${datos.personas} (${datos.adultos}A ${datos.menores}N)\n\nOcupantes:\n${lista}`;
  } else if(tipo === "frakcio") {
    const adultosList = ocupantes.filter(o=>o.tipo!=="Menor");
    const menoresList = ocupantes.filter(o=>o.tipo==="Menor");
    texto = `📋 FRAKCIO — ${r.depto}\n${"─".repeat(40)}\n[ Llegada    ] → ${fmtSlash(datos.entrada)}\n[ Salida     ] → ${fmtSlash(datos.salida)}\n[ Adultos    ] → ${datos.adultos}\n[ Menores    ] → ${datos.menores}\n${"─".repeat(40)}\n[ Huésped principal ] → ${datos.nombre}\n[ Correo            ] → ${datos.correo||"(solicitar)"}\n[ Teléfono          ] → ${datos.telefono||"—"}\n[ Placas            ] → ${datos.placas||"—"}\n${"─".repeat(40)}\nADULTOS:\n${adultosList.map((o,i)=>`  ${i+1}. ${o.nombre}`).join("\n")}${menoresList.length?"\nMENORES:\n"+menoresList.map((o,i)=>`  ${i+1}. ${o.nombre}`).join("\n"):""}`;
  } else {
    texto = `${tipo.toUpperCase()} — ${r.depto}\n${"─".repeat(40)}\nResponsable: ${datos.nombre}\nTel: ${datos.telefono||"—"}\nCheck-in: ${fmtSlash(datos.entrada)}\nCheck-out: ${fmtSlash(datos.salida)}\nAdultos: ${datos.adultos} | Menores: ${datos.menores}\n\nOcupantes:\n${lista}`;
  }

  // Show in a modal-like overlay
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;";
  overlay.innerHTML = `
    <div style="background:#18181b;border:1px solid #2a2a30;border-radius:12px;max-width:600px;width:100%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;">
      <div style="padding:14px 18px;border-bottom:1px solid #2a2a30;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-family:var(--mono);font-size:12px;color:var(--accent);">${tipo.toUpperCase()} — ${r.depto}</span>
        <button onclick="this.closest('.overlay-modal').remove()" style="background:none;border:none;color:#888;cursor:pointer;font-size:18px;">×</button>
      </div>
      <pre style="padding:18px;font-family:var(--mono);font-size:12px;line-height:1.7;overflow-y:auto;white-space:pre-wrap;">${texto}</pre>
      <div style="padding:12px 18px;border-top:1px solid #2a2a30;">
        <button onclick="navigator.clipboard.writeText(this.closest('div').previousElementSibling.previousElementSibling.textContent);this.textContent='✓ Copiado'" style="background:var(--accent);color:#0f0f10;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:12px;">Copiar</button>
      </div>
    </div>`;
  overlay.classList.add("overlay-modal");
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}
