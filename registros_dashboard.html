<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRM — Registros Check-in</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0f10; --surface: #18181b; --surface2: #1f1f24;
    --border: #2a2a30; --accent: #e8c56a; --green: #5ae8a0;
    --red: #e86a6a; --blue: #6ab4e8; --purple: #c06ae8;
    --text: #f0f0f0; --muted: #888;
    --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 2px; }
  .header-right { display: flex; gap: 10px; align-items: center; }

  .btn-refresh {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
    font-family: var(--mono); transition: all .2s;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

  .filters {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: none; color: var(--muted); cursor: pointer; font-size: 12px;
    font-family: var(--mono); transition: all .2s;
  }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,197,106,.08); }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-num { font-size: 28px; font-weight: 600; font-family: var(--mono); color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; }

  .registros-grid { display: grid; gap: 12px; }

  .registro-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; transition: border-color .2s;
  }
  .registro-card:hover { border-color: #3a3a40; }
  .registro-card.generado { border-left: 3px solid var(--green); opacity: .7; }

  .card-header {
    padding: 14px 18px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px;
  }
  .card-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .tipo-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .card-depto { font-family: var(--mono); font-size: 14px; font-weight: 500; }
  .card-nombre { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-fechas { font-family: var(--mono); font-size: 11px; color: var(--muted); flex-shrink: 0; }

  .card-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .sel-idioma {
    padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface2); color: var(--text); font-size: 12px;
    cursor: pointer; font-family: var(--mono); outline: none;
  }
  .btn-gen {
    padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer;
    font-size: 12px; font-family: var(--mono); font-weight: 500;
    background: var(--accent); color: #0f0f10; transition: all .2s;
  }
  .btn-gen:hover { background: #f0d070; }
  .btn-gen.done { background: rgba(90,232,160,.15); color: var(--green); border: 1px solid rgba(90,232,160,.3); }
  .btn-copy-link {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px;
    font-family: var(--mono); transition: all .2s; white-space: nowrap;
  }
  .btn-copy-link:hover { border-color: var(--blue); color: var(--blue); }
  .btn-copy-link.copied { border-color: var(--green); color: var(--green); }

  .btn-detail {
    padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: none; color: var(--muted); cursor: pointer; font-size: 12px;
    font-family: var(--mono); transition: all .2s;
  }
  .btn-detail:hover { border-color: var(--blue); color: var(--blue); }

  .card-detail {
    display: none; padding: 14px 18px; border-top: 1px solid var(--border);
    background: var(--surface2); font-size: 13px;
  }
  .card-detail.open { display: block; }
  .detail-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
  .detail-field { }
  .detail-label { font-size: 10px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  .detail-value { font-size: 13px; }
  .ocupantes-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .ocupante-tag {
    background: rgba(255,255,255,.05); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 8px; font-size: 12px; font-family: var(--mono);
  }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  .loading { text-align: center; padding: 40px; color: var(--muted); font-family: var(--mono); }

  .tipo-pdf { background: #e8a06a; }
  .tipo-whatsapp { background: #5ae8a0; }
  .tipo-correo { background: #6ab4e8; }
  .tipo-frakcio { background: #c06ae8; }
  .tipo-comunidad { background: #e86a9e; }
  .tipo-gforms { background: #e8c56a; }

  .tipo-label-pdf { color: #e8a06a; }
  .tipo-label-whatsapp { color: #5ae8a0; }
  .tipo-label-correo { color: #6ab4e8; }
  .tipo-label-frakcio { color: #c06ae8; }
  .tipo-label-comunidad { color: #e86a9e; }
  .tipo-label-gforms { color: #e8c56a; }

  @media(max-width:600px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .detail-grid { grid-template-columns: 1fr 1fr; }
    .card-fechas { display: none; }
  }

  /* INE upload in dashboard */
  .ine-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .ine-label { font-size: 10px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .ine-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .ine-thumb { width: 80px; height: 50px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); }
  .btn-ine-upload {
    padding: 6px 12px; border-radius: 6px; border: 1px dashed var(--border);
    background: none; color: var(--muted); cursor: pointer; font-size: 11px;
    font-family: var(--mono); transition: all .2s; position: relative; overflow: hidden;
  }
  .btn-ine-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .btn-ine-upload:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ine-upload.loaded { border-color: var(--green); color: var(--green); border-style: solid; }
  .ine-status { font-size: 11px; font-family: var(--mono); }
  .ine-ok { color: var(--green); }
  .ine-missing { color: var(--muted); }
  .btn-ine-action {
    padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border);
    background: none; color: var(--muted); cursor: pointer; font-size: 11px;
    font-family: var(--mono); transition: all .15s;
  }
  .btn-ine-action:hover { border-color: var(--accent); color: var(--accent); }


  /* ── Entradas Hoy ── */
  .entradas-section {
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .entradas-header {
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
  }
  .entradas-dias-wrapper { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .entradas-header h3 {
    font-family: var(--mono); font-size: 12px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1.5px;
  }
  .entradas-header .eh-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .entradas-body { padding: 12px 18px; }
  .entradas-body.hidden { display: none; }
  .entrada-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border); gap: 12px;
  }
  .entrada-row:last-child { border-bottom: none; }
  .entrada-depto {
    font-family: var(--mono); font-size: 13px; font-weight: 500;
    min-width: 140px;
  }
  .entrada-guest { font-size: 12px; color: var(--muted); flex: 1; }
  .entrada-badge {
    font-size: 11px; font-family: var(--mono); padding: 3px 10px;
    border-radius: 12px; white-space: nowrap; flex-shrink: 0;
  }
  .badge-ok    { background: rgba(90,232,160,.12); color: var(--green); border: 1px solid rgba(90,232,160,.3); }
  .badge-pdf   { background: rgba(232,197,106,.12); color: var(--accent); border: 1px solid rgba(232,197,106,.3); cursor: pointer; }
  .badge-pdf:hover { background: rgba(232,197,106,.25); }
  .badge-wait  { background: rgba(136,136,136,.1); color: var(--muted); border: 1px solid var(--border); }
  .badge-whats { background: rgba(90,232,160,.08); color: #25d366; border: 1px solid rgba(37,211,102,.3); cursor: pointer; }
  .badge-whats:hover { background: rgba(37,211,102,.2); }
  .entrada-fmt-sent { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .fmt-sent-yes { color: var(--green); }
  .fmt-sent-no  { color: var(--red); }

</style>
</head>
<body>
<header>
  <div class="logo">VRM / REGISTROS</div>
  <div class="header-right">
    <span id="last-update" style="font-size:11px;color:var(--muted);font-family:var(--mono);"></span>
    <button class="btn-refresh" onclick="cargarRegistros()">↻ Actualizar</button>
  </div>
</header>

<div class="container">
  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total registros</div></div>
    <div class="stat"><div class="stat-num" id="stat-hoy">—</div><div class="stat-label">Check-in hoy</div></div>
    <div class="stat"><div class="stat-num" id="stat-pendientes">—</div><div class="stat-label">PDF pendiente</div></div>
    <div class="stat"><div class="stat-num" id="stat-generados">—</div><div class="stat-label">Generados</div></div>
  </div>


  <!-- ── Entradas por día ── -->
  <div id="entradas-dias-container"></div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFiltro('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFiltro('hoy',this)">Check-in hoy</button>
    <button class="filter-btn" onclick="setFiltro('semana',this)">Esta semana</button>
    <button class="filter-btn" onclick="setFiltro('pendientes',this)">Sin generar</button>
    <button class="filter-btn" onclick="setFiltro('pdf',this)">PDF</button>
    
    <button class="filter-btn" onclick="setFiltro('whatsapp',this)">WhatsApp</button>
  </div>

  <div id="registros-container" class="registros-grid">
    <div class="loading">Cargando registros...</div>
  </div>
</div>

let todosRegistros = [];
let frakcioQR = []; // {depto, fecha, qr_enviado, id}
let filtroActual = "todos";

function fmtSlash(val) {
  if(!val) return "—";
  const [y,m,d] = val.split("-");
  return `${d}/${m}/${y}`;
}
function fmtFecha(val) {
  if(!val) return "—";
  const [y,m,d] = val.split("-");
  const meses = ["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];
  return `${parseInt(d)} ${meses[parseInt(m)-1]}`;
}

async function cargarRegistros() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/registros_checkin?select=*&order=fecha_entrada.asc,created_at.desc`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    todosRegistros = await res.json();
    // Infer template/tipo_formato for records saved before depto was mapped
    const DEPTO_TEMPLATE = {
      "QUIYA":    {template:"quiya",    tipo:"pdf"},
      "VENETIAN": {template:"venetian", tipo:"pdf"},
      "GD":       {template:"gd",       tipo:"pdf"},
      "FLAMINGOS":{template:"flamingos",tipo:"pdf"},
      "ALBATROS": {template:"albatros", tipo:"pdf"},
      "ALAMAR":   {template:"alamar",   tipo:"pdf"},
      "XIKIRI":   {template:"xikiri",   tipo:"pdf"},
      "NAUTICO":  {template:"whatsapp", tipo:"whatsapp"},
      "RINCON":   {template:"whatsapp", tipo:"whatsapp"},
      "MARSALA":  {template:"whatsapp", tipo:"whatsapp"},
      "AMOARA":   {template:"whatsapp", tipo:"whatsapp"},
    };
    const DEPTO_EXACT = {
      "PLAYA ESMERALDA": {template:"whatsapp", tipo:"whatsapp"},
      "ARCANO":          {template:"whatsapp", tipo:"whatsapp"},
      "MARINA SOL":      {template:"whatsapp", tipo:"whatsapp"},
    };
    todosRegistros = todosRegistros.map(r => {
      const prefix = (r.depto || "").split(" ")[0].toUpperCase();
      const mapped = DEPTO_EXACT[r.depto] || DEPTO_TEMPLATE[prefix];
      if(mapped) {
        if(!r.template) r.template = mapped.template;
        if(!r.tipo_formato || r.tipo_formato === "general") r.tipo_formato = mapped.tipo;
      }
      return r;
    });
    document.getElementById("last-update").textContent = "Actualizado " + new Date().toLocaleTimeString("es-MX", {hour:"2-digit",minute:"2-digit"});
    actualizarStats();
    renderRegistros();
    cargarEntradas().catch(e => console.error("cargarEntradas error:", e));
  } catch(e) {
    document.getElementById("registros-container").innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Error cargando registros: ${e.message}</p></div>`;
  }
}

function actualizarStats() {
  const hoy = new Date().toISOString().split("T")[0];
  const total = todosRegistros.length;
  const checkinHoy = todosRegistros.filter(r => r.fecha_entrada === hoy).length;
  const pendientes = todosRegistros.filter(r => !r.pdf_generado).length;
  const generados = todosRegistros.filter(r => r.pdf_generado).length;
  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-hoy").textContent = checkinHoy;
  document.getElementById("stat-pendientes").textContent = pendientes;
  document.getElementById("stat-generados").textContent = generados;
}

function setFiltro(f, btn) {
  filtroActual = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderRegistros();
}

function filtrar(registros) {
  const hoy = new Date().toISOString().split("T")[0];
  const semana = new Date(); semana.setDate(semana.getDate()+7);
  const semanaStr = semana.toISOString().split("T")[0];
  switch(filtroActual) {
    case "hoy": return registros.filter(r => r.fecha_entrada === hoy);
    case "semana": return registros.filter(r => r.fecha_entrada >= hoy && r.fecha_entrada <= semanaStr);
    case "pendientes": return registros.filter(r => !r.pdf_generado);
    case "pdf": return registros.filter(r => r.tipo_formato === "pdf");
    case "whatsapp": return registros.filter(r => r.tipo_formato === "whatsapp");
    default: return registros;
  }
}

function renderRegistros() {
  const container = document.getElementById("registros-container");
  const lista = filtrar(todosRegistros);
  if(!lista.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>No hay registros para este filtro.</p></div>`;
    return;
  }
  container.innerHTML = lista.map(r => cardHTML(r)).join("");
}

const COMPLEJO_NOMBRE = {
  "QUIYA": "Quiya", "VENETIAN": "Grand Venetian", "GD": "Green District",
  "FLAMINGOS": "Flamingos", "ALBATROS": "Albatros", "ALAMAR": "Alamar",
  "XIKIRI": "Xikiri", "NAUTICO": "Náutico", "RINCON": "Rincón de Almas",
  "MARSALA": "Marsala", "AMOARA": "Amoara", "PENINSULA": "Península",
  "ARIA": "Aria", "MARITIMA": "Marítima", "BOLONGO": "Bolongo",
  "ZOHO": "Zoho", "PUERTARENA": "Puertarena", "BAY VIEW": "Bay View Grand",
  "ZANTAMAR": "Zantamar", "TULES": "Tules", "ARCANO": "Arcano",
  "PLAYA ESMERALDA": "Playa Esmeralda", "MARINA SOL": "Marina Sol",
  "DELTA": "Delta"
};
function getComplejo(depto) {
  const d = depto.toUpperCase();
  // Exact match primero
  if(COMPLEJO_NOMBRE[d]) return COMPLEJO_NOMBRE[d];
  // Por prefijo
  const key = Object.keys(COMPLEJO_NOMBRE).find(k => d.startsWith(k));
  return key ? COMPLEJO_NOMBRE[key] : depto;
}

function copiarLink(depto) {
  const url = "https://danielngr.github.io/2302-page/registro.html?dept=" + encodeURIComponent(depto);
  const complejo = getComplejo(depto);
  const msg = `Hola 👋 Para coordinar tu llegada a ${complejo}, necesito que llenes este breve formulario de registro — son solo tus datos básicos y los nombres de todos los que se hospedarán contigo (incluyendo niños). El condominio lo requiere para permitir el acceso el día de tu check-in.\n\n${url}\n\nSi tienes alguna duda con algo del formulario, con gusto te ayudo 🙌`;
  navigator.clipboard.writeText(msg).then(() => {
    const btn = document.querySelector(`[data-copy="${depto}"]`);
    if(btn) { btn.textContent = "✓ Copiado"; btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "🔗 Link"; btn.classList.remove("copied"); }, 2000); }
    // Si tiene registro WhatsApp, marcar como generado
    const reg = todosRegistros.find(x => {
      const d = (x.depto||'').toUpperCase().trim();
      const dep = depto.toUpperCase();
      return (d === dep || d.startsWith(dep+' ') || dep.startsWith(d+' ')) && x.tipo_formato === 'whatsapp';
    });
    if(reg && !reg.pdf_generado) marcarGenerado(reg.id);
  });
}

function toggleDetail(id) {
  const d = document.getElementById(`detail-${id}`);
  d.classList.toggle("open");

function subirINE(id, input) {
  if(!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement("canvas");
      const MAX = 900;
      let w = img.width, h = img.height;
      if(w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      if(h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      const b64 = canvas.toDataURL("image/jpeg", 0.80);

      // Store on record in memory
      const r = todosRegistros.find(x => x.id === id);
      if(r) r.foto_id = b64;

      // Save to Supabase
      fetch(`${SUPABASE_URL}/rest/v1/registros_checkin?id=eq.${id}`, {
        method: "PATCH",
        headers: {
          "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json", "Prefer": "return=minimal"
        },
        body: JSON.stringify({ foto_id: b64 })
      });

      // Show preview
      const previewDiv = document.getElementById(`ine-preview-${id}`);
      const previewImg = document.getElementById(`ine-img-${id}`);
      if(previewDiv && previewImg) {
        previewImg.src = b64;
        previewDiv.style.display = "block";
      }
      // Update button
      const btn = document.getElementById(`btn-ine-${id}`);
      if(btn) { btn.classList.add("loaded"); btn.querySelector("input").insertAdjacentText("afterend", "↺ Cambiar foto"); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

async function marcarGenerado(id) {
  const r = todosRegistros.find(x => x.id === id);
  if(r) r.pdf_generado = true;
  actualizarStats();
  const btn = document.querySelector(`#card-${id} .btn-gen`);
  if(btn) { btn.textContent = "✓ Generado"; btn.classList.add("done"); }
  document.getElementById(`card-${id}`)?.classList.add("generado");
  fetch(`${SUPABASE_URL}/rest/v1/registros_checkin?id=eq.${id}`, {
    method: "PATCH",
    keepalive: true,
    headers: {
      "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json", "Prefer": "return=minimal"
    },
    body: JSON.stringify({pdf_generado: true})
  }).then(res => {
    if(!res.ok) res.text().then(t => console.error("marcarGenerado PATCH error:", res.status, t));
  }).catch(e => console.error("marcarGenerado fetch error:", e));

function fc(s) {
  return (s||'').replace(/[áàä]/g,'a').replace(/[éèë]/g,'e')
    .replace(/[íìï]/g,'i').replace(/[óòö]/g,'o').replace(/[úùü]/g,'u')
    .replace(/Á/g,'A').replace(/É/g,'E').replace(/Í/g,'I').replace(/Ó/g,'O').replace(/Ú/g,'U')
    .replace(/ñ/g,'n').replace(/Ñ/g,'N');
}

function generarFormato(id) {
  const r = todosRegistros.find(x => x.id === id);

  console.log("[GENERAR] id:", id, "depto:", r.depto, "template:", r.template, "tipo_formato:", r.tipo_formato);
  const datos = {

    personas: r.num_adultos + r.num_menores,

function generarPDF(r, datos, ocupantes, _genId) {
  console.log("[generarPDF] template:", r.template);
  const { jsPDF } = window.jspdf;
  let doc;
  if(r.template === "flamingos") doc = pdfFlamingos(datos, ocupantes, _genId);
  else if(r.template === "albatros") doc = pdfAlbatros(datos, ocupantes, _genId);
  else if(r.template === "gd") doc = pdfGD(datos, ocupantes, _genId);
  else if(r.template === "alamar") doc = pdfAlamar(datos, ocupantes, _genId);
  else if(r.template === "venetian") doc = pdfVenetian(datos, ocupantes, _genId);
  else if(r.template === "xikiri") doc = pdfXikiri(datos, ocupantes, _genId);
  else if(r.template === "quiya") { pdfQuiya(datos, ocupantes, _genId); return; }
  else if(r.template === "peninsula") {
    var idioma = r._idioma || "es";
    if(idioma === "es"){ pdfPeninsulaES(datos, ocupantes); setTimeout(function(){ leasePeninsulaES(datos); }, 800); }
    else { pdfPeninsula(datos, ocupantes); setTimeout(function(){ leasePeninsula(datos); }, 800); }
    return;
  }
  else { mostrarTexto(r, datos, ocupantes); return; }
}

function pdfGD(datos, ocupantes, _genId) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"pt", format:"letter"});
  const W = 612, H = 792;
  const MARGIN = 40, RIGHT = W-40, TW = RIGHT-MARGIN;
  const bar_h = 90, logo_box_w = 110;
  const GREEN = [13,90,42];

  const PROP_MAP = {
    "GD 103A":["100","Antonio Chavez Gonzalez"],
    "GD 202B":["100","Arturo Javier Ayo Polit"],
    "GD 303A":["200","Gustavo Adolfo Granados Corzo"],
    "GD 501B":["100","Saul de la Vega"],
    "GD 501E":["200","Rosabla Franco Jaime"],
  };
  const [torre, propietario] = PROP_MAP[datos.depto] || ["100","—"];
  const unidad = datos.depto.replace("GD ","");

  function fmtDate(val) {
    if(!val) return "___";
    const meses=["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];
    const [y,m,d] = val.split("-");
    return `${parseInt(d)} ${meses[parseInt(m)-1]}`;
  }

  // ── HEADER (top-down: y=0 is top) ──
  // Dark green logo box: top-right corner
  doc.setFillColor(10,69,32);
  doc.rect(W-logo_box_w, 0, logo_box_w, bar_h, "F");

  // Green curved shape: covers top-left, curves to bottom-right
  // Points: top-left(0,0) → bottom-left(0,bar_h) → curve to top-right area
  // Green shape (jsPDF top-down):
  // Starts at top-left (0,0), goes down left side to bottom-left (0,bar_h),
  // curves RIGHT along bottom to bottom-right (W-logo_box_w, bar_h),
  // then curve UP-LEFT back to top-left (0,0).
  // White space = top-right corner behind logo box.
  const pts = [];
  pts.push([0, 0]);                        // top-left — start
  pts.push([0, bar_h]);                    // bottom-left
  pts.push([W-logo_box_w, bar_h]);         // bottom-right
  // bezier back to top-left: cp1=(W*0.55,bar_h) cp2=(W*0.45,0) end=(0,0)
  const steps = 30;
  for(let t=0; t<=steps; t++) {
    const s = t/steps;
    const x0=W-logo_box_w, y0=bar_h;  // start bottom-right
    const x1=W*0.55,       y1=bar_h;  // cp1: stays at bottom
    const x2=W*0.45,       y2=0;      // cp2: rises to top
    const x3=0,            y3=0;      // end: top-left
    const bx = Math.pow(1-s,3)*x0 + 3*Math.pow(1-s,2)*s*x1 + 3*(1-s)*s*s*x2 + s*s*s*x3;
    const by = Math.pow(1-s,3)*y0 + 3*Math.pow(1-s,2)*s*y1 + 3*(1-s)*s*s*y2 + s*s*s*y3;
    pts.push([bx, by]);
  }
    doc.setFillColor(...GREEN);
  doc.setDrawColor(...GREEN);
  doc.lines(
    pts.slice(1).map((p,i) => [p[0]-pts[i][0], p[1]-pts[i][1]]),
    pts[0][0], pts[0][1], [1,1], "F", true
  );

  // Logo in box
  doc.addImage(LOGOS.gd, "PNG", W-logo_box_w+20, 10, 68, 68);

  // ── CONTENT (y increases downward from top) ──
  function hline(y) {
    doc.setDrawColor(0,0,0); doc.setLineWidth(0.5);
    doc.line(MARGIN, y, RIGHT, y);
  }
  function uline(x, y, w) {
    doc.setDrawColor(0,0,0); doc.setLineWidth(0.4);
    doc.line(x, y+4, x+w, y+4);
  }

  let y = bar_h + 28;
  doc.setFont("helvetica","normal"); doc.setFontSize(14); doc.setTextColor(0,0,0);
  doc.text("REGISTRO  DE  RENTISTAS", W/2, y, {align:"center"}); y+=18;
  hline(y); y+=18;

  doc.setFont("helvetica","normal"); doc.setFontSize(11);
  doc.text("Nombre del administrador de la unidad privativa:", MARGIN, y);
  doc.setFont("helvetica","bold"); doc.text("DANIELA RODRIGUEZ", MARGIN+275, y);
  y+=12; hline(y); y+=16;

  doc.setFont("helvetica","normal"); doc.text("Teléfono de contacto:", MARGIN, y);
  doc.setFont("helvetica","bold"); doc.text("3221170032", MARGIN+138, y);
  y+=12; hline(y); y+=16;

  doc.setFont("helvetica","normal"); doc.text("Torre:", MARGIN, y);
  doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.text(torre, MARGIN+42, y);
  uline(MARGIN+40, y, 55);
  doc.setFont("helvetica","normal"); doc.setFontSize(11); doc.text("Número de unidad:", MARGIN+175, y);
  doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.text(unidad, MARGIN+295, y);
  uline(MARGIN+292, y, 65);
  y+=12; hline(y); y+=16;

  doc.setFont("helvetica","normal"); doc.setFontSize(11);
  doc.text("Nombre del propietario que aprueba la renta:", MARGIN, y);
  doc.setFont("helvetica","bold"); doc.setFontSize(14); doc.text(propietario, MARGIN+278, y);
  y+=12; hline(y); y+=16;

  doc.setFont("helvetica","normal"); doc.setFontSize(11);
  const inst = `Nombre de todos los ocupantes autorizados por el propietario y quienes confirma en esta notificación han leído el reglamento de Torre ${torre} previo a su llegada a Ki Green, mismo que fue enviado en formato electrónico con antelación al responsable del grupo:`;
  doc.splitTextToSize(inst, TW).forEach(line => { doc.text(line, MARGIN, y); y+=15; });
  y+=4; uline(MARGIN, y-6, TW/2); y+=18;

  // 6 rentistas
  for(let i=0; i<6; i++) {
    const o = ocupantes[i] || null;
    const name = o?.nombre || "";
    doc.setFont("helvetica","normal"); doc.setFontSize(11); doc.setTextColor(0,0,0);
    if(i===0) {
      const label = "Rentista#1 y responsable del grupo: ";
      doc.text(label, MARGIN, y);
      doc.setFont("helvetica","bold");
      doc.text(name, MARGIN + doc.getTextWidth(label), y);
    } else {
      const label = `Rentista#${i+1}  `;
      const lw = doc.getTextWidth(label);
      doc.text(label, MARGIN, y);
      doc.setFont("helvetica","normal");
      doc.text(name, MARGIN+lw, y);
      uline(MARGIN+lw-2, y, TW-lw+2);
    }
    y+=20;

    doc.setFont("helvetica","normal"); doc.setFontSize(11);
    doc.text("Check in", MARGIN, y);
    doc.setFont("helvetica","bold");
    if(name) doc.text(fmtDate(datos.entrada||datos.fecha_entrada), MARGIN+60, y);
    uline(MARGIN+58, y, 65);
    doc.setFont("helvetica","normal");
    doc.text("Check out", MARGIN+140, y);
    doc.setFont("helvetica","bold");
    if(name) doc.text(fmtDate(datos.salida||datos.fecha_salida), MARGIN+200, y);
    uline(MARGIN+198, y, TW-200);
    y+=14; hline(y-4); y+=14;
  }

  doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.setTextColor(0,0,0);
  doc.text("*El responsable del grupo debe ser mayor de 25 años para que se acepte la reserva.", MARGIN, y);

  // Footer bar at bottom
  doc.setFillColor(...GREEN);
  doc.rect(0, H-18, W, 18, "F");

  if(_genId) marcarGenerado(_genId);
  doc.save(`GreenDistrict_${unidad}_${(datos.nombre||"huesped").split(" ")[0]}.pdf`);
}

  // ── Helpers ─────────────────────────────────────────────
  function fc(s) {
    return (s||'').replace(/[áàä]/g,'a').replace(/[éèë]/g,'e')
      .replace(/[íìï]/g,'i').replace(/[óòö]/g,'o').replace(/[úùü]/g,'u')
      .replace(/[ÁÀÄÉÈËÍÌÏÓÒÖÚÙÜ]/g, c => fc(c.toLowerCase()).toUpperCase())
      .replace(/ñ/g,'n').replace(/Ñ/g,'N');
  }

  function wrapText(doc, text, maxW) {
    if (!text || typeof text !== 'string') return [''];
    const words = text.split(' ');
    const lines = [];
    let cur = '';
    for (const w of words) {
      const test = cur ? cur + ' ' + w : w;
      if (doc.getTextWidth(test) <= maxW) { cur = test; }
      else { if (cur) lines.push(cur); cur = w; }
    }
    if (cur) lines.push(cur);
    return lines;
  }

  function header(doc) {
    doc.addImage(LOGO, 'JPEG', W/2 - 72, 18, 144, 54);
  }

  function footer(doc) {
    doc.setFillColor(...DKBLUE);
    doc.rect(0, H - 30, W, 30, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(7);
    doc.text('Km. 2.6 Carretera Punta Mita La Cruz de Huanacaxtle, Nayarit  C.P.63732', 18, H - 10);
    doc.text('seguridad@alamar.com.mx', W / 2, H - 10, { align: 'center' });
    doc.text('Tel. (329) 2956 175', W - 18, H - 10, { align: 'right' });
    doc.setTextColor(0, 0, 0);
  }

  function iconRow(doc, imgData, imgType, x, y, text, maxW) {
    const ih = 14;
    try { doc.addImage(imgData, imgType, x, y - ih + 3, ih, ih); } catch(e) {}
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(9.5);
    const lines = wrapText(doc, text, maxW - 22);
    let ty = y;
    for (const line of lines) { doc.text(line, x + 20, ty); ty += 12; }
    return y + lines.length * 12 + 4;
  }

  function dateRange(entrada, salida) {
    if (!entrada || !salida) return '—';
    if (typeof entrada !== 'string' || typeof salida !== 'string') return '—';
    const mesesES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const mesesEN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const meses = lang === 'en' ? mesesEN : mesesES;
    const [y1,m1s,d1s] = entrada.split('-'); const [,m2s,d2s] = salida.split('-');
    const d1=parseInt(d1s), m1=parseInt(m1s)-1, d2=parseInt(d2s), m2=parseInt(m2s)-1;
    if (lang === 'en') return `${d1}${m1!==m2?' '+meses[m1]:''} - ${d2} ${meses[m2]} ${y1}`;
    return `${d1}${m1!==m2?' de '+meses[m1]:''} - ${d2} de ${meses[m2]} ${y1}`;
  }

  function fmtDateLong(val) {
    if (!val || typeof val !== 'string') return '—';
    const mesesES = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
    const mesesEN = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
    const meses = lang === 'en' ? mesesEN : mesesES;
    const [y1,m1s,d1s] = val.split('-');
    return `${parseInt(d1s)} ${lang==='en'?'OF ':' DE '}${meses[parseInt(m1s)-1]} ${y1}`;
  }

}

function pdfVenetian(datos, ocupantes, _genId) {
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({unit:"pt", format:"letter", putOnlyUsedFonts:true, floatPrecision:16});
  // Helper to fix special chars for jsPDF standard fonts
  function fc(s) {
    return s.replace(/á/g,'á').replace(/é/g,'é').replace(/í/g,'í')
            .replace(/ó/g,'ó').replace(/ú/g,'ú').replace(/ñ/g,'ñ')
            .replace(/Á/g,'Á').replace(/É/g,'É').replace(/Í/g,'Í')
            .replace(/Ó/g,'Ó').replace(/Ú/g,'Ú').replace(/Ñ/g,'Ñ')
            .replace(/ü/g,'ü').replace(/–/g,'-').replace(/—/g,'-')
            .replace(/’/g,"'").replace(/“/g,'"').replace(/”/g,'"')
            .replace(/¿/g,'¿').replace(/¡/g,'¡');
  }
  var W = 612, H = 792;
  var MARGIN = 57, RIGHT = W - 57, TW = RIGHT - MARGIN;
  var LOGO_W = 60, LOGO_H = 64;
  var LOGO_X = RIGHT - LOGO_W;
  var LOGO_TOP = 30;
  var BORDER_TOP = 25, BORDER_H = 742;
  var CONTENT_START = 110;

  var unidad = datos.depto.replace("VENETIAN ","").replace(" T3","");
  var propMap = {"905 T3":"Claudia Chico","906 T3":"Claudia Chico","1010 T3":"Jorge Chico","1903 T3":"Claudia Chico"};
  var ocupMaxMap = {"905 T3":"4","906 T3":"4","1010 T3":"6","1903 T3":"6"};
  var rawDepto = datos.depto.replace("VENETIAN ","");
  var propietario = propMap[rawDepto] || "Claudia Chico";
  var numPersonas = ocupMaxMap[rawDepto] || "6";

  function drawBorder(d) {
    d.setDrawColor(204,165,26); d.setLineWidth(1.5);
    d.rect(BORDER_TOP, BORDER_TOP, W - BORDER_TOP*2, BORDER_H);
  }

  function drawChrome(d, pageNum) {
    drawBorder(d);
    d.addImage(LOGOS.venetian,"JPEG", LOGO_X, LOGO_TOP, LOGO_W, LOGO_H);
    d.setFont("helvetica","italic"); d.setFontSize(8);
    d.setTextColor(120,120,120);
    d.text("pag. " + pageNum, MARGIN, H - 30);
    d.setTextColor(0,0,0);
  }

  function jp(d, text, y, opts) {
    opts = opts || {};
    var font = opts.font || "normal";
    var size = opts.size || 10;
    var leading = opts.leading || 15;
    var gap = (opts.gap === undefined) ? 8 : opts.gap;
    var align = opts.align || "justify";

function pdfQuiya(datos, ocupantes, _genId) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"pt", format:"letter"});
  const W = 612, H = 792;
  const MARGIN = 72, RIGHT = W-72, TW = RIGHT-MARGIN;

  const PROP_MAP = {
    "QUIYA 2005":"FATIMA GONZALEZ",
    "QUIYA 2103":"Ulises Herrera García",
    "QUIYA 2302":"Israel Granados",
    "QUIYA 2403":"RODRIGO CONTRERAS",
    "QUIYA 2701":"CECILIA CHICO",
    "QUIYA 2705":"ANTONIO CHICO",
    "QUIYA 2801":"MARIA ANTONIA TREVINO GARZA",
    "QUIYA 2805":"SENOR CHICO",
    "QUIYA 2905":"CECILIA CHICO",
    "QUIYA 3004":"Rocío Salinas Arias",
  };

  const propietario = PROP_MAP[datos.depto] || "—";
  const villa = datos.depto.replace("QUIYA ","VILLA ");

  function fmtLong(val) {
    if(!val) return "___";
    const meses=["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
    const [y,m,d] = val.split("-");
    return `${parseInt(d)} ${meses[parseInt(m)-1]} ${y}`;
  }

  // y = text baseline; underline goes 4pt below baseline
  function uline(x, y, w) {
    doc.setDrawColor(0,0,0); doc.setLineWidth(0.5);
    doc.line(x, y+4, x+w, y+4);
  }

  // draws label+value, underline spanning from after label to RIGHT, returns y + gap
  function field(label, value, y, gap=36) {
    doc.setFont("helvetica","normal"); doc.setFontSize(12); doc.setTextColor(0,0,0);
    doc.text(label, MARGIN, y);
    const lw = doc.getTextWidth(label);
    doc.setFont("helvetica","bold");
    doc.text(String(value||""), MARGIN+lw+8, y);
    uline(MARGIN+lw+6, y, TW-lw-6);
    return y + gap;
  }

  // ── LAYOUT: y starts at top, increases downward ──
  let y = 60;

  // Logo centered
  doc.addImage(LOGOS.quiya, "JPEG", W/2-50, y, 100, 100);
  y += 120;

  // Title
  doc.setFont("helvetica","bold"); doc.setFontSize(16); doc.setTextColor(0,0,0);
  doc.text("ADMINISTRADORA DE CONDOMINIOS", W/2, y, {align:"center"});
  y += 50;

  // Fields
  y = field("No. De villa:", villa, y, 38);
  y = field("Nombre completo de propietario:", propietario, y, 38);

  // Administrador — 2 lines
  doc.setFont("helvetica","normal"); doc.setFontSize(12); doc.setTextColor(0,0,0);
  const adminLabel = "Nombre completo de administrador:";
  doc.text(adminLabel, MARGIN, y);
  const alw = doc.getTextWidth(adminLabel);
  doc.setFont("helvetica","bold");
  doc.text("CLAUDIA DANIELA", MARGIN+alw+8, y);
  uline(MARGIN+alw+6, y, TW-alw-6);
  y += 26;
  doc.text("RODRIGUEZ MELENDEZ", MARGIN, y);
  uline(MARGIN, y, TW);
  y += 38;

  y = field("Teléfono de contacto:", "322-117-0032", y, 38);
  y = field("No. De personas:", String(datos.personas || ""), y, 38);

  // Adultos
  doc.setFont("helvetica","normal"); doc.setFontSize(12); doc.setTextColor(0,0,0);
  doc.text("Adultos:", MARGIN, y);
  uline(MARGIN + doc.getTextWidth("Adultos:") + 6, y, 35);
  y += 26;
  ocupantes.filter(o => o && o.nombre).forEach(o => {
    doc.setFont("helvetica","bold"); doc.setFontSize(12); doc.setTextColor(0,0,0);
    doc.text(o.nombre, MARGIN+16, y);
    y += 22;
  });
  y += 16;

  // Menores
  doc.setFont("helvetica","normal"); doc.setFontSize(12); doc.setTextColor(0,0,0);
  doc.text("Menores:", MARGIN, y);
  uline(MARGIN + doc.getTextWidth("Menores:") + 6, y, 35);
  y += 22;
  doc.setFont("helvetica","italic"); doc.setFontSize(10); doc.setTextColor(64,64,64);
  doc.text(fc("(Se considera menores a todos aquellos de 1 a 10 años de edad)"), MARGIN+8, y);
  doc.setTextColor(0,0,0);
  y += 40;

  // Gold separator
  doc.setDrawColor(204,165,26); doc.setLineWidth(2);
  doc.line(W/2-25, y, W/2+25, y);
  doc.setDrawColor(0); doc.setLineWidth(0.5);
  y += 36;

  y = field("Fecha de ingreso:", fmtLong(datos.entrada || datos.fecha_entrada), y, 36);
  y = field("Fecha de salida:", fmtLong(datos.salida || datos.fecha_salida), y, 36);

  if(_genId) marcarGenerado(_genId);
  doc.save(`Quiya_${villa.replace("VILLA ","")}_${(datos.nombre||"huesped").split(" ")[0]}.pdf`);
}

function pdfPeninsula(datos, ocupantes) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"pt", format:"letter"});
  // jsPDF: y=0 top, y=792 bottom. All coords are TOP-DOWN.
  const W=612, H=792, ML=54, MR=54, TW=504;
  const FS=10.5, LH=13.5;
  const TEAL=[0,150,150], RED=[200,0,0], BLACK=[0,0,0], GRAY=[115,115,115];
  var pn=1;
  const PAGE_TOP=54, PAGE_BOT=762; // content area top/bottom y

  function fc(s){
    if(!s) return "";
    return String(s).replace(/\u00C1/g,"A").replace(/\u00E1/g,"a")
      .replace(/\u00C9/g,"E").replace(/\u00E9/g,"e")
      .replace(/\u00CD/g,"I").replace(/\u00ED/g,"i")

  function mixedPara(x, y, width, segs){

      words.forEach(function(w,i){
        if(w) tokens.push([w+(i<words.length-1?' ':''), s[1], s[2]]);

    var lines=[], cur=[], cw=0;
    tokens.forEach(function(tok){
      doc.setFont("times", tok[1]?"bold":"normal"); doc.setFontSize(FS);
      var tw=doc.getTextWidth(tok[0]);
      if(cw+tw>width+0.5 && cur.length){ lines.push(cur); cur=[tok]; cw=tw; }
      else { cur.push(tok); cw+=tw; }
    });
    if(cur.length) lines.push(cur);
    lines.forEach(function(line){
      var lx=x;
      line.forEach(function(tok){
        doc.setFont("times", tok[1]?"bold":"normal"); doc.setFontSize(FS); setC(BLACK);
        doc.text(fc(tok[0]), lx, y);
        var tw=doc.getTextWidth(fc(tok[0]));
        if(tok[2]){ doc.setLineWidth(0.5); doc.setDrawColor(0,0,0); doc.line(lx, y+1.5, lx+tw, y+1.5); }

    .forEach(function(ln){ doc.text(ln, ML, y); y+=LH; });
  y+=10;

  // Signature line
  doc.text("Signature", W-MR-100, y+80);
  uline(W-MR-140, y+82, W-MR);

  footer(pn);

  // ── PAGE 3 ───────────────────────────────────────────────────
  doc.addPage(); pn++;

  // Vehicle information
  doc.setFont("times","bold"); doc.setFontSize(13); setC(BLACK);
  var vt="Vehicle information:";
  var vtw=doc.getTextWidth(vt);
  doc.text(vt, W/2, 47, {align:"center"});
  doc.setLineWidth(0.8); doc.setDrawColor(0,0,0);
  doc.line(W/2-vtw/2, 49, W/2+vtw/2, 49);

  // Type / Color / Plates
  var ty=76;
  [[fc("Type:"),fc(datos.vehiculo_tipo||datos.vehiculo||""),ML+30,ML+230],
   [fc("Color:"),fc(datos.vehiculo_color||""),ML+190,ML+330],
   [fc("Plates:"),fc(datos.placas||""),ML+352,W-MR]].forEach(function(f){
    doc.setFont("times","bold"); doc.setFontSize(FS); doc.text(f[0], f[2], ty);
    var lw=doc.getTextWidth(f[0]);
    doc.setFont("times","normal"); doc.text(f[1], f[2]+lw+4, ty);
    uline(f[2]+lw+4, ty+2, f[3]);
  });

  // Other Occupants title
  doc.setFont("times","bold"); doc.setFontSize(13); setC(BLACK);
  doc.text("Information of Other Occupants", W/2, 105, {align:"center"});

  // Occupants 2-10 — original spacing: start y=128, each row 38pt apart
  var oyStart=128, oSpacing=38;
  for(var i=2; i<=10; i++){
    var occ=ocupantes[i-2]||null;
    var nameVal=occ ? fc(occ.nombre||occ.name||"") : "";
    var ageVal=occ ? String(occ.edad||occ.age||"") : "";
    var oy=oyStart+(i-2)*oSpacing;
    doc.setFont("times","bold"); doc.setFontSize(FS); setC(BLACK);
    doc.text(String(i)+".", ML, oy);
    doc.text("Name:", ML+22, oy);
    var nw=doc.getTextWidth("Name:");
    doc.setFont("times","normal"); doc.text(nameVal, ML+22+nw+6, oy);
    uline(ML+22+nw+6, oy+2, W-MR-70);
    doc.setFont("times","bold"); doc.text("Age:", W-MR-62, oy);
    var aw=doc.getTextWidth("Age:");
    doc.setFont("times","normal"); doc.text(ageVal, W-MR-62+aw+4, oy);
    uline(W-MR-62+aw+4, oy+2, W-MR);
  }

  // Bullet notes — y after last occupant row: 128 + 8*38 = 432, + gap
  var by=460;
  [["Only those whose full name is included in this list will be granted access to the Condominium. Only the Owner of the Private Unit is entitled to provide, change or remove names."],
   ["Renters can't have Visitors. Even if Visitors are listed in this Document, they won't be granted access to Tower III. This List is only for occupants of the Unit."]
  ].forEach(function(note){
    doc.setFont("times","bold"); doc.setFontSize(FS); setC(BLACK);
    doc.text("\u2022", ML, by);
    doc.splitTextToSize(fc(note[0]), TW-18).forEach(function(ln){ doc.text(ln, ML+18, by); by+=LH; });
    by+=6;
  });

  // Attach copy text
  doc.setFont("times","bold"); doc.setFontSize(FS);
  doc.splitTextToSize("Attach a copy of the official ID of the person in charge with the visible signature.", TW)
    .forEach(function(ln){ doc.text(ln, W/2, 554, {align:"center"}); });
  doc.setFont("times","normal"); doc.setFontSize(10);
  doc.text(".", W/2, 566, {align:"center"});
  doc.setFont("times","bold"); doc.setFontSize(FS); setC(TEAL);
  doc.text("Document Valid to 2025 - 2026.", W/2, 582, {align:"center"});
  setC(BLACK);

  // ID Photo box
  var PX=54, PY=605, PW=190, PH=150;
  if(datos.foto_id){
    try{
      var fmt=datos.foto_id.indexOf("image/png")>-1?"PNG":"JPEG";
      doc.addImage(datos.foto_id, fmt, PX, PY, PW, PH);
    }catch(e){
      doc.setDrawColor(150,150,150); doc.setLineWidth(0.5); doc.rect(PX,PY,PW,PH,"S");
    }
  } else {
    doc.setDrawColor(150,150,150); doc.setLineWidth(0.5); doc.rect(PX,PY,PW,PH,"S");
    doc.setFont("times","italic"); doc.setFontSize(8); setC([150,150,150]);
    doc.text("[ID Photo]", PX+PW/2, PY+PH/2, {align:"center"}); setC(BLACK);
  }

  // COPIA ID — to the right of photo
  doc.setFont("times","bold"); doc.setFontSize(52); setC(RED);
  doc.text("COPIA ID", 260, 695);
  setC(BLACK);

  footer(pn);

  var fname="Peninsula19E_"+fc(datos.nombre||"huesped").replace(/ /g,"_")+"_"+(datos.entrada||"").replace(/ /g,"")+".pdf";
  doc.save(fname);
}

function leasePeninsula(datos) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"pt", format:"letter"});
  const W=612, H=792, ML=72, MR=72, TW=W-ML-MR;
  const FS=11, LH=15, SMALL=10;
  const BLACK=[0,0,0], GRAY=[100,100,100];

  function fc(s){
    if(!s) return "";
    return String(s).replace(/\u00C1/g,"A").replace(/\u00E1/g,"a")
      .replace(/\u00C9/g,"E").replace(/\u00E9/g,"e")
      .replace(/\u00CD/g,"I").replace(/\u00ED/g,"i")
      .replace(/\u00D3/g,"O").replace(/\u00F3/g,"o")
      .replace(/\u00DA/g,"U").replace(/\u00DC/g,"U")
      .replace(/\u00FA/g,"u").replace(/\u00FC/g,"u")
      .replace(/\u00D1/g,"N").replace(/\u00F1/g,"n")
      .replace(/\u2019/g,"'").replace(/\u00B4/g,"'")
      .replace(/\u00C3\u0091/g,"N").replace(/\u00C3\u00B1/g,"n")
      .replace(/\u00EF\u00BF\u00BD/g,"");
  }
  function setC(rgb){ doc.setTextColor(rgb[0],rgb[1],rgb[2]); }

  var pn=1, PAGE_BOT=740;
  function footer(){}  // no footer on lease

  function chk(y, need){
    if(y+need > PAGE_BOT){ doc.addPage(); pn++; return 72; }
    return y;
  }

  // Wrap and draw a paragraph, returns new y
  function para(x, y, width, text, opts){
    opts = opts||{};
    var font = opts.bold ? "bold" : "normal";
    var fsize = opts.size || FS;
    doc.setFont("helvetica", font); doc.setFontSize(fsize); setC(BLACK);
    var lines = doc.splitTextToSize(fc(text), width);
    lines.forEach(function(ln){ doc.text(ln, x, y); y+=opts.lh||LH; });
    return y + (opts.gap||0);
  }

  // Mixed inline: [[text,bold]]
  function inline(x, y, segs){
    segs.forEach(function(s){
      doc.setFont("helvetica", s[1]?"bold":"normal"); doc.setFontSize(FS); setC(BLACK);
      doc.text(fc(s[0]), x, y);
      x += doc.getTextWidth(fc(s[0]));
    });
    return y+LH;
  }

  // ── Calculate duration ──────────────────────────────────────
  function nightsBetween(d1, d2){
    // d1, d2 = "DD/MM/YYYY" or "YYYY-MM-DD" or "DD MONTH YYYY"
    function parseDate(s){
      if(!s) return null;
      s = String(s).trim();
      // YYYY-MM-DD
      if(/^\d{4}-\d{2}-\d{2}$/.test(s)){
        var p=s.split("-"); return new Date(p[0],p[1]-1,p[2]);
      }
      // DD/MM/YYYY
      if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){
        var p=s.split("/"); return new Date(p[2],p[1]-1,p[0]);
      }
      // Try native
      return new Date(s);
    }
    var a=parseDate(d1), b=parseDate(d2);
    if(!a||!b||isNaN(a)||isNaN(b)) return null;
    return Math.round((b-a)/(1000*60*60*24));
  }
  function nightsText(n){

               "eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen","twenty"];
    var w = n<=20 ? words[n-1] : String(n);
    return w+" ("+n+") "+(n===1?"night":"nights");
  }

    if(!s) return "";
    s=String(s).trim();

    if(/^\d{4}-\d{2}-\d{2}$/.test(s)){
      var p=s.split("-");
      return months[parseInt(p[1])-1]+" "+parseInt(p[2])+", "+p[0];
    }

      var p=s.split("/");
      return months[parseInt(p[1])-1]+" "+parseInt(p[2])+", "+p[2];
    }
    return s;
  }

  // Mixed inline paragraph — segs=[[text,bold,underline]]
  function mixedPara(x,y,width,segs){
    var tokens=[];
    segs.forEach(function(s){
      s[0].split(' ').forEach(function(w,i,arr){
        if(w) tokens.push([w+(i<arr.length-1?' ':''), s[1]||false, s[2]||false]);
      });
    });
    var lines=[],cur=[],cw=0;
    tokens.forEach(function(tok){
      doc.setFont("times",tok[1]?"bold":"normal"); doc.setFontSize(FS);
      var tw=doc.getTextWidth(tok[0]);
      if(cw+tw>width+0.5&&cur.length){lines.push(cur);cur=[tok];cw=tw;}
      else{cur.push(tok);cw+=tw;}
    });
    if(cur.length) lines.push(cur);
    lines.forEach(function(line){
      var lx=x;
      line.forEach(function(tok){
        doc.setFont("times",tok[1]?"bold":"normal"); doc.setFontSize(FS); setC(BLACK);
        doc.text(tok[0],lx,y);
        var tw=doc.getTextWidth(tok[0]);
        if(tok[2]){doc.setLineWidth(0.5);doc.setDrawColor(0,0,0);doc.line(lx,y+1.5,lx+tw,y+1.5);}
        lx+=tw;
      });
      y+=LH;
    });
    return y;
  }

    ["4.-",[[" Las promesas, o reglas no explicadas, durante el proceso de renta de una unidad Privativa no tendran influencia sobre la aplicacion de reglas en el Condominio. Es responsabilidad de cada persona leer y firmar las reglas antes de ingresar a Torre I. Estas reglas estan por encima de cualquier aseveracion u omision realizada por quien haya rentado una unidad privativa en el Condominio.",false,false]]],

    ["6.-",[[" Toda persona que no sea propietario tendra que usar un brazalete en todo momento,",true,false],[" se le colocara un brazalete en el momento de su registro en la recepcion, el cual debe usar durante toda su estadia en el condominio; al finalizar su estadia debera de entregar su brazalete en la recepcion, de lo contrario debe pagar una multa; cada brazalete extraviado o no entregado en la recepcion tiene un costo de $1,000.00 MXN. (un mil pesos); este pago debe ser realizado en la Administracion.",false,false]]],
    ["7.-",[[" Se tomara accion legal inmediata en contra de todo aquel que intente usar un brazalete o identificacion falsa; todas las personas relacionadas con el uso de brazaletes o identificaciones apocrifas seran retiradas del Condominio.",false,false]]],

    ["11.-",[[" Las Unidades Privativas del Condominio no se pueden rentar por menos de 3 (tres) noches; se impondran multas a aquellos que no respeten esta regla.",false,false]]],
    ["12.-",[[" El uso del gimnasio y del jacuzzi interior es de uso exclusivo de Condominos (propietarios) y residentes (estancias de largo plazo) de Torre I.",false,false]]],
    ["13.-",[[" Las recargas Electricas se haran entre semana, de lunes a viernes a las 16:00 horas. No se haran recargas electricas a unidades privativas que presenten adeudos en sus cuotas de mantenimiento u otras responsabilidades condominales.",false,false]]],
    ["14.-",[[" El Condominio tiene camaras grabando las 24 horas, almacenando sonidos, imagenes y videos en un servidor en linea.",false,false]]],
    ["15.-",[[" El unico criterio usado en Torre I es aquel expresado ano tras ano por los Condominos en su Asamblea Anual. Las decisiones y acciones de la Administracion y del Departamento de Seguridad de este Condominio, se basaran exclusivamente en las Reglas del mismo. Aquellos cuyos intereses o cuyo criterio no comulguen con este reglamento, deberan de abstenerse de pedir o exigir excepciones.",false,false]]],
    ["16.-",[[" Los rentistas tendran que dejar las instalaciones una vez que hayan entregado la llave de la unidad privativa al Condomino o Administrador de la unidad que se les haya prestado o rentado.",false,false]]],
    ["17.-",[[" Limpieza, Administracion, Seguridad y Mantenimiento de las Unidades Privativas no dependen de la Administracion de Torre I, sino del dueno o usuario de cada unidad privativa.",false,false]]],
    ["18.-",[[" En el area de albercas solo se permite el uso de auriculares personales; ",false,false],["NO",true,false],[" se permiten instrumentos y/o aparatos reproductores de musica. (bocinas, telefono celular, tableta, computadora o IPad, etc.)",false,false]]],
    ["19.-",[[" Por medidas de seguridad no se permiten objetos de vidrio en el area de alberca y playa. (Botellas, vasos, platos, tazas, etc.)",false,false]]],
    ["20.-",[[" Para el uso de albercas los Bebes deben portar panales especiales para alberca. No se permiten los panales regulares o que el bebe se encuentre desnudo en el area.",false,false]]]
  ];

  rules.forEach(function(rule){
    if(rule[0]==="9.-"){
      var need=LH*6+GAP;
      y=chk(y,need);
      drawNum(ML,y,"8.-");
      doc.setFont("times","bold"); doc.setFontSize(FS); setC(BLACK);
      doc.text("Ocupaciones Maximas por Tipo de Unidad:",BX,y); y+=LH;
      [["  \u2022 Unidades A:","10 personas"],["  \u2022 Unidades B y C:","8 personas"],["  \u2022 Unidades D y E:","6 personas."]].forEach(function(b){
        doc.setFont("times","bold"); doc.text(b[0],BX+10,y);
        var lw=doc.getTextWidth(b[0]);
        doc.setFont("times","normal"); doc.text(b[1],BX+10+lw+4,y); y+=LH;
      });
      doc.setFont("times","bold");
      doc.splitTextToSize("Las ocupaciones maximas aqui presentadas, toda persona cuenta, incluyendo bebes y empleados.",BW)
        .forEach(function(ln){ doc.text(ln,BX,y); y+=LH; });
      y+=GAP;
    }
    var fullTxt=rule[1].map(function(s){return s[0];}).join("");
    y=chk(y,Math.max(1,Math.ceil(fullTxt.length/62))*LH+GAP);
    drawNum(ML,y,rule[0]);
    y=mixedPara(BX,y,BW,rule[1]);
    y+=GAP;
  });

  // ── Undersigned + fields ────────────────────────────────────
  y=chk(y,LH*4+14);
  y+=14;
  doc.setFont("times","italic"); doc.setFontSize(FS); setC(BLACK);
  doc.splitTextToSize("El abajo firmante acepta la plena responsabilidad de su estancia en el Condominio, la Unidad y todos sus ocupantes. Ademas, el abajo firmante reconoce su comprension, aceptacion y recepcion de este documento.",TW-20)
    .forEach(function(ln){ doc.text(ln,ML+10,y); y+=LH; });
  y+=8;

  function dataField(label,value,x,lineEnd){
    doc.setFont("times","bold"); doc.setFontSize(FS); setC(BLACK);
    doc.text(label,x,y);
    var lw=doc.getTextWidth(label);
    doc.setFont("times","normal"); doc.text(fc(value||""),x+lw,y);
    uline(x+lw,y+2,lineEnd);
  }

  // 1. Nombre + Edad
  doc.setFont("times","bold"); doc.setFontSize(FS); setC(BLACK);
  doc.text("1. Nombre (Segun ID Oficial): ",ML,y);
  var nLW=doc.getTextWidth("1. Nombre (Segun ID Oficial): ");
  doc.setFont("times","normal"); doc.text(fc(datos.nombre||""),ML+nLW,y);
  uline(ML+nLW,y+2,ML+320);
  doc.setFont("times","bold"); doc.text("Edad:",ML+328,y);
  var aLW=doc.getTextWidth("Edad:");
  doc.setFont("times","normal"); doc.text(String(datos.edad||""),ML+328+aLW+4,y);
  uline(ML+328+aLW+4,y+2,W-MR); y+=18;

  dataField("Direccion: ",datos.direccion,ML,W-MR); y+=18;
  dataField("E-mail: ",datos.correo,ML,W-MR); y+=18;
  dataField("Telefono (10 digitos): ",datos.telefono,ML,W-MR); y+=18;

  doc.setFont("times","bold"); doc.setFontSize(FS);
  doc.text("Fecha de Ingreso: ",ML,y);
  var ci=doc.getTextWidth("Fecha de Ingreso: ");
  doc.setFont("times","normal"); doc.text(" "+(datos.entrada||""),ML+ci,y);
  uline(ML+ci,y+2,ML+230);
  doc.setFont("times","bold"); doc.text("Fecha de Salida: ",ML+248,y);
  var co=doc.getTextWidth("Fecha de Salida: ");
  doc.setFont("times","normal"); doc.text(" "+(datos.salida||""),ML+248+co,y);
  uline(ML+248+co,y+2,W-MR); y+=16;

  // bullet + responsible line
  doc.setFont("times","bold"); doc.setFontSize(FS); setC(BLACK);
  doc.text("\u2022",ML,y);
  doc.splitTextToSize("Esta persona sera responsable por el Departamento y por las demas personas que se hospedaran en dicha unidad privativa",TW-18)
    .forEach(function(ln){ doc.text(ln,ML+18,y); y+=LH; });
  y+=6;

  // Firma line
  doc.setFont("times","normal"); doc.text("Firma",W-MR-30,y); y+=4;
  uline(W-MR-80,y,W-MR);

  footer(pn);

  // ── PAGE 3 ──────────────────────────────────────────────────
  doc.addPage(); pn++;

  // "Datos del Vehiculo:" — bold underlined centered
  doc.setFont("times","bold"); doc.setFontSize(13); setC(BLACK);
  var vt="Datos del Vehiculo:";
  var vtw=doc.getTextWidth(vt);
  doc.text(vt,W/2,60,{align:"center"});
  doc.setLineWidth(0.8); doc.setDrawColor(0,0,0);
  doc.line(W/2-vtw/2,62,W/2+vtw/2,62);

  // Marca / Color / Placas
  var ty=114;
  [["Marca:",fc(datos.vehiculo_tipo||datos.vehiculo||""),ML+35,ML+210],
   ["Color:",fc(datos.vehiculo_color||""),ML+200,ML+340],
   ["Placas:",fc(datos.placas||""),ML+352,W-MR]].forEach(function(f){
    doc.setFont("times","bold"); doc.setFontSize(FS); doc.text(f[0],f[2],ty);
    var lw=doc.getTextWidth(f[0]);
    doc.setFont("times","normal"); doc.text(f[1],f[2]+lw+4,ty);
    uline(f[2]+lw+4,ty+2,f[3]);
  });

  // Otros huespedes title
  doc.setFont("times","bold"); doc.setFontSize(13); setC(BLACK);
  doc.text("Informacion de los Otros Huespedes",W/2,139,{align:"center"});

  // Occupants 2-10 — spacing 37pt each from y=168
  var oyStart=168, oSpacing=37;
  for(var i=2;i<=10;i++){
    var occ=ocupantes[i-2]||null;
    var nameVal=occ?fc(occ.nombre||occ.name||""):"";
    var ageVal=occ?String(occ.edad||occ.age||""):"";
    var oy=oyStart+(i-2)*oSpacing;
    doc.setFont("times","bold"); doc.setFontSize(FS); setC(BLACK);
    doc.text(String(i)+".",ML,oy);
    doc.text("Nombre:",ML+22,oy);
    var nw=doc.getTextWidth("Nombre:");
    doc.setFont("times","normal"); doc.text(nameVal,ML+22+nw+6,oy);
    uline(ML+22+nw+6,oy+2,W-MR-70);
    doc.setFont("times","bold"); doc.text("Edad:",W-MR-62,oy);
    var aw=doc.getTextWidth("Edad:");
    doc.setFont("times","normal"); doc.text(ageVal,W-MR-62+aw+4,oy);
    uline(W-MR-62+aw+4,oy+2,W-MR);
  }

  // Bullets — y after last occ: 168 + 8*37 = 464
  var by=505;
  [["Solamente aquellas personas cuyo nombre este incluido en esta lista podran ingresar al Condominio y solo el propietario puede hacerle cambios a la lista."],
   ["Los inquilinos no pueden tener visitantes. Incluso si los Visitantes aparecen en este documento, no se les otorgara acceso a la Torre I. Esta lista es solo para los ocupantes de la Unidad."]
  ].forEach(function(note){
    doc.setFont("times","bold"); doc.setFontSize(FS); setC(BLACK);
    doc.text("\u2022",ML,by);
    doc.splitTextToSize(note[0],TW-18).forEach(function(ln){ doc.text(ln,ML+18,by); by+=LH; });
    by+=4;
  });

  // "Anexar copia..." + "Documento Vigente"
  doc.setFont("times","bold"); doc.setFontSize(FS);
  doc.splitTextToSize("Anexar copia de Identificacion Oficial del responsable con la firma visible.",TW)
    .forEach(function(ln){ doc.text(ln,W/2,579,{align:"center"}); });

  // "Documento Vigente 2025 - 2026." — teal
  doc.setFont("times","bold"); doc.setFontSize(FS); setC(TEAL);
  doc.text("Documento Vigente 2025 - 2026.",W/2,594,{align:"center"});
  setC(BLACK);

  // ID Photo — original: Rect(36,613,287,761) → x=36,y=613,w=251,h=148
  var PX=36, PY=613, PW=195, PH=148;
  if(datos.foto_id){
    try{
      var fmt=datos.foto_id.indexOf("image/png")>-1?"PNG":"JPEG";
      doc.addImage(datos.foto_id,fmt,PX,PY,PW,PH);
    }catch(e){
      doc.setDrawColor(150,150,150); doc.setLineWidth(0.5); doc.rect(PX,PY,PW,PH,"S");
    }
  } else {
    doc.setDrawColor(150,150,150); doc.setLineWidth(0.5); doc.rect(PX,PY,PW,PH,"S");
    doc.setFont("times","italic"); doc.setFontSize(8); setC([150,150,150]);
    doc.text("[Foto ID]",PX+PW/2,PY+PH/2,{align:"center"}); setC(BLACK);
  }

  // COPIA ID image — original at x=377,y=625,w=133,h=26 (appears twice mirrored)
  doc.addImage("data:image/png;base64,"+COPIA_IMG,"PNG",252,625,200,38);

  footer(pn);

  var fname="CheckIn_Peninsula19E_ES_"+fc(datos.nombre||"huesped").replace(/ /g,"_")+"_"+(datos.entrada||"").replace(/ /g,"")+".pdf";
  doc.save(fname);
}

${numDepto}

  overlay.classList.add("overlay-modal");

}

function enviarWA(btn) {
  const pre = document.getElementById('modal-texto');
  const raw = pre ? pre.textContent : '';
  const match = raw.match(/Enviar a:\s*([\+\d][\d\s]+)/);
  if (!match) { alert('Número no encontrado'); return; }
  const num = match[1].replace(/\s/g, '');
  const msg = raw.replace(/.*Enviar a:[^\n]*\n?/, '').trim();
  window.open('https://wa.me/' + num + '?text=' + encodeURIComponent(msg), '_blank');
}

const FRAKCIO_PREFIJOS = ["ARIA","MARITIMA","BOLONGO","ZOHO","PUERTARENA","BAY VIEW","ZANTAMAR"];
function esFrakcio(depto) {
  const d = depto.toUpperCase().trim();
  return FRAKCIO_PREFIJOS.some(p => d.startsWith(p));
}
const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbPcCF6EoM93GIga20ntKOsuys9KLp4gkG2czTR4qyy_nASRil8qURTuceB_Rw5PEMR_us7EpQNADX/pub?gid=220927923&single=true&output=csv";

async function cargarFrakcioQR(fechaISO) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/frakcio_qr?fecha=eq.${fechaISO}&select=*`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    frakcioQR = await res.json();
  } catch(e) { console.warn("cargarFrakcioQR:", e); frakcioQR = []; }
}

async function marcarQREnviado(depto, fechaISO) {
  const existing = frakcioQR.find(x => x.depto === depto && x.fecha === fechaISO);
  if(existing) {
    // Update
    await fetch(`${SUPABASE_URL}/rest/v1/frakcio_qr?id=eq.${existing.id}`, {
      method: "PATCH", keepalive: true,
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json", "Prefer": "return=minimal" },
      body: JSON.stringify({qr_enviado: true})
    });
    existing.qr_enviado = true;
  } else {
    // Insert
    const res = await fetch(`${SUPABASE_URL}/rest/v1/frakcio_qr`, {
      method: "POST", keepalive: true,
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json", "Prefer": "return=representation" },
      body: JSON.stringify({depto, fecha: fechaISO, qr_enviado: true})
    });
    const data = await res.json();
    if(data[0]) frakcioQR.push(data[0]);
  }
  // Refrescar sección
  cargarEntradas();
}

async function cargarEntradas() {
  const container = document.getElementById('entradas-dias-container');
  if(!container) return;
  const DIAS = 5; // hoy + 4
  const MESES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];

  try {
    const res = await fetch(SHEET_CSV);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = text.split('\n').map(r => r.split(','));

    const hoy = new Date();
    hoy.setHours(0,0,0,0);

    // Cargar frakcioQR para rango de fechas
    const fechasISO = [];
    for(let i=0; i<DIAS; i++) {
      const d = new Date(hoy); d.setDate(hoy.getDate()+i);
      const yyyy = d.getFullYear();
      const mm0 = String(d.getMonth()+1).padStart(2,'0');
      const dd0 = String(d.getDate()).padStart(2,'0');
      fechasISO.push(`${yyyy}-${mm0}-${dd0}`);
    }

    // Cargar todos los frakcioQR del rango
    try {
      const qres = await fetch(`${SUPABASE_URL}/rest/v1/frakcio_qr?fecha=gte.${fechasISO[0]}&fecha=lte.${fechasISO[DIAS-1]}&select=*`, {
        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
      });
      frakcioQR = await qres.json();
    } catch(e) { frakcioQR = []; }

    // Construir pills por día
    let html = '<div class="entradas-dias-wrapper">';

    for(let i=0; i<DIAS; i++) {
      const dia = new Date(hoy); dia.setDate(hoy.getDate()+i);
      const fechaHoy = `${dia.getDate()}/${dia.getMonth()+1}/${dia.getFullYear()}`;
      const fechaISO = fechasISO[i];
      const label = i===0 ? `HOY — ${dia.getDate()} ${MESES[dia.getMonth()]}`
                  : i===1 ? `MAÑANA — ${dia.getDate()} ${MESES[dia.getMonth()]}`
                  : `${dia.getDate()} ${MESES[dia.getMonth()]}`;

      const entradas = rows.filter((r,ri) => {
        if(ri===0) return false;
        const fecha = (r[0]||'').trim().replace(/"/g,'');
        const depto = (r[2]||'').trim().replace(/"/g,'');
        return depto && fecha === fechaHoy;
      });

      if(entradas.length === 0) continue;

      // Separar sin registro, frakcio
      function matchReg(depto, fechaISO) {
        const d = depto.toUpperCase();
        return todosRegistros.find(x => {
          const xd = (x.depto||'').toUpperCase().trim();
          const deptoMatch = xd === d || xd.startsWith(d+' ') || d.startsWith(xd+' ');
          const fechaMatch = x.fecha_entrada === fechaISO;
          return deptoMatch && fechaMatch;
        });
      }

      const sinReg = entradas.filter(r => {
        const depto = (r[2]||'').trim().replace(/"/g,'').toUpperCase();
        if(esFrakcio(depto)) return false;
        return !matchReg(depto, fechaISO);
      });

      const conReg = entradas.filter(r => {
        const depto = (r[2]||'').trim().replace(/"/g,'').toUpperCase();
        if(esFrakcio(depto)) return false;
        return !!matchReg(depto, fechaISO);
      });

      const frakcioHoy = entradas.filter(r => esFrakcio((r[2]||'').trim().replace(/"/g,'')));
      const frakcioQRPend = frakcioHoy.filter(r => {
        const depto = (r[2]||'').trim().replace(/"/g,'');
        const qrRec = frakcioQR.find(x => x.depto.toUpperCase()===depto.toUpperCase() && x.fecha===fechaISO);
        return !qrRec || !qrRec.qr_enviado;
      });

      const pendientes = sinReg.length + frakcioQRPend.length;
      const countLabel = pendientes > 0
        ? `<span style="color:var(--red);margin-left:8px;font-size:11px;">(${pendientes} pendiente${pendientes>1?'s':''})</span>`
        : `<span style="color:var(--green);margin-left:8px;font-size:11px;">✓</span>`;

      // Rows
      let rows_html = '';

      sinReg.forEach(r => {
        const depto = (r[2]||'').trim().replace(/"/g,'');
        rows_html += `<div class="entrada-row">
          <div class="entrada-depto">${depto}</div>
          <div class="entrada-guest" style="color:var(--red);font-size:11px;flex:1;">sin registro</div>
          <span class="btn-copy-link" data-copy="${depto}" onclick="copiarLink('${depto}')" style="cursor:pointer;">🔗 Link</span>
        </div>`;
      });

      conReg.forEach(r => {
        const depto = (r[2]||'').trim().replace(/"/g,'').toUpperCase();
        const reg = matchReg(depto, fechaISO);
        const nombre = reg ? (reg.nombre||'') : '';
        const badge = reg && reg.pdf_generado
          ? `<span class="entrada-badge badge-ok">✓ Generado</span>`
          : reg && reg.tipo_formato==='pdf'
            ? `<span class="entrada-badge badge-pdf" onclick="generarFormato('${reg.id}')">Generar PDF</span>`
            : reg && reg.tipo_formato==='whatsapp'
            ? `<span class="entrada-badge badge-pdf" style="cursor:pointer;" onclick="generarFormato('${reg.id}')">Copiar msg</span>`
            : `<span class="entrada-badge badge-ok">✓ Registro</span>`;
        rows_html += `<div class="entrada-row">
          <div class="entrada-depto" style="color:var(--muted)">${reg ? reg.depto : depto}</div>
          <div class="entrada-guest" style="font-size:12px;flex:1;">${nombre}</div>
          ${badge}
        </div>`;
      });

      frakcioHoy.forEach(r => {
        const depto = (r[2]||'').trim().replace(/"/g,'');
        const qrRec = frakcioQR.find(x => x.depto.toUpperCase()===depto.toUpperCase() && x.fecha===fechaISO);
        const qrOk  = qrRec && qrRec.qr_enviado;
        const badge = qrOk
          ? `<span class="entrada-badge badge-ok">✓ QR enviado</span>`
          : `<span class="entrada-badge" style="background:rgba(232,197,106,.12);color:var(--accent);border:1px solid rgba(232,197,106,.3);font-size:11px;padding:3px 10px;border-radius:12px;font-family:var(--mono);cursor:pointer;" onclick="marcarQREnviado('${depto}','${fechaISO}')">QR pendiente</span>`;
        rows_html += `<div class="entrada-row">
          <div class="entrada-depto" style="${qrOk?'color:var(--muted)':''}">${depto}</div>
          <div class="entrada-guest" style="font-size:11px;color:var(--muted);flex:1;"></div>
          ${badge}
        </div>`;
      });

      html += `<div class="entradas-section">
        <div class="entradas-header" onclick="toggleDia(${i})">
          <h3>📅 ${label} ${countLabel}</h3>
          <span class="eh-meta">${entradas.length} entrada${entradas.length>1?'s':''}</span>
        </div>
        <div class="entradas-body${i>0?' hidden':''}" id="eh-body-${i}">
          ${rows_html}
        </div>
      </div>`;
    }

    html += '</div>';
    container.innerHTML = html;

  } catch(e) {
    container.innerHTML = `<div style="color:var(--red);font-size:12px;font-family:var(--mono);padding:8px 0 16px;">Error cargando sheet: ${e.message}</div>`;
    console.error('cargarEntradas:', e);
  }
}
