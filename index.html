<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Formatos — VRN</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f10;
    --surface: #18181b;
    --surface2: #1f1f24;
    --border: #2a2a30;
    --accent: #e8c56a;
    --accent2: #6ab4e8;
    --green: #5ae8a0;
    --red: #e86a6a;
    --text: #f0f0f0;
    --muted: #888;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex; align-items: center; gap: 16px;
    background: var(--surface);
  }
  .logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 2px; }
  .logo span { color: var(--muted); }
  header h1 { font-size: 15px; font-weight: 500; color: var(--text); }

  .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-family: var(--mono); }
  input, select, textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--sans); font-size: 14px;
    padding: 9px 12px; outline: none; transition: border-color .2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }
  select option { background: var(--surface2); }

  .ocupantes-grid { display: grid; gap: 8px; margin-top: 8px; }
  .ocupante-row { display: grid; grid-template-columns: 1fr 140px 32px; gap: 8px; align-items: center; }
  .btn-remove {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 5px; cursor: pointer; font-size: 16px; padding: 4px 8px;
    transition: all .2s;
  }
  .btn-remove:hover { border-color: var(--red); color: var(--red); }
  .btn-add {
    background: none; border: 1px dashed var(--border); color: var(--muted);
    border-radius: 6px; cursor: pointer; font-size: 12px; padding: 8px;
    width: 100%; margin-top: 8px; transition: all .2s; font-family: var(--mono);
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }

  /* DEPTO SELECTOR */
  .depto-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
  .depto-btn {
    padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted); cursor: pointer; font-size: 12px;
    font-family: var(--mono); transition: all .2s; text-align: center;
  }
  .depto-btn:hover { border-color: var(--accent); color: var(--accent); }
  .depto-btn.active { border-color: var(--accent); background: rgba(232,197,106,.12); color: var(--accent); }
  .depto-btn .tipo-badge {
    display: block; font-size: 9px; color: var(--muted); margin-top: 2px; letter-spacing: 1px;
  }
  .depto-btn.active .tipo-badge { color: var(--accent); opacity: .7; }

  .tipo-pdf .tipo-badge { color: #e8a06a !important; }
  .tipo-whatsapp .tipo-badge { color: var(--green) !important; }
  .tipo-correo .tipo-badge { color: var(--accent2) !important; }
  .tipo-frakcio .tipo-badge { color: #c06ae8 !important; }
  .tipo-comunidad .tipo-badge { color: #e86a9e !important; }
  .tipo-gforms .tipo-badge { color: var(--accent) !important; }
  .tipo-condovive .tipo-badge { color: #6ae8d4 !important; }

  .tipo-indicator {
    display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px;
    border-radius: 20px; font-size: 12px; font-family: var(--mono); margin-bottom: 16px;
  }
  .tipo-indicator .dot { width: 8px; height: 8px; border-radius: 50%; }
  .ind-pdf { background: rgba(232,160,106,.12); color: #e8a06a; }
  .ind-pdf .dot { background: #e8a06a; }
  .ind-whatsapp { background: rgba(90,232,160,.12); color: var(--green); }
  .ind-whatsapp .dot { background: var(--green); }
  .ind-correo { background: rgba(106,180,232,.12); color: var(--accent2); }
  .ind-correo .dot { background: var(--accent2); }
  .ind-frakcio { background: rgba(192,106,232,.12); color: #c06ae8; }
  .ind-frakcio .dot { background: #c06ae8; }
  .ind-comunidad { background: rgba(232,106,158,.12); color: #e86a9e; }
  .ind-comunidad .dot { background: #e86a9e; }
  .ind-gforms { background: rgba(232,197,106,.12); color: var(--accent); }
  .ind-gforms .dot { background: var(--accent); }
  .ind-condovive { background: rgba(106,232,212,.12); color: #6ae8d4; }
  .ind-condovive .dot { background: #6ae8d4; }

  .btn-generate {
    width: 100%; padding: 14px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 15px; font-family: var(--mono); font-weight: 500; letter-spacing: 1px;
    background: var(--accent); color: #0f0f10; transition: all .2s; margin-top: 8px;
  }
  .btn-generate:hover { background: #f0d070; }
  .btn-generate:disabled { opacity: .4; cursor: default; }

  /* OUTPUT */
  #output-section { display: none; }
  .output-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .output-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    background: var(--surface2);
  }
  .output-title { font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: 1px; }
  .btn-copy {
    padding: 6px 14px; border-radius: 5px; border: 1px solid var(--border);
    background: none; color: var(--muted); cursor: pointer; font-size: 12px;
    font-family: var(--mono); transition: all .2s;
  }
  .btn-copy:hover { border-color: var(--green); color: var(--green); }
  .btn-copy.copied { border-color: var(--green); color: var(--green); }
  #output-text {
    padding: 20px; font-family: var(--mono); font-size: 13px; line-height: 1.7;
    color: #ddd; white-space: pre-wrap; max-height: 500px; overflow-y: auto;
  }
  .whatsapp-number {
    background: rgba(90,232,160,.08); border: 1px solid rgba(90,232,160,.25);
    border-radius: 8px; padding: 12px 16px; margin-top: 12px;
    font-family: var(--mono); font-size: 13px; color: var(--green);
    display: flex; align-items: center; gap: 10px;
  }

  .pdf-note {
    background: rgba(232,160,106,.08); border: 1px solid rgba(232,160,106,.25);
    border-radius: 8px; padding: 14px 16px; margin-top: 12px; font-size: 13px;
    color: #e8a06a;
  }
  .pdf-btn {
    display: inline-block; margin-top: 10px; padding: 8px 18px; border-radius: 6px;
    background: #e8a06a; color: #0f0f10; font-family: var(--mono); font-size: 12px;
    cursor: pointer; border: none; font-weight: 500; transition: all .2s;
  }
  .pdf-btn:hover { background: #f0b070; }

  .search-box { margin-bottom: 12px; }

  .section-header { font-size: 11px; font-family: var(--mono); color: var(--muted); letter-spacing: 1px; padding: 4px 0 8px; border-top: 1px solid var(--border); margin-top: 10px; }
  .section-header:first-child { border-top: none; margin-top: 0; }

  .no-depto { color: var(--muted); font-size: 13px; font-style: italic; padding: 8px 0; }
</style>
</head>
<body>

<header>
  <div class="logo">VRN<span>/</span>GEN</div>
  <h1>Generador de Formatos de Check-in</h1>
</header>

<div class="container">

  <!-- PASO 1: DEPTO -->
  <div class="card">
    <div class="card-title">01 — Selecciona el Departamento</div>
    <div class="search-box">
      <input type="text" id="search-depto" placeholder="Buscar depto…" oninput="filtrarDeptos(this.value)">
    </div>
    <div id="depto-container" class="depto-selector"></div>
  </div>

  <!-- TIPO DETECTADO -->
  <div id="tipo-section" style="display:none; margin-bottom:20px;">
    <div id="tipo-indicator" class="tipo-indicator"></div>
  </div>

  <!-- PASO 2: DATOS HUÉSPED -->
  <div class="card">
    <div class="card-title">02 — Datos del Huésped</div>
    <div class="grid2" style="margin-bottom:14px;">
      <div>
        <label>Nombre completo (responsable del grupo)</label>
        <input type="text" id="nombre" placeholder="Ej: María González López">
      </div>
      <div>
        <label>Teléfono / WhatsApp</label>
        <input type="text" id="telefono" placeholder="+52 33 1234 5678">
      </div>
    </div>
    <div id="correo-row" style="margin-bottom:14px; display:none;">
      <label>Correo electrónico <span style="color:var(--muted);font-size:11px;">(opcional — Frakcio)</span></label>
      <input type="email" id="correo_huesped" placeholder="huesped@email.com">
    </div>
    <div class="grid3" style="margin-bottom:14px;">
      <div>
        <label>Fecha de llegada</label>
        <input type="date" id="fecha_entrada">
      </div>
      <div>
        <label>Fecha de salida</label>
        <input type="date" id="fecha_salida">
      </div>
      <div>
        <label>No. de personas total</label>
        <input type="number" id="num_personas" min="1" max="20" value="2">
      </div>
    </div>
    <div class="grid3" style="margin-bottom:14px;">
      <div>
        <label>Adultos</label>
        <input type="number" id="adultos" min="0" value="2">
      </div>
      <div>
        <label>Menores</label>
        <input type="number" id="menores" min="0" value="0">
      </div>
      <div>
        <label>Mascotas</label>
        <input type="number" id="mascotas" min="0" value="0">
      </div>
    </div>
    <div class="grid2">
      <div>
        <label>Vehículo — Modelo / Color</label>
        <input type="text" id="vehiculo_modelo" placeholder="Ej: Tiguan / Blanca">
      </div>
      <div>
        <label>Placas</label>
        <input type="text" id="vehiculo_placas" placeholder="Ej: ABC-1234">
      </div>
    </div>
  </div>

  <!-- PASO 3: OCUPANTES -->
  <div class="card">
    <div class="card-title">03 — Lista de Ocupantes</div>
    <div id="ocupantes-list" class="ocupantes-grid"></div>
    <button class="btn-add" onclick="agregarOcupante()">+ Agregar ocupante</button>
  </div>

  <!-- GENERAR -->
  <button class="btn-generate" id="btn-gen" onclick="generar()" disabled>GENERAR FORMATO</button>

  <!-- OUTPUT -->
  <div id="output-section" style="margin-top:24px;">
    <div class="output-card">
      <div class="output-header">
        <span class="output-title" id="output-label">OUTPUT</span>
        <button class="btn-copy" id="btn-copy" onclick="copiar()">Copiar</button>
      </div>
      <div id="output-text"></div>
    </div>
    <div id="whatsapp-number" class="whatsapp-number" style="display:none;"></div>
    <div id="pdf-note" class="pdf-note" style="display:none;"></div>
  </div>

</div>

<script>
// ============================================================
// MAPA COMPLETO DE DEPTOS → TIPO + DATOS EXTRA
// ============================================================
const DEPTOS = {
  // ── PDF ──────────────────────────────────────────────────
  "QUIYA 2302":     { tipo:"pdf",       template:"quiya",    label:"Quiya 2302" },
  "QUIYA 2005":     { tipo:"pdf",       template:"quiya",    label:"Quiya 2005" },
  "QUIYA 2403":     { tipo:"pdf",       template:"quiya",    label:"Quiya 2403" },
  "QUIYA 2701":     { tipo:"pdf",       template:"quiya",    label:"Quiya 2701" },
  "QUIYA 2705":     { tipo:"pdf",       template:"quiya",    label:"Quiya 2705" },
  "QUIYA 2801":     { tipo:"pdf",       template:"quiya",    label:"Quiya 2801" },
  "QUIYA 2804":     { tipo:"pdf",       template:"quiya",    label:"Quiya 2804" },
  "QUIYA 2805":     { tipo:"pdf",       template:"quiya",    label:"Quiya 2805" },
  "QUIYA 2905":     { tipo:"pdf",       template:"quiya",    label:"Quiya 2905" },
  "QUIYA 3004":     { tipo:"pdf",       template:"quiya",    label:"Quiya 3004" },
  "ALBATROS 301 A": { tipo:"pdf",       template:"albatros", label:"Albatros 301-A" },
  "GD 103A":        { tipo:"pdf",       template:"gd",       label:"GD 103-A" },
  "GD 202B":        { tipo:"pdf",       template:"gd",       label:"GD 202-B" },
  "GD 303A":        { tipo:"pdf",       template:"gd",       label:"GD 303-A" },
  "GD 501B":        { tipo:"pdf",       template:"gd",       label:"GD 501-B" },
  "GD 501E":        { tipo:"pdf",       template:"gd",       label:"GD 501-E" },
  "ALAMAR 503":     { tipo:"pdf",       template:"alamar",   label:"Alamar 503" },
  "DELTA 2 101":    { tipo:"pdf",       template:"alamar",   label:"Delta 2 101" },
  "VENETIAN 905 T3":  { tipo:"pdf",     template:"venetian", label:"Venetian 905 T3" },
  "VENETIAN 906 T3":  { tipo:"pdf",     template:"venetian", label:"Venetian 906 T3" },
  "VENETIAN 1010 T3": { tipo:"pdf",     template:"venetian", label:"Venetian 1010 T3" },
  "VENETIAN 1903 T3": { tipo:"pdf",     template:"venetian", label:"Venetian 1903 T3" },
  "VENETIAN 2101 T3": { tipo:"pdf",     template:"venetian", label:"Venetian 2101 T3" },
  "FLAMINGOS":      { tipo:"pdf",       template:"flamingos",label:"Flamingos 27" },
  "XIKIRI":         { tipo:"pdf",       template:"xikiri",   label:"Xikiri" },
  "PENINSULA 19E":  { tipo:"pdf",       template:"peninsula",label:"Península 19-E" },
  "PENINSULA 18B":  { tipo:"pdf",       template:"peninsula",label:"Península 18-B" },

  // ── WHATSAPP ──────────────────────────────────────────────
  "RINCON 104":     { tipo:"whatsapp",  numero:"+52 322 327 3955", label:"Rincón 104" },
  "RINCON 403":     { tipo:"whatsapp",  numero:"+52 322 327 3955", label:"Rincón 403" },
  "RINCON 502":     { tipo:"whatsapp",  numero:"+52 322 327 3955", label:"Rincón 502" },
  "PLAYA ESMERALDA":{ tipo:"whatsapp",  numero:"+52 55 1800 8292",  label:"Playa Esmeralda" },
  "ARCANO":         { tipo:"whatsapp",  numero:"+52 322 349 0930",  label:"Arcano" },
  "NAUTICO 9C":     { tipo:"whatsapp",  numero:"+52 322 141 9001",  label:"Náutico 9-C" },
  "NAUTICO 9E":     { tipo:"whatsapp",  numero:"+52 322 141 9001",  label:"Náutico 9-E" },
  "NAUTICO 1G":     { tipo:"whatsapp",  numero:"+52 322 141 9001",  label:"Náutico 1-G" },
  "NAUTICO 3G":     { tipo:"whatsapp",  numero:"+52 322 141 9001",  label:"Náutico 3-G" },
  "NAUTICO 408":    { tipo:"whatsapp",  numero:"+52 322 141 9001",  label:"Náutico 408" },
  "MARSALA":        { tipo:"whatsapp",  numero:"PENDIENTE",          label:"Marsala" },
  "AMOARA":         { tipo:"whatsapp",  numero:"PENDIENTE",          label:"Amoara" },

  // ── CORREO ────────────────────────────────────────────────
  "TULES 13-701":   { tipo:"correo", label:"Tules 13-701" },
  "TULES 15-143":   { tipo:"correo", label:"Tules 15-143" },
  "TULES 19-1301":  { tipo:"correo", label:"Tules 19-1301" },
  "TULES 20-105":   { tipo:"correo", label:"Tules 20-105" },
  "MARINA SOL":     { tipo:"correo", label:"Marina Sol" },

  // ── FRAKCIO ───────────────────────────────────────────────
  "ARIA 812":       { tipo:"frakcio", label:"Aria 812" },
  "ARIA 906":       { tipo:"frakcio", label:"Aria 906" },
  "ARIA 1010":      { tipo:"frakcio", label:"Aria 1010" },
  "ARIA 1013":      { tipo:"frakcio", label:"Aria 1013" },
  "ARIA PH 1001":   { tipo:"frakcio", label:"Aria PH 1001" },
  "MARITIMA GOLF 2L":   { tipo:"frakcio", label:"Marítima Golf 2L" },
  "MARITIMA GOLF 2M":   { tipo:"frakcio", label:"Marítima Golf 2M" },
  "MARITIMA GOLF 5R":   { tipo:"frakcio", label:"Marítima Golf 5R" },
  "MARITIMA GOLF LW1B": { tipo:"frakcio", label:"Marítima Golf LW1B" },
  "ZANTAMAR":       { tipo:"frakcio", label:"Zantamar" },
  "BVG 505":        { tipo:"frakcio", label:"Bay View Grand 505", bvg:true },
  "BVG 506":        { tipo:"frakcio", label:"Bay View Grand 506", bvg:true },

  // ── COMUNIDAD FELIZ ───────────────────────────────────────
  "BOLONGO 0N":     { tipo:"comunidad", label:"Bolongo 0-N" },
  "BOLONGO 3N":     { tipo:"comunidad", label:"Bolongo 3-N" },
  "BOLONGO 211":    { tipo:"comunidad", label:"Bolongo 211" },
  "BOLONGO G13":    { tipo:"comunidad", label:"Bolongo G13" },
  "BOLONGO L05":    { tipo:"comunidad", label:"Bolongo L05" },

  // ── GOOGLE FORMS ──────────────────────────────────────────
  "MARITIMA PHN":   { tipo:"gforms", label:"Marítima PHN" },
  "MARITIMA 9S":    { tipo:"gforms", label:"Marítima 9-S" },
  "MARITIMA 10I":   { tipo:"gforms", label:"Marítima 10-I" },
  "MARITIMA 6S":    { tipo:"gforms", label:"Marítima 6-S" },

  // ── ISLA IGUANA ───────────────────────────────────────────
  "ISLA IGUANA":    { tipo:"frakcio", label:"Isla Iguana" },
};

const TIPO_INFO = {
  pdf:       { label:"PDF / Documento", color:"#e8a06a", cls:"ind-pdf" },
  whatsapp:  { label:"WhatsApp",        color:"#5ae8a0", cls:"ind-whatsapp" },
  correo:    { label:"Correo",          color:"#6ab4e8", cls:"ind-correo" },
  frakcio:   { label:"Frakcio",         color:"#c06ae8", cls:"ind-frakcio" },
  comunidad: { label:"ComunidadFeliz",  color:"#e86a9e", cls:"ind-comunidad" },
  gforms:    { label:"Google Forms",    color:"#e8c56a", cls:"ind-gforms" },
};

let deptoActual = null;

// ─── Render deptos ───────────────────────────────────────────
function renderDeptos(filtro = "") {
  const container = document.getElementById("depto-container");
  container.innerHTML = "";
  const grupos = {
    pdf: { titulo:"PDF / Documento", items:[] },
    whatsapp: { titulo:"WhatsApp", items:[] },
    correo: { titulo:"Correo", items:[] },
    frakcio: { titulo:"Frakcio", items:[] },
    comunidad: { titulo:"ComunidadFeliz", items:[] },
    gforms: { titulo:"Google Forms", items:[] },
  };
  for (const [key, d] of Object.entries(DEPTOS)) {
    if (!filtro || d.label.toLowerCase().includes(filtro.toLowerCase()) || key.toLowerCase().includes(filtro.toLowerCase())) {
      grupos[d.tipo].items.push({ key, ...d });
    }
  }
  let total = 0;
  for (const [tipo, g] of Object.entries(grupos)) {
    if (!g.items.length) continue;
    total += g.items.length;
    const header = document.createElement("div");
    header.className = "section-header";
    header.style.gridColumn = "1/-1";
    header.textContent = g.titulo;
    container.appendChild(header);
    for (const d of g.items) {
      const btn = document.createElement("button");
      btn.className = `depto-btn tipo-${tipo}${deptoActual === d.key ? " active" : ""}`;
      btn.onclick = () => seleccionarDepto(d.key);
      btn.innerHTML = `${d.label}<span class="tipo-badge">${g.titulo.toUpperCase()}</span>`;
      container.appendChild(btn);
    }
  }
  if (total === 0) container.innerHTML = '<div class="no-depto" style="grid-column:1/-1">Sin resultados</div>';
}

function filtrarDeptos(val) { renderDeptos(val); }

function seleccionarDepto(key) {
  deptoActual = key;
  renderDeptos(document.getElementById("search-depto").value);
  const d = DEPTOS[key];
  const ti = TIPO_INFO[d.tipo];
  const tipoSec = document.getElementById("tipo-section");
  const tipoInd = document.getElementById("tipo-indicator");
  tipoSec.style.display = "block";
  tipoInd.className = `tipo-indicator ${ti.cls}`;
  tipoInd.innerHTML = `<span class="dot"></span>${key} → ${ti.label}`;
  document.getElementById("correo-row").style.display = (d.tipo === "frakcio" || d.template === "xikiri") ? "block" : "none";
  document.getElementById("btn-gen").disabled = false;
  document.getElementById("output-section").style.display = "none";
}

// ─── Ocupantes ──────────────────────────────────────────────
let ocupantes = [{ nombre:"", tipo:"Adulto" }];

function renderOcupantes() {
  const list = document.getElementById("ocupantes-list");
  list.innerHTML = "";
  ocupantes.forEach((o, i) => {
    const row = document.createElement("div");
    row.className = "ocupante-row";
    row.innerHTML = `
      <input type="text" placeholder="Nombre completo" value="${o.nombre}"
        oninput="ocupantes[${i}].nombre=this.value">
      <select onchange="ocupantes[${i}].tipo=this.value">
        <option ${o.tipo==="Adulto"?"selected":""}>Adulto</option>
        <option ${o.tipo==="Adolescente"?"selected":""}>Adolescente</option>
        <option ${o.tipo==="Menor"?"selected":""}>Menor</option>
      </select>
      <button class="btn-remove" onclick="quitarOcupante(${i})">×</button>
    `;
    list.appendChild(row);
  });
}

function agregarOcupante() {
  ocupantes.push({ nombre:"", tipo:"Adulto" });
  renderOcupantes();
}

function fmtFecha(val) {
  if (!val) return "___";
  const [y,m,d] = val.split("-");
  const meses = ["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];
  return `${parseInt(d)} ${meses[parseInt(m)-1]} ${y}`;
}

// ─── MAIN GENERAR ───────────────────────────────────────────
function generar() {
  if (!deptoActual) return;
  const d = DEPTOS[deptoActual];
  const datos = {
    depto: deptoActual,
    nombre: g("nombre"),
    telefono: g("telefono"),
    correo: g("correo_huesped"),
    entrada: g("fecha_entrada"),
    salida: g("fecha_salida"),
    personas: g("num_personas"),
    adultos: g("adultos"),
    menores: g("menores"),
    mascotas: parseInt(g("mascotas")||"0"),
    vehiculo: g("vehiculo_modelo"),
    placas: g("vehiculo_placas"),
  };

  let outputText = "";
  let whatsappNum = null;
  let pdfNote = null;
  let outputLabel = "";

  if (d.tipo === "whatsapp") {
    const res = genWhatsApp(d, datos);
    outputText = res.texto;
    whatsappNum = res.numero;
    outputLabel = "MENSAJE WHATSAPP";
  } else if (d.tipo === "correo") {
    outputText = genCorreo(d, datos);
    outputLabel = "CORREO";
  } else if (d.tipo === "frakcio") {
    outputText = genFrakcio(d, datos);
    outputLabel = "FRAKCIO — CAMPOS";
  } else if (d.tipo === "comunidad") {
    outputText = genComunidad(d, datos);
    outputLabel = "COMUNIDADFELIZ — COPIAR/PEGAR";
  } else if (d.tipo === "gforms") {
    outputText = genGForms(d, datos);
    outputLabel = "GOOGLE FORMS — COPIAR/PEGAR";
  } else if (d.tipo === "pdf") {
    if (d.template === "quiya") outputText = genQuiya(datos);
    else if (d.template === "flamingos") outputText = genFlamingos(datos);
    else if (d.template === "albatros") outputText = genAlbatros(datos);
    else if (d.template === "gd") outputText = genGD(datos);
    else if (d.template === "alamar") outputText = genAlamar(datos);
    else if (d.template === "venetian") outputText = genVenetian(datos);
    else if (d.template === "peninsula") outputText = genPeninsula(datos);
    else if (d.template === "xikiri") outputText = genXikiri(datos);
    else outputText = genGForms(d, datos);
    outputLabel = "DATOS PARA PDF — " + d.label.toUpperCase();
    pdfNote = `📄 Template: <strong>${d.template ? d.template.toUpperCase() : d.label}</strong> — Abre el .docx o .pdf correspondiente, copia estos datos y completa los campos.`;
  }

  document.getElementById("output-label").textContent = outputLabel;
  document.getElementById("output-text").textContent = outputText;
  document.getElementById("output-section").style.display = "block";

  const waDiv = document.getElementById("whatsapp-number");
  if (whatsappNum) {
    waDiv.style.display = "flex";
    waDiv.innerHTML = `<span>📱 Enviar a:</span> <strong>${whatsappNum}</strong>`;
  } else {
    waDiv.style.display = "none";
  }

  const pdfDiv = document.getElementById("pdf-note");
  if (pdfNote) {
    pdfDiv.style.display = "block";
    pdfDiv.innerHTML = pdfNote;
  } else {
    pdfDiv.style.display = "none";
  }

  document.getElementById("btn-copy").textContent = "Copiar";
  document.getElementById("btn-copy").classList.remove("copied");
  document.getElementById("output-section").scrollIntoView({ behavior:"smooth", block:"nearest" });
}

function copiar() {
  const txt = document.getElementById("output-text").textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById("btn-copy");
    btn.textContent = "✓ Copiado";
    btn.classList.add("copied");
    setTimeout(()=>{ btn.textContent = "Copiar"; btn.classList.remove("copied"); }, 2000);
  });
}
