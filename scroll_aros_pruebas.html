<!doctype html><html lang="es"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>VRM · Aros + ballena · premium</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=boska@400,401,500&f[]=tanker@400&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F1EFE8;--ink:#0E2A3A;--teal:#1B4D5C;--teal2:#2C6B7A;--gold:#B08A57;
    --fb:'Satoshi',system-ui,sans-serif;--fd:'Boska',Georgia,serif;--fa:'Tanker',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--fb);
    overflow:hidden;overscroll-behavior:none;position:fixed;inset:0;width:100%;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-font-smoothing:antialiased}
  .app{height:100%;display:flex;flex-direction:column;max-width:560px;margin:0 auto;position:relative}
  .grain{position:fixed;inset:0;z-index:50;pointer-events:none;opacity:.35;mix-blend-mode:multiply}
  header{padding:14px 20px 2px;z-index:10}
  .ey{font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:12px}
  .ey::before{content:"";width:26px;height:1px;background:currentColor;opacity:.7}
  h1{font-family:var(--fd);font-style:italic;font-weight:500;font-size:20px;color:var(--teal);margin-top:5px}
  .scene{flex:1;position:relative;overflow:hidden;touch-action:none}
  .scene::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:6;
    background:radial-gradient(120% 80% at 50% 42%,transparent 55%,rgba(20,44,58,.10) 100%)}
  .counter{position:absolute;right:18px;top:16px;z-index:9;text-align:right}
  .counter .n{font-family:var(--fd);font-style:italic;font-size:30px;color:var(--teal);line-height:1}
  .counter .t{font-family:var(--fb);font-size:9px;letter-spacing:.24em;color:#8aa0a6;margin-top:2px}
  .col{position:absolute;left:50%;top:0;width:min(84vw,360px);transform:translateX(-50%);will-change:transform}
  .ring{position:absolute;left:0;top:0;width:100%;height:132px;will-change:transform,opacity;transform-origin:50% 50%}
  .cyl{position:absolute;inset:0;border-radius:50%/16px;overflow:hidden;
    background:linear-gradient(180deg,#dfe5e7 0%,#f6f8f8 12%,#ffffff 38%,#ffffff 62%,#eef1f2 84%,#d6dddf 100%);
    box-shadow:0 22px 48px rgba(20,35,55,.18), inset 0 3px 6px rgba(255,255,255,.95), inset 0 -10px 18px rgba(27,77,92,.09)}
  .cyl::before{content:"";position:absolute;left:0;right:0;top:0;height:34px;border-radius:50%;
    background:radial-gradient(70% 130% at 50% 0,rgba(27,77,92,.14),transparent 70%)}
  .cyl::after{content:"";position:absolute;left:8%;right:8%;top:9px;height:12px;border-radius:50%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent);filter:blur(1px)}
  .nm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--fa);font-size:26px;letter-spacing:.02em;color:var(--teal);white-space:nowrap;z-index:2}
  .sub{position:absolute;left:0;right:0;bottom:16px;text-align:center;font-family:var(--fb);
    font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:#9db0b5;z-index:2}
  .whale{position:absolute;left:50%;top:0;width:70px;height:132px;margin-left:-35px;z-index:5;will-change:transform;
    filter:drop-shadow(0 10px 18px rgba(27,77,92,.28))}
  .whale svg{width:100%;height:100%;display:block}
  .grab{position:absolute;left:0;right:0;bottom:16px;text-align:center;font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:#9fb0b4;z-index:9;pointer-events:none;transition:opacity .4s}
  .card{margin:0 14px 16px;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 24px 56px rgba(20,35,55,.24);flex:0 0 auto;z-index:10}
  .card .ph{height:126px;background-size:cover;background-position:center}
  .card .cin{padding:12px 18px 2px}
  .card .ct{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
  .card .cn{font-family:var(--fd);font-style:italic;font-size:20px;color:var(--teal);margin-top:3px}
  .card .cm{font-size:12px;color:#5c7278;margin-top:3px}
  .card .cb{display:block;margin:12px 18px 16px;background:var(--ink);color:var(--bg);text-align:center;padding:14px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
</style></head>
<body>
<svg class="grain"><filter id="g"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2"/><feColorMatrix type="matrix" values="0 0 0 0 .07 0 0 0 0 .17 0 0 0 0 .22 0 0 0 .5 0"/></filter><rect width="100%" height="100%" filter="url(#g)"/></svg>
<div class="app">
  <header><div class="ey">La columna de estancias</div><h1>Desliza · la ballena nada de aro en aro</h1></header>
  <div class="scene" id="scene">
    <div class="counter"><div class="n" id="cN">01</div><div class="t">de 05</div></div>
    <div class="col" id="col"></div>
    <div class="whale" id="whale">
      <svg viewBox="0 0 70 132" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="wb" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#b9d8ee"/><stop offset="1" stop-color="#8bb6d8"/></linearGradient></defs>
        <path d="M35 8 C44 24 48 46 46 72 C45 92 41 112 35 126 C29 112 25 92 24 72 C22 46 26 24 35 8 Z" fill="url(#wb)"/>
        <path d="M35 44 C24 50 12 47 5 56 C17 56 26 61 32 68 Z" fill="#9cc1de"/>
        <path d="M35 44 C46 50 58 47 65 56 C53 56 44 61 38 68 Z" fill="#9cc1de"/>
        <path d="M35 10 C30 3 25 3 23 10 C28 12 32 12 35 17 C38 12 42 12 47 10 C45 3 40 3 35 10 Z" fill="#c3ddf0"/>
        <ellipse cx="35" cy="78" rx="10" ry="30" fill="#cfe3f2" opacity=".55"/>
      </svg>
    </div>
    <div class="grab" id="grab">desliza ↑↓</div>
  </div>
  <div class="card">
    <div class="ph" id="cardPh"></div>
    <div class="cin"><div class="ct" id="cardT"></div><div class="cn" id="cardN"></div><div class="cm" id="cardM"></div></div>
    <a class="cb">Reservar</a>
  </div>
</div>
<script>
const DATA=[
  {t:'La Cruz de Huanacaxtle',n:'VALLARTA GARDENS 3004',cn:'Vallarta Gardens 3004',m:'6 huéspedes · $250 / noche',img:'https://picsum.photos/seed/wA/700/440'},
  {t:'Nuevo Vallarta · Flamingos',n:'MARÍTIMA 6S',cn:'Marítima 6S',m:'8 huéspedes · $190 / noche',img:'https://picsum.photos/seed/wB/700/440'},
  {t:'Punta de Mita',n:'PENÍNSULA 19E',cn:'Península 19E',m:'10 huéspedes · $420 / noche',img:'https://picsum.photos/seed/wC/700/440'},
  {t:'Bucerías',n:'DELTA 101',cn:'Delta 101',m:'4 huéspedes · $160 / noche',img:'https://picsum.photos/seed/wD/700/440'},
  {t:'Conchas Chinas',n:'MARALMA 501',cn:'Maralma 501',m:'6 huéspedes · $310 / noche',img:'https://picsum.photos/seed/wE/700/440'},
];
const N=DATA.length, GAP=250;
const scene=document.getElementById('scene'),col=document.getElementById('col'),whale=document.getElementById('whale');
const cN=document.getElementById('cN'),grab=document.getElementById('grab');
const cardPh=document.getElementById('cardPh'),cardT=document.getElementById('cardT'),cardN=document.getElementById('cardN'),cardM=document.getElementById('cardM');
DATA.forEach((d)=>{const r=document.createElement('div');r.className='ring';
  r.innerHTML='<div class="cyl"></div><div class="nm">'+d.n+'</div><div class="sub">'+d.t+'</div>';col.appendChild(r);});
const rings=[...col.children];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
let current=0, target=0, drag=0, dragging=false, y0=0, ly=0, vel=0, lastCard=-1;
const CENTER=()=>scene.clientHeight*0.42;
function render(){
  const cur=current+drag, cy=CENTER();
  col.style.transform='translate3d(-50%,'+(cy-cur*GAP-66)+'px,0)';
  for(let i=0;i<rings.length;i++){
    const off=i-cur, a=Math.abs(off);
    const sc=clamp(1-a*0.07,0.8,1), op=clamp(1.25-a*0.55,0,1);
    rings[i].style.transform='translate3d(0,'+(i*GAP)+'px,0) scale('+sc+')';
    rings[i].style.opacity=op;
    rings[i].style.filter = a>0.7?'blur('+Math.min((a-0.7)*3,4)+'px)':'';
    rings[i].style.zIndex = 100-Math.round(a*10);
  }
  const frac=cur-Math.floor(cur), sw=Math.sin(frac*Math.PI);
  const wx=sw*36, wyBob=-sw*30, wrot=Math.sin(frac*Math.PI*2)*10, wsc=1-sw*0.12;
  whale.style.transform='translate3d('+wx+'px,'+((cy-66)+wyBob)+'px,0) rotate('+wrot+'deg) scale('+wsc+')';
  const act=clamp(Math.round(cur),0,N-1);
  cN.textContent=String(act+1).padStart(2,'0');
  if(act!==lastCard){lastCard=act;const d=DATA[act];cardPh.style.backgroundImage='url('+d.img+')';cardT.textContent=d.t;cardN.textContent=d.cn;cardM.textContent=d.m;}
  grab.style.opacity = (dragging||Math.abs(current-target)>0.01)?0:.9;
}
function loop(){
  const goal=target+drag;
  current += (goal-current)*0.16;
  if(Math.abs(goal-current)<0.0005) current=goal;
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
scene.addEventListener('touchstart',e=>{dragging=true;y0=ly=e.touches[0].clientY;vel=0;},{passive:false});
scene.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!dragging)return;
  const y=e.touches[0].clientY;vel=0.6*vel+0.4*(ly-y);ly=y;
  let f=(y0-y)/GAP; f=clamp(f,-0.9,0.9);
  let np=target+f;
  if(np<0)f=-target+(np)*0.3; if(np>N-1)f=(N-1-target)+(np-(N-1))*0.3;
  drag=f;
},{passive:false});
scene.addEventListener('touchend',e=>{
  if(!dragging)return;dragging=false;
  const proj=target+drag+vel*0.02;
  let t=Math.round(proj);
  if(Math.abs(drag)>0.18 && t===target) t=target+(drag>0?1:-1);
  target=clamp(t,0,N-1); drag=0;
},{passive:false});
render();
</script>
</body></html>
