<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VRM · Estado de tu departamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:#1c1410; }
body { display:flex; justify-content:center; align-items:flex-start; padding:2rem 1rem 3rem; font-family:'Cormorant Garamond', serif; min-height:100vh; }

.pass {
    width:100%; max-width:560px;
    display:flex;
    background:#f5efe3;
    border-radius:3px;
    overflow:hidden;
    box-shadow:3px 4px 32px rgba(0,0,0,.7);
}

.main { flex:1; padding:36px 34px 28px;  display:flex; flex-direction:column; gap:0; }

.m-bp {
    font-size:8px; letter-spacing:4px; color:#b8966a;
    text-transform:uppercase; font-family:'DM Mono',monospace; font-weight:300;
    margin-bottom:24px; display:flex; justify-content:space-between;
}

.m-sr { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.m-dot { width:7px; height:7px; border-radius:50%; background:#8B3A1A; }
.m-sl { font-size:8px; letter-spacing:3px; color:#8B3A1A; text-transform:uppercase; font-family:'DM Mono',monospace; }

.m-sb {
    font-size:clamp(44px,10vw,62px); font-weight:700; color:#6B3A1F;
    letter-spacing:-2px; line-height:.92;
    font-family:'Playfair Display', serif; font-style:italic;
    margin-bottom:8px;
}
.m-sb.listo { color:#2d6a3f; }

.m-et { font-size:13px; color:#a87c52; font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300; margin-bottom:22px; }

.m-rule { border:none; border-top:.5px solid rgba(140,90,50,.15); margin-bottom:16px; }

.m-dp { font-size:26px; font-weight:700; color:#9a7050; letter-spacing:-1px; font-family:'Playfair Display',serif; }
.m-cx { font-size:9px; letter-spacing:3px; color:#b89070; text-transform:uppercase; font-family:'DM Mono',monospace; font-weight:300; margin-bottom:22px; }

.m-ac { display:grid; grid-template-columns:1fr 1fr; margin-bottom:22px; }
.ma:first-child { border-right:.5px solid rgba(140,90,50,.15); padding-right:20px; }
.ma:last-child { padding-left:20px; }
.ma-l { font-size:7px; letter-spacing:2.5px; color:#c0966a; text-transform:uppercase; font-family:'DM Mono',monospace; margin-bottom:6px; }
.ma-c { font-size:28px; font-weight:900; color:#6B3A1F; letter-spacing:4px; font-family:'Playfair Display',serif; line-height:1; }
.ma-c em { color:#8B3A1A; font-style:normal; }
.ma-w { font-size:13px; font-weight:600; color:#6B3A1F; font-family:'Playfair Display',serif; margin-bottom:3px; }
.ma-p { font-size:11px; color:#a87c52; font-family:'Cormorant Garamond',serif; font-style:italic; }

.m-faq-rule { border:none; border-top:.5px solid rgba(140,90,50,.12); margin-bottom:12px; }
.m-faq-label { font-size:7px; letter-spacing:2.5px; color:#c0a878; text-transform:uppercase; font-family:'DM Mono',monospace; margin-bottom:10px; }
.m-faqs { display:flex; flex-direction:column; gap:0; }
.m-faq { display:flex; align-items:flex-start; gap:8px; cursor:pointer; padding:7px 0; border-bottom:.5px solid rgba(140,90,50,.08); }
.m-faq:last-child { border-bottom:none; }
.m-faq-num { font-size:8px; color:#c8a878; font-family:'DM Mono',monospace; flex-shrink:0; margin-top:2px; }
.m-faq-q { font-size:12px; color:#a87c52; font-family:'Cormorant Garamond',serif; font-style:italic; line-height:1.4; flex:1; }
.m-faq-ans { display:none; font-size:12px; color:#7a5030; font-family:'Cormorant Garamond',serif; line-height:1.6; padding:6px 0 4px 20px; }
.m-faq.open .m-faq-ans { display:block; }
.m-faq.open .m-faq-q { color:#6B3A1F; font-weight:600; }

/* STUB */
.stub {
    width:185px; flex-shrink:0; background:#ede5d4;
    display:flex; flex-direction:column;
    border-left:1px dashed rgba(140,90,50,.2);
}
.ss { flex:1; padding:20px 16px 16px; display:flex; align-items:center; justify-content:center; }
.so {
    width:118px; height:100%; min-height:240px;
    border-radius:22px; border:2px solid #c8a84a;
    box-shadow:0 0 0 1px rgba(200,168,74,.2);
    overflow:hidden; position:relative;
}
.so img { width:100%; height:100%; object-fit:cover; object-position:center top; display:block; }
.sn {
    position:absolute; top:0; left:0; right:0;
    background:linear-gradient(to bottom, rgba(237,229,212,.95) 50%, rgba(237,229,212,0));
    padding:10px 8px 20px; text-align:center;
    font-size:10px; font-weight:600; color:#5C3018;
    font-family:'Playfair Display',serif; font-style:italic;
}
.sf {
    padding:14px 16px 16px;
    border-top:1px dashed rgba(140,90,50,.2);
    display:flex; justify-content:space-between; align-items:flex-end;
}
.sfl { font-size:7px; letter-spacing:2px; color:#b89060; font-family:'DM Mono',monospace; text-transform:uppercase; margin-bottom:3px; }
.sfv { font-size:15px; font-weight:700; color:#5C3018; font-family:'Playfair Display',serif; }
.svrm { font-size:9px; letter-spacing:3px; color:#b89060; font-family:'DM Mono',monospace; align-self:flex-end; }
.svrm b { color:#8B3A1A; }

.loading { text-align:center; padding:60px 20px; color:#b8966a; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:3px; text-transform:uppercase; }
.stamp-side {
    flex-shrink:0;
    padding-top:0;margin-top:-8px;
}
.so-side {
    width:130px;
    height:190px;
    border-radius:18px;
    overflow:hidden;
}
.update-tag { font-size:8px; letter-spacing:2px; color:#c8a878; font-family:'DM Mono',monospace; text-transform:uppercase; margin-top:12px; }

@media (max-width: 580px) {
    body { padding:1rem 0.75rem 2rem; align-items:flex-start; }
    .pass { flex-direction:column; max-width:100%; }
    .stub { width:100%; flex-direction:row; border-left:none; border-top:1px dashed rgba(140,90,50,.2); }
    .ss { padding:16px; width:auto; }
    .so { width:110px; min-height:130px; }
    .sf { flex:1; flex-direction:column; justify-content:center; border-top:none; border-left:1px dashed rgba(140,90,50,.2); padding:16px; }
}
</style>
</head>

function getDepto() {
    const p = new URLSearchParams(window.location.search);
    return (p.get('depto') || '').toUpperCase().trim();
}

async function sb(tabla, params) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?${params}`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    return r.json();
}

const STATUS_LABELS = {
    'limpio': ['¡Listo para<br>recibirte!', 'Puedes pasar cuando quieras', true],
    'sucio':  ['En<br>preparación', 'Listo aproximadamente entre las 2:00 y las 3:00 pm', false],
    'en_proceso': ['En<br>preparación', 'Nuestro equipo está limpiando ahora mismo', false],
};

const FAQS = [
    ['¿Puedo dejar mis maletas antes?', 'Sí, a partir de la 1:00 pm puedes tocar y dejar tu equipaje. Recuerda que si el departamento aún no está listo, no puedes quedarte, solo dejar maletas.'],
    ['¿Cómo accedo al departamento?', 'Usa el código de entrada indicado arriba. Si tienes dudas escríbenos por Airbnb.'],
    ['¿Hay estacionamiento?', 'Sí, el complejo cuenta con estacionamiento. Indica tu placa en la caseta al llegar.'],
    ['¿A qué hora es mi check-out?', '11:00 am del último día. Si necesitas más tiempo, avísanos con anticipación.'],
];

async function cargar() {
    const depto = getDepto();
    if(!depto) { document.getElementById('loading').textContent = 'URL inválida'; return; }

    // Cargar info del depto y status en paralelo
    const [infos, statuses] = await Promise.all([
        sb('depto_info', `depto_codigo=eq.${encodeURIComponent(depto)}&select=*`),
        sb('depto_status', `depto_codigo=eq.${encodeURIComponent(depto)}&select=*`)
    ]);

    const info = Array.isArray(infos) && infos[0];
    const status = Array.isArray(statuses) && statuses[0];
    const statusKey = status?.status || 'sucio';
    const [label, eta, esListo] = STATUS_LABELS[statusKey] || STATUS_LABELS['sucio'];

    // Imagen
    const imgSrc = (() => {
        const key = Object.keys(IMGS).find(k => depto.includes(k));
        return key ? IMGS[key] : (info?.imagen_url || '');
    })();

    // Render main
    const main = document.getElementById('main-content');
    main.innerHTML = `
        <div class="m-bp"><span>Boarding Pass</span><span>Vacation Rental México</span></div>
        <div class="m-sr">
            <div class="m-dot" style="background:${esListo ? '#2d6a3f' : '#8B3A1A'}"></div>
            <div class="m-sl" style="color:${esListo ? '#2d6a3f' : '#8B3A1A'}">Estado del departamento</div>
        </div>
        <div style="display:flex;align-items:flex-start;gap:20px;margin-bottom:8px">
            <div style="flex:1">
                <div class="m-sb ${esListo ? 'listo' : ''}">${label}</div>
                <div class="m-et">${eta}</div>
            </div>
            <div style="flex-shrink:0;padding-top:0;margin-top:-8px">
                <div class="so-side">
                    <img id="complejo-img" src="" alt="" style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block">
                </div>
            </div>
        </div>
        <hr class="m-rule">
        <div class="m-dp">${depto}</div>
        <div class="m-cx">${info?.complejo || ''} · ${info?.ubicacion || 'Puerto Vallarta'}</div>
        ${info?.codigo_entrada ? `
        <div class="m-ac">
            <div class="ma">
                <div class="ma-l">Código de entrada</div>
                <div class="ma-c">${info.codigo_entrada.replace('#','<em>#</em>')}</div>
            </div>
            <div class="ma">
                <div class="ma-l">WiFi</div>
                <div class="ma-w">${info.wifi_nombre || ''}</div>
                <div class="ma-p">${info.wifi_password || ''}</div>
            </div>
        </div>` : ''}
        <hr class="m-faq-rule">
        <div class="m-faq-label">Preguntas frecuentes</div>
        <div class="m-faqs">
            ${FAQS.map((f,i) => `
            <div class="m-faq" onclick="this.classList.toggle('open')">
                <span class="m-faq-num">0${i+1}</span>
                <div>
                    <div class="m-faq-q">${f[0]}</div>
                    <div class="m-faq-ans">${f[1]}</div>
                </div>
            </div>`).join('')}
        </div>
        <div class="update-tag" id="update-tag">Actualiza automáticamente</div>
    `;

    // Render stub
    if(imgSrc) {
        document.getElementById('complejo-img').src = imgSrc;
    }
    
    
    
    

    // Auto-refresh cada 30s
    setTimeout(() => cargar(), 30000);
    const tag = document.getElementById('update-tag');
    if(tag) tag.textContent = 'Actualizado · ' + new Date().toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
}

cargar();
</script>
</body>
