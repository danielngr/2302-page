<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRM - Estado del departamento</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#1c1410;min-height:100vh}
body{display:flex;justify-content:center;padding:2rem 1rem 3rem;font-family:'Cormorant Garamond',serif}
.pass{width:100%;max-width:560px;background:#fbf8f3;border-radius:3px;box-shadow:3px 4px 32px rgba(0,0,0,.7)}
.main{padding:36px 34px 28px}
.m-bp{font-size:8px;letter-spacing:4px;color:#b8966a;text-transform:uppercase;font-family:'DM Mono',monospace;font-weight:300;margin-bottom:24px;display:flex;justify-content:space-between}
.m-sr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.m-dot{width:7px;height:7px;border-radius:50%}
.m-sl{font-size:8px;letter-spacing:3px;text-transform:uppercase;font-family:'DM Mono',monospace}
.m-sb{font-size:clamp(44px,10vw,62px);font-weight:700;letter-spacing:-2px;line-height:.92;font-family:'Playfair Display',serif;font-style:italic;margin-bottom:6px;color:#6B3A1F}
.m-sb.listo{color:#2d6a3f}
.m-et{font-size:13px;color:#a87c52;font-family:'Cormorant Garamond',serif;font-style:italic}
.m-rule{border:none;border-top:.5px solid rgba(140,90,50,.15);margin:20px 0 16px}
.m-dp{font-size:26px;font-weight:700;color:#9a7050;letter-spacing:-1px;font-family:'Playfair Display',serif}
.m-cx{font-size:9px;letter-spacing:3px;color:#b89070;text-transform:uppercase;font-family:'DM Mono',monospace;font-weight:300;margin-bottom:20px}
.m-ac{display:grid;grid-template-columns:1fr 1fr;margin-bottom:20px}
.ma:first-child{border-right:.5px solid rgba(140,90,50,.15);padding-right:20px}
.ma:last-child{padding-left:20px}
.ma-l{font-size:7px;letter-spacing:2.5px;color:#c0966a;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:6px}
.ma-c{font-size:28px;font-weight:900;color:#6B3A1F;letter-spacing:4px;font-family:'Playfair Display',serif;line-height:1}
.ma-c em{color:#8B3A1A;font-style:normal}
.ma-w{font-size:13px;font-weight:600;color:#6B3A1F;font-family:'Playfair Display',serif;margin-bottom:3px}
.ma-p{font-size:11px;color:#a87c52;font-family:'Cormorant Garamond',serif;font-style:italic}
.m-faq-rule{border:none;border-top:.5px solid rgba(140,90,50,.12);margin-bottom:12px}
.m-faq-label{font-size:7px;letter-spacing:2.5px;color:#c0a878;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:10px}
.m-faqs{display:flex;flex-direction:column}
.m-faq{display:flex;align-items:flex-start;gap:8px;cursor:pointer;padding:7px 0;border-bottom:.5px solid rgba(140,90,50,.08)}
.m-faq:last-child{border-bottom:none}
.m-faq-num{font-size:8px;color:#c8a878;font-family:'DM Mono',monospace;flex-shrink:0;margin-top:2px}
.m-faq-q{font-size:12px;color:#a87c52;font-family:'Cormorant Garamond',serif;font-style:italic;line-height:1.4;flex:1}
.m-faq-ans{display:none;font-size:12px;color:#7a5030;font-family:'Cormorant Garamond',serif;line-height:1.6;padding:6px 0 4px}
.m-faq.open .m-faq-ans{display:block}
.m-faq.open .m-faq-q{color:#6B3A1F;font-weight:600}
.so-side{width:140px;height:auto;overflow:hidden}
.update-tag{font-size:8px;letter-spacing:2px;color:#c8a878;font-family:'DM Mono',monospace;text-transform:uppercase;margin-top:14px}
.loading{text-align:center;padding:60px 20px;color:#b8966a;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px}
</style>
</head>

}

  'limpio':['Listo para recibirte','Puedes pasar cuando quieras',true],
  'sucio':['En preparacion','Listo aproximadamente entre las 2:00 y las 3:00 pm',false],
  'en_proceso':['En preparacion','Nuestro equipo esta limpiando ahora mismo',false]
};

var FAQS=[
  ['Puedo dejar mis maletas antes?','Si, a partir de la 1:00 pm puedes tocar y dejar tu equipaje. Si el depto no esta listo, solo puedes dejar maletas.'],
  ['Como accedo al departamento?','Usa el codigo de entrada indicado arriba. Si tienes dudas escribenos por Airbnb.'],
  ['Hay estacionamiento?','Si, el complejo cuenta con estacionamiento. Indica tu placa en la caseta al llegar.'],
  ['A que hora es mi check-out?','11:00 am del ultimo dia. Si necesitas mas tiempo, avisanos con anticipacion.']
];

function cargar(){
  var depto=getDepto();
  if(!depto){document.getElementById('main-content').innerHTML='<div class="loading">URL invalida</div>';return;}
  Promise.all([
    sb('depto_info','depto_codigo=eq.'+encodeURIComponent(depto)+'&select=*'),
    sb('depto_status','depto_codigo=eq.'+encodeURIComponent(depto)+'&select=*')
  ]).then(function(res){
    var info=res[0]&&res[0][0];
    var status=res[1]&&res[1][0];
    var st=ST[(status&&status.status)||'sucio']||ST['sucio'];
    var label=st[0],eta=st[1],esListo=st[2];
    var imgEl=document.getElementById('img-rincon');
    var imgSrc=(depto.indexOf('RINCON')>=0&&imgEl)?imgEl.src:(info&&info.imagen_url||'');
    var color=esListo?'#2d6a3f':'#8B3A1A';
    var codHtml='';
    if(info&&info.codigo_entrada){
      codHtml='<div class="m-ac"><div class="ma"><div class="ma-l">Codigo de entrada</div><div class="ma-c">'+info.codigo_entrada.replace('#','<em>#</em>')+'</div></div><div class="ma"><div class="ma-l">WiFi</div><div class="ma-w">'+(info.wifi_nombre||'')+'</div><div class="ma-p">'+(info.wifi_password||'')+'</div></div></div>';
    }
    var faqsHtml=FAQS.map(function(f,i){
      return "<div class=\"m-faq\" onclick=\"this.classList.toggle('open')\"><span class=\"m-faq-num\">0"+(i+1)+"</span><div><div class=\"m-faq-q\">"+f[0]+"</div><div class=\"m-faq-ans\">"+f[1]+"</div></div></div>";
    }).join('');
    var stampHtml=imgSrc?'<div style="flex-shrink:0;margin-top:-8px"><div class="so-side"><img src="'+imgSrc+'" style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block" alt=""></div></div>':'';
    var complejo=(info&&info.complejo?info.complejo:'')+(info&&info.ubicacion?' - '+info.ubicacion:'');
    document.getElementById('main-content').innerHTML=
      '<div class="m-bp"><span>Boarding Pass</span><span>Vacation Rental Mexico</span></div>'+
      '<div class="m-sr"><div class="m-dot" style="background:'+color+'"></div><div class="m-sl" style="color:'+color+'">Estado del departamento</div></div>'+
      '<div style="display:flex;align-items:flex-start;gap:20px">'+
        '<div style="flex:1"><div class="m-sb'+(esListo?' listo':'')+'">'+label+'</div><div class="m-et">'+eta+'</div></div>'+
        stampHtml+
      '</div>'+
      '<hr class="m-rule">'+
      '<div class="m-dp">'+depto+'</div>'+
      '<div class="m-cx">'+complejo+'</div>'+
      codHtml+
      '<hr class="m-faq-rule">'+
      '<div class="m-faq-label">Preguntas frecuentes</div>'+
      '<div class="m-faqs">'+faqsHtml+'</div>'+
      '<div class="update-tag" id="utag">Actualiza automaticamente</div>';
    var tag=document.getElementById('utag');
    if(tag)tag.textContent='Actualizado - '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    setTimeout(cargar,30000);
  }).catch(function(){
    document.getElementById('main-content').innerHTML='<div class="loading">Error cargando</div>';
    setTimeout(cargar,10000);
  });
}
cargar();
</script>
</body>
</html>
