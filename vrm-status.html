<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VRM · Estado del departamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Cormorant Garamond',Georgia,serif;
  background:#0a0604;
  color:#e8dfd2;
  position:relative;
  perspective:1400px;
  perspective-origin:50% 40%;
}

/* ── FONDO ─────────────────────────────────────────── */
.bg-stage{
  position:fixed;inset:0;z-index:0;
  background:#0a0604;
  transition:background 1.8s ease;
}
body.sucio .bg-stage{
  background:
    radial-gradient(ellipse 80% 60% at 50% 35%, rgba(180,40,30,.28) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 35%, #1c0a06 0%, #080302 80%);
}
body.limpio .bg-stage{
  background:
    radial-gradient(ellipse 80% 60% at 50% 35%, rgba(40,140,80,.28) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 35%, #041a0f 0%, #02090a 80%);
}

.vignette{
  position:fixed;inset:0;z-index:4;pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.7) 100%);
}

.noise{
  position:fixed;inset:0;z-index:5;pointer-events:none;opacity:.06;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

.top-tag{
  position:fixed;top:28px;left:0;right:0;z-index:6;
  display:flex;justify-content:space-between;
  padding:0 28px;
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:3.5px;
  color:rgba(232,223,210,.45);
  text-transform:uppercase;
}

.stage{
  position:relative;z-index:3;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 24px;
  text-align:center;
}

/* ── CHAPA + ONDAS ────────────────────────────────── */
.chapa-wrap{
  position:relative;
  margin-bottom:38px;
  width:min(100vw,460px);
  height:min(100vw,460px);
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn 1.2s ease .2s both;
}

.waves-back{
  position:absolute;
  top:50%;left:50%;
  width:min(140vw,700px);height:min(140vw,700px);
  transform:translate(-50%,-50%) rotateX(68deg);
  pointer-events:none;
  z-index:1;
}
.waves-back canvas{width:100%;height:100%;display:block}

.waves-front{
  position:absolute;
  top:50%;left:50%;
  width:min(140vw,700px);height:min(140vw,700px);
  transform:translate(-50%,-50%) rotateX(68deg);
  pointer-events:none;
  z-index:5;
  clip-path:inset(50% 0 0 0);
}
.waves-front canvas{width:100%;height:100%;display:block}

.chapa-reflection{
  position:absolute;
  top:calc(50% + 100px);left:50%;
  width:180px;height:40px;
  transform:translate(-50%,0);
  border-radius:50%;
  filter:blur(20px);
  opacity:0;
  transition:background 1.8s ease,opacity 1.8s ease;
  z-index:0;
}
body.sucio .chapa-reflection{background:radial-gradient(ellipse,rgba(240,90,70,.65),transparent 70%);opacity:.75}
body.limpio .chapa-reflection{background:radial-gradient(ellipse,rgba(100,200,140,.65),transparent 70%);opacity:.75}

.chapa-glow{
  display:none;
}

@keyframes pulseGlow{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.75}
  50%{transform:translate(-50%,-50%) scale(1.1);opacity:.9}
}

.chapa-img-raw{
  position:relative;
  z-index:3;
  width:240px;
  height:auto;
  display:block;
  filter:drop-shadow(0 25px 40px rgba(0,0,0,.5)) drop-shadow(0 8px 15px rgba(0,0,0,.4));
  animation:floatChapa 6s ease-in-out infinite;
}

.chapa{
  position:relative;z-index:3;
  width:200px;height:240px;
  border-radius:50% / 45%;
  overflow:hidden;
  animation:floatChapa 6s ease-in-out infinite;
}

.chapa.has-image{
  display:none;
}

.chapa.has-image img{
  display:none;
}

.chapa:not(.has-image){
  background:linear-gradient(145deg,#d9b178 0%,#a0764a 45%,#6a4826 100%);
  box-shadow:
    0 0 0 3px rgba(70,45,25,.8),
    0 0 0 4px rgba(200,165,115,.6),
    0 0 0 5px rgba(70,45,25,.6),
    0 25px 60px rgba(0,0,0,.75),
    0 8px 20px rgba(0,0,0,.5),
    inset 0 2px 4px rgba(255,230,180,.5),
    inset 0 -4px 8px rgba(40,25,10,.5);
}

@keyframes floatChapa{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-4px)}
}

.chapa:not(.has-image)::before{
  content:'';
  position:absolute;
  top:3%;left:10%;right:10%;height:25%;
  border-radius:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.25) 0%,transparent 100%);
  z-index:3;
  pointer-events:none;
}

.chapa img{
  width:100%;height:100%;
  object-fit:contain;
  display:block;
  position:relative;
  z-index:1;
}

.chapa-fallback{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  font-family:'Playfair Display',Georgia,serif;
  font-style:italic;
  font-size:22px;
  color:#3d2817;
  text-align:center;
  line-height:1.1;
  padding:20px;
  text-shadow:0 1px 2px rgba(255,230,180,.3);
}

/* ── LABELS ───────────────────────────────────────── */
.dot-row{
  display:flex;align-items:center;gap:9px;
  margin-bottom:14px;
  animation:fadeIn 1.2s ease .5s both;
}
.dot{
  width:7px;height:7px;border-radius:50%;
  transition:background 1.8s ease,box-shadow 1.8s ease;
}
body.sucio .dot{background:#dc4637;box-shadow:0 0 12px rgba(220,70,55,.7)}
body.limpio .dot{background:#5ab47d;box-shadow:0 0 12px rgba(90,180,125,.7)}

.dot-label{
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:3.5px;
  color:rgba(232,223,210,.65);
  text-transform:uppercase;
}

.title{
  font-family:'Playfair Display',Georgia,serif;
  font-weight:400;font-style:italic;
  font-size:clamp(36px,9vw,48px);
  line-height:1;letter-spacing:-1.5px;
  margin-bottom:12px;
  transition:color 1.8s ease;
  padding:0 20px;
  text-shadow:0 2px 20px rgba(0,0,0,.3);
  animation:fadeIn 1.2s ease .7s both;
}
body.sucio .title{color:#f0c0ad}
body.limpio .title{color:#bce6c7}

.sub{
  font-size:15px;
  color:rgba(232,223,210,.55);
  font-style:italic;
  max-width:280px;
  line-height:1.45;
  margin-bottom:22px;
  animation:fadeIn 1.2s ease .9s both;
}

.depto{
  font-family:'Playfair Display',Georgia,serif;
  font-weight:600;
  font-size:18px;
  letter-spacing:1px;
  color:rgba(232,223,210,.85);
  margin-top:8px;
  animation:fadeIn 1.2s ease 1.1s both;
}

.cplx{
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:2.5px;
  color:rgba(232,223,210,.35);
  text-transform:uppercase;
  margin-top:4px;
  animation:fadeIn 1.2s ease 1.2s both;
}

.footer{
  position:fixed;bottom:20px;left:0;right:0;
  font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:2.5px;
  color:rgba(232,223,210,.3);
  text-transform:uppercase;
  text-align:center;
  z-index:6;
  animation:fadeIn 1.2s ease 1.4s both;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

.loading-state{
  display:flex;align-items:center;justify-content:center;
  height:100vh;
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:3px;
  color:rgba(232,223,210,.4);
}
</style>
</head>
<body class="sucio">

<div class="bg-stage"></div>
<div class="vignette"></div>
<div class="noise"></div>

<div class="top-tag">
  <span>Boarding Pass</span>
  <span>Vacation Rental Mexico</span>
</div>

<div class="stage" id="stage">
  <div class="loading-state" id="loading">Cargando...</div>
</div>

<div class="footer" id="footer"></div>

<script>
var SB_URL='https://grsykedeppdwenpfxlfh.supabase.co';
var SB_KEY='sb_publishable_H5I7SXxD2jqFbrgr4En6Cg_9lPzisnm';

function getDepto(){
  return (new URLSearchParams(location.search).get('depto')||'').toUpperCase().trim();
}

function sb(tabla, params){
  return fetch(SB_URL+'/rest/v1/'+tabla+'?'+params,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  }).then(function(r){return r.json();});
}

var ST={
  limpio:{label:'Listo para recibirte',sub:'Puedes pasar cuando quieras'},
  sucio:{label:'Preparándolo para ti',sub:'Listo aproximadamente entre las 2:00 y las 3:00 pm'}
};

var stageRendered=false;
var currentState='sucio';

function cargar(){
  var depto=getDepto();
  if(!depto){
    document.getElementById('stage').innerHTML='<div class="loading-state">URL inválida — falta ?depto=</div>';
    return;
  }
  
  Promise.all([
    sb('depto_info','depto_codigo=eq.'+encodeURIComponent(depto)+'&select=*'),
    sb('depto_status','depto_codigo=eq.'+encodeURIComponent(depto)+'&select=*')
  ]).then(function(res){
    var info=res[0]&&res[0][0];
    var statusRow=res[1]&&res[1][0];
    var key=(statusRow&&statusRow.status)||'sucio';
    if(key==='en_proceso') key='sucio';
    if(!ST[key]) key='sucio';
    
    currentState=key;
    document.body.className=key;
    
    var s=ST[key];
    var imgUrl=(info&&info.imagen_url)||'';
    var complejo=((info&&info.complejo)||'').trim();
    var ubicacion=((info&&info.ubicacion)||'').trim();
    var cplxText=complejo + (ubicacion ? ' · '+ubicacion : '');
    
    if(!stageRendered){
      document.getElementById('stage').innerHTML=
        '<div class="chapa-wrap">'+
          '<div class="waves-back"><canvas id="waterCanvasBack" width="700" height="700"></canvas></div>'+
          '<div class="chapa-reflection"></div>'+
          (imgUrl 
            ? '<img id="chapaImg" class="chapa-img-raw" src="'+imgUrl+'" alt="" crossorigin="anonymous">'
            : '<div class="chapa"><div class="chapa-fallback">'+depto.replace(/\s+/g,'<br>')+'</div></div>'
          )+
          '<div class="waves-front"><canvas id="waterCanvasFront" width="700" height="700"></canvas></div>'+
        '</div>'+
        '<div class="dot-row"><div class="dot"></div><div class="dot-label">Estado del departamento</div></div>'+
        '<div class="title" id="vrmTitle">'+s.label+'</div>'+
        '<div class="sub" id="vrmSub">'+s.sub+'</div>'+
        '<div class="depto">'+depto+'</div>'+
        (cplxText ? '<div class="cplx">'+cplxText+'</div>' : '');
      
      document.getElementById('footer').textContent='Actualizado · '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
      
      stageRendered=true;
      initCanvas();
    } else {
      document.getElementById('vrmTitle').textContent=s.label;
      document.getElementById('vrmSub').textContent=s.sub;
      document.getElementById('footer').textContent='Actualizado · '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    }
    
    setTimeout(cargar,30000);
  }).catch(function(e){
    console.warn('Error:',e);
    if(!stageRendered){
      document.getElementById('stage').innerHTML='<div class="loading-state">Error cargando</div>';
    }
    setTimeout(cargar,15000);
  });
}

function initCanvas(){
  var canvasBack=document.getElementById('waterCanvasBack');
  var canvasFront=document.getElementById('waterCanvasFront');
  if(!canvasBack||!canvasFront) return;
  var ctxBack=canvasBack.getContext('2d');
  var ctxFront=canvasFront.getContext('2d');
  var W=700, H=700;
  var cx=W/2, cy=H/2;
  var t=0;
  
  var ripples=[];
  var spawnInterval=1.25;
  var lifetime=5;
  var startR=50;
  var maxR=330;
  var lastSpawn=-spawnInterval;
  
  function spawn(){
    ripples.push({born:t, offsetAngle:Math.random()*Math.PI*2});
  }
  for(var k=0;k<4;k++){
    ripples.push({born:t - k*spawnInterval, offsetAngle:k*0.5});
  }
  
  function getColor(){
    return currentState==='sucio' ? '240,95,75' : '95,195,135';
  }
  
  function drawToCtx(ctx){
    ctx.clearRect(0,0,W,H);
    var colorStr=getColor();
    
    for(var i=0;i<ripples.length;i++){
      var r=ripples[i];
      var age=(t-r.born)/lifetime;
      if(age<0) continue;
      
      var easedAge=1-Math.pow(1-age,2.5);
      var baseRadius=startR + (maxR-startR)*easedAge;
      
      var opacity;
      if(age<0.08) opacity=age/0.08;
      else opacity=1-((age-0.08)/0.92);
      opacity=Math.max(0,opacity);
      
      var numLayers=7;
      var layerSpacing=6;
      
      for(var layer=0;layer<numLayers;layer++){
        var layerOffset=(layer-numLayers/2)*layerSpacing;
        var radius=baseRadius + layerOffset;
        var layerFade=1 - Math.abs(layer - numLayers/2)/(numLayers/2) * 0.6;
        
        var lineOpacity=opacity * layerFade * 0.6;
        var lineWidth=(1.5 - age*1.2) * layerFade;
        
        ctx.strokeStyle='rgba('+colorStr+','+lineOpacity+')';
        ctx.lineWidth=Math.max(0.3, lineWidth);
        ctx.shadowBlur=8;
        ctx.shadowColor='rgba('+colorStr+','+(lineOpacity*0.5)+')';
        
        ctx.beginPath();
        var segments=140;
        for(var j=0;j<=segments;j++){
          var angle=(j/segments)*Math.PI*2;
          var ampl=(1-age*0.5);
          
          var wave1=Math.sin(angle*3 + t*2.5 + r.offsetAngle*2 + layer*0.5)*7*ampl;
          var wave2=Math.sin(angle*5 - t*2 + r.offsetAngle + layer*0.3)*4*ampl;
          var wave3=Math.sin(angle*8 + t*3 + r.offsetAngle*3 + layer*0.7)*2.5*ampl;
          
          var rr=radius + wave1 + wave2 + wave3;
          
          var x=cx + Math.cos(angle)*rr;
          var y=cy + Math.sin(angle)*rr;
          
          if(j===0) ctx.moveTo(x,y);
          else ctx.lineTo(x,y);
        }
        ctx.closePath();
        ctx.stroke();
      }
    }
    ctx.shadowBlur=0;
  }
  
  function draw(){
    t+=1/60;
    if(t-lastSpawn>=spawnInterval){
      spawn();
      lastSpawn=t;
    }
    ripples=ripples.filter(function(r){return (t-r.born)<lifetime});
    drawToCtx(ctxBack);
    drawToCtx(ctxFront);
    requestAnimationFrame(draw);
  }
  draw();
}

cargar();
</script>
</body>
</html>
