<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VRM · Estado del departamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
html{overflow-x:hidden;overflow-y:auto}
body{
  font-family:'Cormorant Garamond',Georgia,serif;
  background:#0a0604;
  color:#e8dfd2;
  position:relative;
  perspective:1400px;
  perspective-origin:50% 40%;
  min-height:100vh;
  min-height:100dvh;
}

/* ── FONDO ─────────────────────────────────────────── */
.bg-stage{
  position:fixed;inset:0;z-index:0;
  background:#0a0604;
  transition:background 1.8s ease;
}
body.sucio .bg-stage{
  background:
    radial-gradient(ellipse 80% 60% at 50% 35%, rgba(180,40,30,.28) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 35%, #1c0a06 0%, #080302 80%);
}
body.limpio .bg-stage{
  background:
    radial-gradient(ellipse 80% 60% at 50% 35%, rgba(40,140,80,.28) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 35%, #041a0f 0%, #02090a 80%);
}

.vignette{
  position:fixed;inset:0;z-index:4;pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.7) 100%);
}

.noise{
  position:fixed;inset:0;z-index:5;pointer-events:none;opacity:.06;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

.top-tag{
  position:fixed;top:28px;left:0;right:0;z-index:6;
  display:flex;justify-content:space-between;
  padding:0 28px;
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:3.5px;
  color:rgba(232,223,210,.45);
  text-transform:uppercase;
}

.stage{
  position:relative;z-index:3;
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 24px 40px;
  text-align:center;
}

/* ── CHAPA + ONDAS ────────────────────────────────── */
.chapa-wrap{
  position:relative;
  margin-bottom:38px;
  width:min(100vw,460px);
  height:min(100vw,460px);
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn 1.2s ease .2s both;
}

.waves-back{
  position:absolute;
  top:50%;left:50%;
  width:min(140vw,700px);height:min(140vw,700px);
  transform:translate(-50%,-50%) rotateX(68deg);
  pointer-events:none;
  z-index:1;
}
.waves-back canvas{width:100%;height:100%;display:block}

.waves-front{
  position:absolute;
  top:50%;left:50%;
  width:min(140vw,700px);height:min(140vw,700px);
  transform:translate(-50%,-50%) rotateX(68deg);
  pointer-events:none;
  z-index:5;
  -webkit-mask-image:linear-gradient(to bottom, transparent 0%, transparent 46%, black 54%, black 100%);
  mask-image:linear-gradient(to bottom, transparent 0%, transparent 46%, black 54%, black 100%);
}
.waves-front canvas{width:100%;height:100%;display:block}

.chapa-reflection{
  position:absolute;
  top:calc(50% + 100px);left:50%;
  width:180px;height:40px;
  transform:translate(-50%,0);
  border-radius:50%;
  filter:blur(20px);
  opacity:0;
  transition:background 1.8s ease,opacity 1.8s ease;
  z-index:0;
}
body.sucio .chapa-reflection{background:radial-gradient(ellipse,rgba(240,90,70,.65),transparent 70%);opacity:.75}
body.limpio .chapa-reflection{background:radial-gradient(ellipse,rgba(100,200,140,.65),transparent 70%);opacity:.75}

.chapa-glow{
  display:none;
}

@keyframes pulseGlow{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.75}
  50%{transform:translate(-50%,-50%) scale(1.1);opacity:.9}
}

.chapa-img-raw{
  position:relative;
  z-index:3;
  width:240px;
  height:auto;
  display:block;
  filter:drop-shadow(0 25px 40px rgba(0,0,0,.5)) drop-shadow(0 8px 15px rgba(0,0,0,.4));
  animation:floatChapa 6s ease-in-out infinite;
}

.chapa{
  position:relative;z-index:3;
  width:200px;height:240px;
  border-radius:50% / 45%;
  overflow:hidden;
  animation:floatChapa 6s ease-in-out infinite;
}

.chapa.has-image{
  display:none;
}

.chapa.has-image img{
  display:none;
}

.chapa:not(.has-image){
  background:linear-gradient(145deg,#d9b178 0%,#a0764a 45%,#6a4826 100%);
  box-shadow:
    0 0 0 3px rgba(70,45,25,.8),
    0 0 0 4px rgba(200,165,115,.6),
    0 0 0 5px rgba(70,45,25,.6),
    0 25px 60px rgba(0,0,0,.75),
    0 8px 20px rgba(0,0,0,.5),
    inset 0 2px 4px rgba(255,230,180,.5),
    inset 0 -4px 8px rgba(40,25,10,.5);
}

@keyframes floatChapa{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-4px)}
}

.chapa:not(.has-image)::before{
  content:'';
  position:absolute;
  top:3%;left:10%;right:10%;height:25%;
  border-radius:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.25) 0%,transparent 100%);
  z-index:3;
  pointer-events:none;
}

.chapa img{
  width:100%;height:100%;
  object-fit:contain;
  display:block;
  position:relative;
  z-index:1;
}

.chapa-fallback{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  font-family:'Playfair Display',Georgia,serif;
  font-style:italic;
  font-size:22px;
  color:#3d2817;
  text-align:center;
  line-height:1.1;
  padding:20px;
  text-shadow:0 1px 2px rgba(255,230,180,.3);
}

/* ── LABELS ───────────────────────────────────────── */
.dot-row{
  display:flex;align-items:center;gap:9px;
  margin-bottom:14px;
  animation:fadeIn 1.2s ease .5s both;
}
.dot{
  width:7px;height:7px;border-radius:50%;
  transition:background 1.8s ease,box-shadow 1.8s ease;
}
body.sucio .dot{background:#dc4637;box-shadow:0 0 12px rgba(220,70,55,.7)}
body.limpio .dot{background:#5ab47d;box-shadow:0 0 12px rgba(90,180,125,.7)}

.dot-label{
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:3.5px;
  color:rgba(232,223,210,.65);
  text-transform:uppercase;
}

.title{
  font-family:'Playfair Display',Georgia,serif;
  font-weight:400;font-style:italic;
  font-size:clamp(36px,9vw,48px);
  line-height:1;letter-spacing:-1.5px;
  margin-bottom:12px;
  transition:color 1.8s ease;
  padding:0 20px;
  text-shadow:0 2px 20px rgba(0,0,0,.3);
  animation:fadeIn 1.2s ease .7s both;
}
body.sucio .title{color:#f0c0ad}
body.limpio .title{color:#bce6c7}

.sub{
  font-size:15px;
  color:rgba(232,223,210,.55);
  font-style:italic;
  max-width:280px;
  line-height:1.45;
  margin-bottom:22px;
  animation:fadeIn 1.2s ease .9s both;
}

.depto{
  font-family:'Playfair Display',Georgia,serif;
  font-weight:500;
  font-size:17px;
  letter-spacing:2px;
  color:rgba(232,223,210,.78);
  margin-top:14px;
  text-transform:uppercase;
  animation:fadeIn 1.2s ease 1.1s both;
}

/* ───── INFO BLOCK (acceso / horarios) ───── */
.info-block{
  margin:28px auto 0;
  max-width:340px;
  text-align:center;
  animation:fadeIn 1.2s ease 1.3s both;
}

/* Separadores dorados arriba y abajo (estilo elegante) */
.info-divider{
  display:flex;align-items:center;justify-content:center;
  gap:14px;
  margin:0 auto 18px;
  max-width:200px;
}
.info-divider-line{
  flex:1;height:1px;
  background:linear-gradient(90deg, transparent, rgba(232,223,210,.2), transparent);
}
.info-divider-dot{
  width:3px;height:3px;border-radius:50%;
  background:rgba(232,223,210,.35);
}
body.limpio .info-divider-dot{
  background:rgba(188,230,199,.55);
  box-shadow:0 0 8px rgba(188,230,199,.4);
}

/* CÓDIGO grande - sin caja, solo tipografía como protagonista */
.info-codigo-label{
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(232,223,210,.4);
  margin-bottom:16px;
}
.info-codigo{
  font-family:'Playfair Display',Georgia,serif;
  font-weight:400;
  font-size:54px;
  letter-spacing:14px;
  padding-left:14px; /* compensar letter-spacing del último caracter */
  color:#cdf2d4;
  line-height:1;
  text-shadow:0 0 28px rgba(143,200,160,.3);
  margin-bottom:14px;
  font-feature-settings:"lnum";
}
.info-codigo-hint{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:13px;
  color:rgba(232,223,210,.55);
  margin-bottom:18px;
}

/* Botón tutorial - minimalista, integrado al diseño */
.info-tutorial-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid rgba(232,223,210,.15);
  background:rgba(232,223,210,.03);
  color:rgba(232,223,210,.75);
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .25s ease;
}
.info-tutorial-btn:hover,.info-tutorial-btn:active{
  background:rgba(232,223,210,.07);
  border-color:rgba(232,223,210,.25);
  color:rgba(232,223,210,.95);
}

/* HORARIOS check-in / check-out */
.info-times{
  display:flex;align-items:center;justify-content:center;
  gap:32px;
}
.info-time-col{
  display:flex;flex-direction:column;align-items:center;
  min-width:90px;
}
.info-time-label{
  font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:2.5px;
  text-transform:uppercase;
  color:rgba(232,223,210,.4);
  margin-bottom:8px;
}
.info-time-val{
  font-family:'Playfair Display',Georgia,serif;
  font-weight:400;
  font-style:italic;
  font-size:22px;
  letter-spacing:.5px;
  color:rgba(232,223,210,.92);
}
.info-time-divider{
  width:1px;height:30px;
  background:linear-gradient(180deg, transparent, rgba(232,223,210,.18), transparent);
}

/* Texto descriptivo (concierge, etc) */
.info-text{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;
  line-height:1.6;
  color:rgba(232,223,210,.85);
  font-style:italic;
  max-width:280px;
  margin:0 auto;
}

/* ───── HELP BUTTON (minimal, no agresivo) ───── */
.help-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  margin:24px auto 28px;
  padding:13px 28px;
  border-radius:999px;
  background:rgba(232,223,210,.04);
  border:1px solid rgba(232,223,210,.14);
  color:rgba(232,223,210,.85);
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:2px;
  text-transform:uppercase;
  text-decoration:none;
  cursor:pointer;
  transition:all .25s ease;
  animation:fadeIn 1.2s ease 1.5s both;
}
.help-btn:hover,.help-btn:active{
  background:rgba(232,223,210,.08);
  border-color:rgba(232,223,210,.28);
  color:#fff;
}
.help-btn-icon{
  display:inline-flex;
  font-size:14px;
  opacity:.7;
}
.help-btn-wrap{
  display:flex;justify-content:center;
  margin-top:16px;
}

/* Mobile fine-tune */
@media (max-width:380px){
  .info-codigo{font-size:46px;letter-spacing:12px;padding-left:12px}
  .info-times{gap:22px}
  .info-time-val{font-size:19px}
}

/* ───── FAQ SECTION ───── */
.faq-section{
  margin-top:32px;
  padding-top:20px;
  padding-bottom:40px;
  max-width:340px;
  margin-left:auto;margin-right:auto;
  position:relative;z-index:6;
  animation:fadeIn 1.2s ease 1.5s both;
}
.faq-section::before{
  content:'';
  position:absolute;top:0;left:50%;
  transform:translateX(-50%);
  width:30px;height:1px;
  background:rgba(232,223,210,.2);
}
.faq-label{
  font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:2.5px;
  color:rgba(232,223,210,.35);
  text-align:center;margin-bottom:14px;
  text-transform:uppercase;
}
.faq-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:6px;
}
.faq-card{
  background:rgba(255,255,255,.025);
  border:1px solid rgba(232,223,210,.08);
  border-radius:8px;
  padding:10px 9px;
  cursor:pointer;
  transition:all .25s;
  text-align:left;
  min-height:62px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.faq-card:hover,.faq-card:active{
  background:rgba(255,255,255,.05);
  border-color:rgba(232,223,210,.18);
  transform:translateY(-1px);
}
.faq-card-num{
  font-family:'DM Mono',monospace;
  font-size:8px;
  color:rgba(232,223,210,.4);
  letter-spacing:1.5px;margin-bottom:5px;
}
.faq-card-q{
  font-family:'Cormorant Garamond',serif;
  font-size:11.5px;line-height:1.3;
  color:rgba(232,223,210,.85);
}

/* Modal */
.faq-modal{
  position:fixed;inset:0;
  background:rgba(10,3,2,.94);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  z-index:200;padding:30px;
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
.faq-modal.open{
  opacity:1;pointer-events:auto;
}
.faq-modal-content{
  max-width:340px;text-align:center;
  transform:translateY(12px);opacity:0;
  transition:all .4s;
}
.faq-modal.open .faq-modal-content{
  transform:translateY(0);opacity:1;
}
.faq-modal-num{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:3px;
  color:rgba(232,223,210,.4);
  margin-bottom:18px;
}
.faq-modal-q{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:22px;line-height:1.3;
  color:rgba(232,223,210,.95);
  margin-bottom:22px;
}
.faq-modal-a{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;line-height:1.55;
  color:rgba(232,223,210,.75);
}
.faq-modal-close{
  margin-top:30px;
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:2.5px;
  color:rgba(232,223,210,.5);
  cursor:pointer;padding:9px 18px;
  border:1px solid rgba(232,223,210,.2);
  border-radius:18px;
  display:inline-block;
  transition:all .2s;
}
.faq-modal-close:hover{
  color:rgba(232,223,210,.9);
  border-color:rgba(232,223,210,.45);
}

.footer{
  margin-top:20px;
  padding-bottom:30px;
  font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:2.5px;
  color:rgba(232,223,210,.3);
  text-transform:uppercase;
  text-align:center;
  z-index:6;
  animation:fadeIn 1.2s ease 1.4s both;
}

/* ─────────── MEDIA QUERIES ─────────── */
@media (max-width: 640px){
  .top-tag{
    padding:0 18px;
    font-size:8px;letter-spacing:2.5px;
    top:22px;
  }
  .stage{
    padding:72px 16px 30px;
    min-height:auto;
  }
  .chapa-wrap{
    margin-bottom:28px;
    width:min(85vw,320px);
    height:min(85vw,320px);
  }
  .waves-back,.waves-front{
    width:min(130vw,520px);
    height:min(130vw,520px);
  }
  .chapa-img-raw{
    width:min(55vw,200px);
  }
  .chapa{
    width:min(52vw,180px);
    height:min(62vw,216px);
  }
  .title{font-size:28px;letter-spacing:.5px}
  .sub{font-size:12px;max-width:300px;line-height:1.5;padding:0 12px}
  .depto{font-size:15px;letter-spacing:1.5px;margin-top:12px}
  .dot-row{margin-top:12px}
  
  .faq-section{
    margin-top:28px;
    max-width:100%;
    padding:20px 4px 30px;
  }
  .faq-grid{
    gap:7px;
  }
  .faq-card{
    padding:12px 10px;
    min-height:68px;
    border-radius:10px;
  }
  .faq-card-num{font-size:8.5px}
  .faq-card-q{font-size:12px;line-height:1.35}
  
  .faq-modal{padding:20px}
  .faq-modal-q{font-size:19px}
  .faq-modal-a{font-size:14.5px;line-height:1.6}
  
  .footer{
    margin-top:14px;
    padding-bottom:22px;
  }
}

@media (max-width: 380px){
  .title{font-size:24px}
  .chapa-wrap{
    width:min(80vw,280px);
    height:min(80vw,280px);
  }
  .faq-card{padding:10px 8px;min-height:62px}
  .faq-card-q{font-size:11px}
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

.loading-state{
  display:flex;align-items:center;justify-content:center;
  height:100vh;
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:3px;
  color:rgba(232,223,210,.4);
}
</style>
</head>
<body class="sucio">

<div class="bg-stage"></div>
<div class="vignette"></div>
<div class="noise"></div>

<div class="top-tag">
  <span>Boarding Pass</span>
  <span>Vacation Rental Mexico</span>
</div>

<div class="stage" id="stage">
  <div class="loading-state" id="loading">Cargando...</div>
</div>

<div class="footer" id="footer"></div>

<div class="faq-modal" id="faqModal" onclick="closeFaq(event)">
  <div class="faq-modal-content">
    <div class="faq-modal-num" id="modalNum">PREGUNTA 01</div>
    <div class="faq-modal-q" id="modalQ"></div>
    <div class="faq-modal-a" id="modalA"></div>
    <div class="faq-modal-close">Cerrar</div>
  </div>
</div>

<script>
var SB_URL='https://grsykedeppdwenpfxlfh.supabase.co';

// ───── FAQs globales ─────
var FAQS=[
  ["¿Puedo dejar mis maletas antes?","Si hay disponibilidad en el edificio, puedes dejarlas en la recepción. Escríbenos con anticipación para coordinarlo."],
  ["¿Cómo accedo al departamento?","Te enviaremos un mensaje con las instrucciones de acceso el día de tu llegada, incluyendo códigos y llaves."],
  ["¿Hay estacionamiento?","Sí, la mayoría cuenta con cajón de estacionamiento asignado dentro del edificio. Confirma con nosotros si es esencial."],
  ["¿Puedo salir más tarde?","Solicítanos una salida tardía con anticipación y la coordinamos según disponibilidad. Pronto podrás reservarla directamente desde aquí."],
  ["¿Tengo WiFi?","Sí, todos los departamentos cuentan con WiFi. La red y contraseña se incluyen en las instrucciones de llegada."],
  ["¿Acepta mascotas?","Solo algunos departamentos permiten mascotas. Si viajas con una, avísanos antes de reservar para confirmar."]
];

function renderFaqs(){
  var cards=FAQS.map(function(f,i){
    var num=String(i+1).padStart(2,'0');
    return '<div class="faq-card" onclick="openFaq('+i+')">'+
      '<div class="faq-card-num">'+num+'</div>'+
      '<div class="faq-card-q">'+f[0]+'</div>'+
    '</div>';
  }).join('');
  return '<div class="faq-section">'+
    '<div class="faq-label">Preguntas frecuentes</div>'+
    '<div class="faq-grid">'+cards+'</div>'+
  '</div>';
}

function openFaq(i){
  var num=String(i+1).padStart(2,'0');
  document.getElementById('modalNum').textContent='PREGUNTA '+num;
  document.getElementById('modalQ').textContent=FAQS[i][0];
  document.getElementById('modalA').textContent=FAQS[i][1];
  document.getElementById('faqModal').classList.add('open');
}

function closeFaq(e){
  if(e.target.id==='faqModal' || e.target.classList.contains('faq-modal-close')){
    document.getElementById('faqModal').classList.remove('open');
  }
}

// ───── Render bloque de info según estado ─────
function renderInfoBlock(depto, estado){
  var divider = '<div class="info-divider">'+
    '<div class="info-divider-line"></div>'+
    '<div class="info-divider-dot"></div>'+
    '<div class="info-divider-line"></div>'+
  '</div>';

  if(estado === 'limpio') {
    var cfg = DEPTO_CONFIG[depto];
    if(!cfg || !cfg.acceso) return ''; // sin config no inventamos código

    var ac = cfg.acceso;
    if(ac.tipo === 'cajita' && ac.codigo) {
      return '<div class="info-block">'+
        divider+
        '<div class="info-codigo-label">Tu código de acceso</div>'+
        '<div class="info-codigo">'+ac.codigo+'</div>'+
        '<div class="info-codigo-hint">en la cajita de llaves</div>'+
        '<button class="info-tutorial-btn" onclick="alert(\'Tutorial próximamente\')">'+
          '<span>›</span> Cómo abrir la cajita'+
        '</button>'+
      '</div>';
    }
    if(ac.tipo === 'concierge' && ac.texto) {
      return '<div class="info-block">'+
        divider+
        '<div class="info-codigo-label">Acceso</div>'+
        '<div class="info-text">'+ac.texto+'</div>'+
      '</div>';
    }
    return '';
  } else {
    // No listo: horarios
    return '<div class="info-block">'+
      divider+
      '<div class="info-times">'+
        '<div class="info-time-col">'+
          '<div class="info-time-label">Check-in</div>'+
          '<div class="info-time-val">3:00 pm</div>'+
        '</div>'+
        '<div class="info-time-divider"></div>'+
        '<div class="info-time-col">'+
          '<div class="info-time-label">Check-out</div>'+
          '<div class="info-time-val">11:00 am</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }
}

// ───── Botón ayuda WhatsApp (minimalista) ─────
function renderHelpButton(depto){
  var msg = encodeURIComponent('Hola '+SUPPORT_NOMBRE+', soy huésped de '+depto+' y necesito ayuda');
  var url = 'https://wa.me/'+SUPPORT_WHATSAPP+'?text='+msg;
  return '<div class="help-btn-wrap">'+
    '<a class="help-btn" href="'+url+'" target="_blank" rel="noopener">'+
      '<span class="help-btn-icon">›</span>'+
      '<span>Necesito ayuda</span>'+
    '</a>'+
  '</div>';
}
var SB_KEY='sb_publishable_H5I7SXxD2jqFbrgr4En6Cg_9lPzisnm';

// ───── Config de acceso por depto ─────
// Aquí defines el código/método de acceso de cada depto. Lo que NO esté aquí no muestra código.
var DEPTO_CONFIG = {
  "ZOHO": { numUnidad: "204", acceso: { tipo: "cajita", codigo: "9854" } },
  // Agrega más deptos aquí cuando los tengas listos:
  // "QUIYA 2403": { numUnidad: "2403", acceso: { tipo: "cajita", codigo: "1234" } },
  // "BVG 505":    { numUnidad: "505", acceso: { tipo: "concierge", texto: "Recoge la llave en recepción con tu nombre" } },
};

// WhatsApp para el botón "Necesito ayuda"
var SUPPORT_WHATSAPP = "5213222440051"; // sin + ni espacios
var SUPPORT_NOMBRE   = "Daniel";

function getDepto(){
  return (new URLSearchParams(location.search).get('depto')||'').toUpperCase().trim();
}

function sb(tabla, params){
  return fetch(SB_URL+'/rest/v1/'+tabla+'?'+params,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  }).then(function(r){return r.json();});
}

var ST={
  limpio:{label:'Listo para recibirte',sub:'Puedes pasar cuando quieras'},
  sucio:{label:'Preparándolo para ti',sub:'Listo aproximadamente entre las 2:00 y las 3:00 pm'}
};

var stageRendered=false;
var currentState='sucio';

function cargar(){
  var depto=getDepto();
  if(!depto){
    document.getElementById('stage').innerHTML='<div class="loading-state">URL inválida — falta ?depto=</div>';
    return;
  }
  
  Promise.all([
    sb('depto_info','depto_codigo=eq.'+encodeURIComponent(depto)+'&select=*'),
    sb('depto_status','depto_codigo=eq.'+encodeURIComponent(depto)+'&select=*')
  ]).then(function(res){
    var info=res[0]&&res[0][0];
    var statusRow=res[1]&&res[1][0];
    var key=(statusRow&&statusRow.status)||'sucio';
    if(key==='en_proceso') key='sucio';
    if(!ST[key]) key='sucio';
    
    currentState=key;
    document.body.className=key;
    
    var s=ST[key];
    var imgUrl=(info&&info.imagen_url)||'';
    // Cache-busting: agregar timestamp para forzar descarga fresca
    if (imgUrl && !imgUrl.includes('?')) imgUrl += '?t=' + Date.now();
    var complejo=((info&&info.complejo)||'').trim();
    var ubicacion=((info&&info.ubicacion)||'').trim();
    // Construir texto único depto + #unidad: "ZOHO · #204"
    var cfgDepto = DEPTO_CONFIG[depto] || {};
    var numUnidad = cfgDepto.numUnidad || (info && info.num_unidad) || '';
    var deptoLine = depto + (numUnidad ? ' · #' + numUnidad : '');
    
    if(!stageRendered){
      document.getElementById('stage').innerHTML=
        '<div class="chapa-wrap">'+
          '<div class="waves-back"><canvas id="waterCanvasBack" width="700" height="700"></canvas></div>'+
          '<div class="chapa-reflection"></div>'+
          (imgUrl 
            ? '<img id="chapaImg" class="chapa-img-raw" src="'+imgUrl+'" alt="" crossorigin="anonymous">'
            : '<div class="chapa"><div class="chapa-fallback">'+depto.replace(/\s+/g,'<br>')+'</div></div>'
          )+
          '<div class="waves-front"><canvas id="waterCanvasFront" width="700" height="700"></canvas></div>'+
        '</div>'+
        '<div class="dot-row"><div class="dot"></div><div class="dot-label">Estado del departamento</div></div>'+
        '<div class="title" id="vrmTitle">'+s.label+'</div>'+
        '<div class="sub" id="vrmSub">'+s.sub+'</div>'+
        '<div class="depto">'+deptoLine+'</div>'+
        '<div id="infoBlock">'+renderInfoBlock(depto, key)+'</div>'+
        renderFaqs()+
        renderHelpButton(depto);
      
      document.getElementById('footer').textContent='Actualizado · '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
      
      stageRendered=true;
      window.__lastState = key;
      initCanvas();
    } else {
      document.getElementById('vrmTitle').textContent=s.label;
      document.getElementById('vrmSub').textContent=s.sub;
      // Solo re-renderizar el infoBlock si cambió el estado (evita flicker cada 30s)
      if(window.__lastState !== key){
        var ib=document.getElementById('infoBlock');
        if(ib) ib.innerHTML=renderInfoBlock(depto, key);
        window.__lastState = key;
      }
      document.getElementById('footer').textContent='Actualizado · '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    }
    
    setTimeout(cargar,30000);
  }).catch(function(e){
    console.warn('Error:',e);
    if(!stageRendered){
      document.getElementById('stage').innerHTML='<div class="loading-state">Error cargando</div>';
    }
    setTimeout(cargar,15000);
  });
}

function initCanvas(){
  var canvasBack=document.getElementById('waterCanvasBack');
  var canvasFront=document.getElementById('waterCanvasFront');
  if(!canvasBack||!canvasFront) return;
  var ctxBack=canvasBack.getContext('2d');
  var ctxFront=canvasFront.getContext('2d');
  var W=700, H=700;
  var cx=W/2, cy=H/2;
  var t=0;
  
  var ripples=[];
  var spawnInterval=1.25;
  var lifetime=5;
  var startR=130;
  var maxR=340;
  var lastSpawn=-spawnInterval;
  
  function spawn(){
    ripples.push({born:t, offsetAngle:Math.random()*Math.PI*2});
  }
  for(var k=0;k<4;k++){
    ripples.push({born:t - k*spawnInterval, offsetAngle:k*0.5});
  }
  
  function getColor(){
    return currentState==='sucio' ? '255,110,85' : '110,210,150';
  }
  
  function drawToCtx(ctx){
    ctx.clearRect(0,0,W,H);
    var colorStr=getColor();
    
    for(var i=0;i<ripples.length;i++){
      var r=ripples[i];
      var age=(t-r.born)/lifetime;
      if(age<0) continue;
      
      var easedAge=1-Math.pow(1-age,2.5);
      var baseRadius=startR + (maxR-startR)*easedAge;
      
      var opacity;
      if(age<0.08) opacity=age/0.08;
      else opacity=1-((age-0.08)/0.92);
      opacity=Math.max(0,opacity);
      
      var numLayers=7;
      var layerSpacing=6;
      
      for(var layer=0;layer<numLayers;layer++){
        var layerOffset=(layer-numLayers/2)*layerSpacing;
        var radius=baseRadius + layerOffset;
        var layerFade=1 - Math.abs(layer - numLayers/2)/(numLayers/2) * 0.6;
        
        var lineOpacity=opacity * layerFade * 0.85;
        var lineWidth=(1.8 - age*1.2) * layerFade;
        
        ctx.strokeStyle='rgba('+colorStr+','+lineOpacity+')';
        ctx.lineWidth=Math.max(0.4, lineWidth);
        ctx.shadowBlur=12;
        ctx.shadowColor='rgba('+colorStr+','+(lineOpacity*0.7)+')';
        
        ctx.beginPath();
        var segments=140;
        for(var j=0;j<=segments;j++){
          var angle=(j/segments)*Math.PI*2;
          var ampl=(1-age*0.5);
          
          var wave1=Math.sin(angle*3 + t*2.5 + r.offsetAngle*2 + layer*0.5)*7*ampl;
          var wave2=Math.sin(angle*5 - t*2 + r.offsetAngle + layer*0.3)*4*ampl;
          var wave3=Math.sin(angle*8 + t*3 + r.offsetAngle*3 + layer*0.7)*2.5*ampl;
          
          var rr=radius + wave1 + wave2 + wave3;
          
          var x=cx + Math.cos(angle)*rr;
          var y=cy + Math.sin(angle)*rr;
          
          if(j===0) ctx.moveTo(x,y);
          else ctx.lineTo(x,y);
        }
        ctx.closePath();
        ctx.stroke();
      }
    }
    ctx.shadowBlur=0;
  }
  
  function draw(){
    t+=1/60;
    if(t-lastSpawn>=spawnInterval){
      spawn();
      lastSpawn=t;
    }
    ripples=ripples.filter(function(r){return (t-r.born)<lifetime});
    drawToCtx(ctxBack);
    drawToCtx(ctxFront);
    requestAnimationFrame(draw);
  }
  draw();
}

cargar();
</script>
