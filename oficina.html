<style>

  .modpanel{position:absolute;top:0;right:0;height:100%;width:344px;z-index:11;background:#fffaf1;border-left:1px solid var(--border);
    box-shadow:-18px 0 50px rgba(120,80,40,.28);transform:translateX(100%);transition:transform .32s cubic-bezier(.34,1.2,.5,1);display:flex;flex-direction:column;padding:24px}
  .modpanel.open{transform:translateX(0)}
  .modpanel .mhd{display:flex;align-items:center;gap:11px}
  .modpanel .mdot{width:11px;height:11px;border-radius:50%;box-shadow:0 0 10px currentColor;flex:0 0 auto}
  .modpanel h2{font-family:var(--font-display);font-size:23px;color:#2a2018}
  .modpanel .mkey{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin:6px 0 16px}

  .modpanel .open-portal{margin-top:14px;border:0;cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:13px;padding:11px;border-radius:11px;background:linear-gradient(160deg,var(--terra-soft),var(--terra));color:#fff}
  .modpanel .mnote{margin-top:auto;font-family:var(--font-mono);font-size:10.5px;color:var(--dim);line-height:1.5;border-top:1px solid var(--border);padding-top:14px}
  .modpanel .mclose{position:absolute;top:18px;right:18px;border:0;background:rgba(0,0,0,.05);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:14px;color:var(--muted)}

  .regwrap{flex:1;overflow-y:auto;margin:4px -6px 0;padding:0 6px}

  .rrow .rgu{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rrow .rr{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex:0 0 auto}
  .rrow .rt{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.04em;color:var(--dim);text-transform:uppercase}

  .rnote{font-family:var(--font-mono);font-size:11px;color:var(--dim);line-height:1.5;padding:14px 2px;text-align:center}

  .rmtxt{font-size:11.5px;color:var(--muted);line-height:1.5;background:rgba(255,255,255,.6);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .rmbtn{margin-top:8px;border:0;cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:12px;padding:9px 14px;border-radius:10px;background:linear-gradient(160deg,var(--terra-soft),var(--terra));color:#fff}

function makeWindow(){

  // cielo suave de día
  let g=x.createLinearGradient(0,0,0,Hc);g.addColorStop(0,'#a9bacb');g.addColorStop(.5,'#c8d4df');g.addColorStop(1,'#e6ebf0');
  x.fillStyle=g;x.fillRect(0,0,W,Hc);
  // halo de sol tenue
  const sg=x.createRadialGradient(W*0.82,58,4,W*0.82,58,165);sg.addColorStop(0,'rgba(255,251,236,.5)');sg.addColorStop(1,'rgba(255,251,236,0)');x.fillStyle=sg;x.fillRect(0,0,W,Hc);
  // rng estable
  let seed=7;const r=()=>{seed=(seed*9301+49297)%233280;return seed/233280;};
  const horizon=Hc-2;
  const layers=[
    {col:'#9aa7bb',win:null,                 min:55, max:120,gap:5},   // torres lejanas (bruma)
    {col:'#7a8599',win:'rgba(226,233,242,.5)',min:95, max:205,gap:7},   // medias
    {col:'#646f85',win:'rgba(236,242,248,.45)',min:60,max:150,gap:8},   // cercanas
  ];
  layers.forEach(L=>{let bx=-8;
    while(bx<W){const bw=26+r()*44, bh=L.min+r()*(L.max-L.min);
      x.fillStyle=L.col;x.fillRect(bx,horizon-bh,bw,bh);
      if(L.win){x.fillStyle=L.win;for(let wy=horizon-bh+9;wy<horizon-9;wy+=12)for(let wx=bx+5;wx<bx+bw-6;wx+=10){if(r()>0.4)x.fillRect(wx,wy,4,6);}}
      bx+=bw+L.gap+r()*8;}
  });
  const tex=new THREE.CanvasTexture(cv);tex.colorSpace=THREE.SRGBColorSpace;
  const g3=new THREE.Group();
  const glass=new THREE.Mesh(new THREE.PlaneGeometry(7,4),new THREE.MeshBasicMaterial({map:tex}));g3.add(glass);
  const fr=(w,h,y,xx)=>{const b=box(w,h,.15,M.trim);b.position.set(xx,y,.02);g3.add(b);};

  return g3;
}

let REGISTROS=[], REG_LOADED=false, REG_ERR=null;
async function loadRegistros(){
  const {url,key}=CONFIG.supabase; if(!url||!key){REG_ERR='nokey';return;}
  try{
    const hoy=new Date();const d1=new Date(hoy);d1.setDate(hoy.getDate()+6);
    const desde=hoy.toISOString().split('T')[0], hasta=d1.toISOString().split('T')[0];
    const fields='id,depto,nombre,fecha_entrada,fecha_salida,num_adultos,num_menores,pdf_generado,tipo_formato,frakcio_enviado,maritima_enviado,telefono,email';
    const H={apikey:key,Authorization:'Bearer '+key};
    const [res,resC]=await Promise.all([
      fetch(`${url}/rest/v1/registros_checkin?select=${fields}&fecha_entrada=gte.${desde}&fecha_entrada=lte.${hasta}&order=fecha_entrada.asc,created_at.desc`,{headers:H}),
      fetch(`${url}/rest/v1/correos_enviados?select=depto,fecha,enviado&fecha=gte.${desde}`,{headers:H}).catch(()=>null)
    ]);
    if(!res.ok)throw new Error('HTTP '+res.status);
    CORREOS=(resC&&resC.ok)?await resC.json():[];
    const rows=await res.json();
    REGISTROS=rows.map(r=>{r._tipo=(r.tipo_formato&&r.tipo_formato!=='general')?r.tipo_formato:getTipo(r.depto);r._depto=displayDepto(r.depto);r._enviado=esEnviado(r);r._noches=nochesEntre(r.fecha_entrada,r.fecha_salida);r._corta=(r._noches!=null&&r._noches<=1);return r;});
    REG_LOADED=true;REG_ERR=null;evaluarRegistros();
  }catch(e){REG_ERR=e.message;console.warn('registros',e);}
}
const _hoyStr=()=>new Date().toISOString().split('T')[0];
const _tomStr=()=>{const t=new Date();t.setDate(t.getDate()+1);return t.toISOString().split('T')[0];};

    const desde=hoy.toISOString().split('T')[0], hasta=d1.toISOString().split('T')[0];
    const res=await fetch(`${url}/rest/v1/reservas_ical?select=codigo,depto,fecha_entrada,fecha_salida,tel4,url&fecha_entrada=gte.${desde}&fecha_entrada=lte.${hasta}&order=fecha_entrada.asc`,{headers:{apikey:key,Authorization:'Bearer '+key}});

function normD(s){return (s||'').toUpperCase().replace(/\s+/g,' ').trim();}

  html+=`<div class="rmind"><div class="rmh">📨 Mensaje que se copia al abrir el chat</div><div class="rmtxt">${REMINDER_MSG}</div></div>`;

function playAnim(a,kind){
  if(!a.mixer||!a.clips.length||a._cur===kind)return;a._cur=kind;
  let clip;
  if(kind==='walk')clip=clipByName(a.clips,'walk','run','idle');
  else if(kind==='sit')clip=clipByName(a.clips,'sitdown','sit','idle');
  else clip=clipByName(a.clips,'idle','sitdown');
  if(!clip)return;
  a.mixer.stopAllAction();const act=a.mixer.clipAction(clip);
  if(kind==='sit'){act.setLoop(THREE.LoopOnce);act.clampWhenFinished=true;}else act.setLoop(THREE.LoopRepeat,Infinity);
  act.reset().play();
}

  const sc=p.escala||CONFIG.escala;model.scale.setScalar(sc);const sit=p.pose==='sit';
  const home=new THREE.Vector3(p.x,0,p.z+(sit?0.7:1.0));model.position.copy(home);
  model.rotation.y=p.recepcion?CONFIG.mirada-0.25:CONFIG.mirada;
  office.add(model);
  agents[p.id]={p,model,mixer,clips:clips||[],home,homeRot:model.rotation.y,formed:false,urgente:false,slot:null,target:null,faceOnArrive:0,arriveAnim:sit?'sit':'idle'};
  playAnim(agents[p.id],sit?'sit':'idle');
}

/* ── montaje ── */
buildRoom();renderLegend();renderDock();
CONFIG.equipo.forEach(p=>{
  if(p.mascota){/* sin estación */}
  else if(p.recepcion)buildReception(p);
  else if(p.pose==='stand'){const g=deskCore(p);g.position.set(p.x,0,p.z);office.add(g);buildCart(p);}
  else buildCubicle(p);
});
// campana de avisos
renderNotifs();
document.getElementById('bell').addEventListener('click',()=>document.getElementById('notifs').classList.toggle('open'));
loadRegistros(); // ← lee tus check-ins reales y pone al mono de Registros en su estado
loadReservas();  // ← lee reservas_ical (sync) para detectar llegadas sin registro

/* ── clic en archiveros → panel de módulo ── */
function openModule(key){const m=MODULES.find(x=>x.key===key);if(!m)return;
  const p=document.getElementById('modpanel');
  if(key==='registros'){
    p.innerHTML=`<button class="mclose" onclick="VRM.closeModule()">✕</button>
      <div class="mhd"><span class="mdot" style="color:${hex(m.color)}"></span><h2>Registros</h2></div>
      <div class="mkey">Agente · check-in digital</div>
      <div class="regwrap">${registrosPanelHTML()}</div>
      <div class="mnote">Lee tu tabla <b>registros_checkin</b> en vivo (de hoy en adelante, hasta +6 días). El tipo de envío se detecta por depa; generar/enviar automático (PDF, Frakcio, mensaje) se conecta en la siguiente capa.</div>`;
    document.getElementById('modalBg').classList.add('open');p.classList.add('open');
    if(!REG_LOADED&&REG_ERR!=='nokey'){loadRegistros().then(()=>{if(p.classList.contains('open'))openModule('registros');});}
    return;
  }
  p.innerHTML=`<button class="mclose" onclick="VRM.closeModule()">✕</button>
    <div class="mhd"><span class="mdot" style="color:${hex(m.color)}"></span><h2>${m.nombre}</h2></div>
    <div class="mkey">Módulo del portal · mod-${m.key}</div>
    <div class="mdesc">${m.desc}</div>
    ${m.rows().map(r=>`<div class="mstat"><span class="ml">${r[0]}</span><span class="mv">${r[1]}</span></div>`).join('')}
    <button class="open-portal" onclick="VRM.toast('Aquí se abrirá el módulo «${m.nombre}» del portal')">Abrir en el portal →</button>
    <div class="mnote">Vista previa · se conectará al módulo real (mod-${m.key}) de tu portal.</div>`;
  document.getElementById('modalBg').classList.add('open');p.classList.add('open');
}
function closeModule(){document.getElementById('modpanel').classList.remove('open');document.getElementById('modalBg').classList.remove('open');}
document.getElementById('modalBg').addEventListener('click',closeModule);

const raycaster=new THREE.Raycaster(),pointer=new THREE.Vector2();let downXY=null;
renderer.domElement.addEventListener('pointerdown',e=>{downXY=[e.clientX,e.clientY];});
renderer.domElement.addEventListener('pointerup',e=>{
  if(!downXY)return;const moved=Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1]);downXY=null;if(moved>6)return;
  const r=renderer.domElement.getBoundingClientRect();
  pointer.x=((e.clientX-r.left)/r.width)*2-1;pointer.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  const hits=raycaster.intersectObjects(clickableCabinets,true);
  if(hits.length){let o=hits[0].object;while(o&&o.userData.module===undefined)o=o.parent;if(o)openModule(o.userData.module);}
});
renderer.domElement.addEventListener('pointermove',e=>{
  const r=renderer.domElement.getBoundingClientRect();
  pointer.x=((e.clientX-r.left)/r.width)*2-1;pointer.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  renderer.domElement.style.cursor=raycaster.intersectObjects(clickableCabinets,true).length?'pointer':'';
});

let pending=CONFIG.equipo.length;const loader=new GLTFLoader();
CONFIG.equipo.forEach(p=>{loader.load(CONFIG.baseUrl+p.modelo,
  g=>{placeCharacter(p,g.scene,g.animations||[]);done();},
  undefined,
  e=>{console.warn('no cargó',p.modelo,e);placeCharacter(p,null,[]);done();});});
function done(){if(--pending<=0){hideBoot();evaluarRegistros();toast('Oficina lista · el mono se forma en Dirección si hay algo urgente');}}
function hideBoot(){const b=document.getElementById('boot');b.classList.add('hide');setTimeout(()=>b.remove(),650);}

/* ── loop / resize ── */
const clk=new THREE.Clock();
(function animate(){requestAnimationFrame(animate);const dt=clk.getDelta(),t=clk.elapsedTime;
  mixers.forEach(m=>m.update(dt));
  Object.values(agents).forEach(a=>{ if(!a.target)return; const m=a.model;
    const dx=a.target.x-m.position.x, dz=a.target.z-m.position.z, dist=Math.hypot(dx,dz);
    if(dist<0.06){m.position.x=a.target.x;m.position.z=a.target.z;m.rotation.y=a.faceOnArrive;a.target=null;playAnim(a,a.arriveAnim);}
    else{const step=Math.min(dist,3.4*dt);m.position.x+=dx/dist*step;m.position.z+=dz/dist*step;m.rotation.y=Math.atan2(dx,dz);}
  });
  CONFIG.equipo.forEach((p,i)=>{const m=monitors[p.id];if(m)m.emissiveIntensity=0.78+Math.sin(t*2+i)*0.16;});
  controls.update();renderer.render(scene,camera);labelRenderer.render(scene,camera);})();
addEventListener('resize',()=>{sizeCamera();renderer.setSize(innerWidth,innerHeight);labelRenderer.setSize(innerWidth,innerHeight);});
renderer.setSize(innerWidth,innerHeight);labelRenderer.setSize(innerWidth,innerHeight);
window.VRM={setEstado,STATE,renderDock,updateBoards,CONFIG,closeModule,openModule,toast,loadRegistros,loadReservas,nudge,copiarRecordatorio,get REGISTROS(){return REGISTROS;},get RESERVAS(){return RESERVAS;}};
</script>
</body>
</html>
