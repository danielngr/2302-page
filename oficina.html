function makeWindow(){
  const W=560,Hc=320,cv=document.createElement('canvas');cv.width=W;cv.height=Hc;const x=cv.getContext('2d');
  // cielo suave de día
  let g=x.createLinearGradient(0,0,0,Hc);g.addColorStop(0,'#a9bacb');g.addColorStop(.5,'#c8d4df');g.addColorStop(1,'#e6ebf0');
  x.fillStyle=g;x.fillRect(0,0,W,Hc);
  // halo de sol tenue
  const sg=x.createRadialGradient(W*0.82,58,4,W*0.82,58,165);sg.addColorStop(0,'rgba(255,251,236,.5)');sg.addColorStop(1,'rgba(255,251,236,0)');x.fillStyle=sg;x.fillRect(0,0,W,Hc);
  // rng estable
  let seed=7;const r=()=>{seed=(seed*9301+49297)%233280;return seed/233280;};
  const horizon=Hc-2;
  const layers=[
    {col:'#9aa7bb',win:null,                 min:55, max:120,gap:5},   // torres lejanas (bruma)
    {col:'#7a8599',win:'rgba(226,233,242,.5)',min:95, max:205,gap:7},   // medias
    {col:'#646f85',win:'rgba(236,242,248,.45)',min:60,max:150,gap:8},   // cercanas
  ];
  layers.forEach(L=>{let bx=-8;
    while(bx<W){const bw=26+r()*44, bh=L.min+r()*(L.max-L.min);
      x.fillStyle=L.col;x.fillRect(bx,horizon-bh,bw,bh);
      if(L.win){x.fillStyle=L.win;for(let wy=horizon-bh+9;wy<horizon-9;wy+=12)for(let wx=bx+5;wx<bx+bw-6;wx+=10){if(r()>0.4)x.fillRect(wx,wy,4,6);}}
      bx+=bw+L.gap+r()*8;}
  });
  const tex=new THREE.CanvasTexture(cv);tex.colorSpace=THREE.SRGBColorSpace;
  const g3=new THREE.Group();
  const glass=new THREE.Mesh(new THREE.PlaneGeometry(7,4),new THREE.MeshBasicMaterial({map:tex}));g3.add(glass);
  const fr=(w,h,y,xx)=>{const b=box(w,h,.15,M.trim);b.position.set(xx,y,.02);g3.add(b);};
  fr(7.4,.22,2.05,0);fr(7.4,.22,-2.05,0);const v1=box(.22,4,.15,M.trim);v1.position.set(-3.6,0,.02);const v2=v1.clone();v2.position.x=3.6;const v3=v1.clone();v3.position.x=0;g3.add(v1,v2,v3);
  return g3;
}

function getTipo(depto){let d=(depto||"").toUpperCase().trim();if(REG_ALIAS[d])d=REG_ALIAS[d];const k=Object.keys(TMPL).find(k=>d.startsWith(k));return k?TMPL[k].tipo:"general";}
function displayDepto(depto){const d=(depto||"").toUpperCase().trim();return REG_ALIAS[d]||(depto||"—");}

let CORREOS=[],FRQR=[],CFV=[];
function correoEnviado(r){const rd=(r.depto||'').toUpperCase().replace(/\s+/g,'');return CORREOS.some(c=>c.enviado&&c.fecha===r.fecha_entrada&&(()=>{const cd=(c.depto||'').toUpperCase().replace(/\s+/g,'');return cd&&(rd.includes(cd)||cd.includes(rd));})());}
function _dNear(a,b){if(!a||!b)return false;const da=new Date(String(a).slice(0,10)+'T00:00:00'),db=new Date(String(b).slice(0,10)+'T00:00:00');return Math.abs((da-db)/86400000)<=1;}
function _matchDF(arr,r,flag){const rd=(r.depto||'').toUpperCase().replace(/\s+/g,'');return arr.some(x=>{if(flag&&!x[flag])return false;if(!_dNear(x.fecha,r.fecha_entrada))return false;const xd=(x.depto||'').toUpperCase().replace(/\s+/g,'');return xd&&(rd.includes(xd)||xd.includes(rd));});}
function qrEnviado(r){return _matchDF(FRQR,r,'qr_enviado');}
function cfEnviado(r){return _matchDF(CFV,r,null);}
function esEnviado(r){if(esComunidad(r.depto))return cfEnviado(r)||!!r.pdf_generado;if(esFrakcioQR(r.depto))return qrEnviado(r)||!!r.frakcio_enviado||!!r.pdf_generado;if(r._tipo==='gforms')return !!r.maritima_enviado||!!r.pdf_generado;return !!r.pdf_generado||correoEnviado(r);}
function nochesEntre(a,b){if(!a||!b)return null;const d1=new Date(a+'T00:00:00'),d2=new Date(b+'T00:00:00');const n=Math.round((d2-d1)/86400000);return isNaN(n)?null:n;}

const FRAKCIO_DEPTOS=["ARIA 812","ARIA 906","ARIA 1001","ARIA PH 1001","ARIA 1010","ARIA 1013","ZANTAMAR","ZANTAMAR 109B","MARITIMA GOLF LW1","MARITIMA GOLF LW1B","MARITIMA GOLF 2M","MARITIMA GOLF 2L","MARITIMA GOLF 5R","BVG 505","BVG B-505","BVG 506","BVG B-506","BVG","BAY VIEW"];
function esComunidad(depto){return !!getComunidadProperty(depto);}
function esFrakcioQR(depto){const d=(depto||'').toUpperCase().trim();return FRAKCIO_DEPTOS.some(k=>d===k||d.includes(k)||k.includes(d));}
function esQR(depto){return esComunidad(depto)||esFrakcioQR(depto);}
function isoMX(fecha,hora){return `${fecha}T${hora}:00.000-06:00`;}
function _ocup(r){let o=r.ocupantes;if(typeof o==='string'){try{o=JSON.parse(o||'[]');}catch(e){o=[];}}return Array.isArray(o)?o:[];}
function findReservaUrl(depto,fecha){const d=normD(depto);const m=RESERVAS.find(r=>{const rd=normD(displayDepto(r.depto));return r.fecha_entrada===fecha&&(rd===d||rd.startsWith(d)||d.startsWith(rd));});return m?m.url:null;}

async function enviarQR(id){
  const r=REGISTROS.find(x=>String(x.id)===String(id)); if(!r){toast('No encontré el registro');return;}
  const depto=r.depto, fecha=r.fecha_entrada;
  const reservaUrl=findReservaUrl(displayDepto(depto),fecha);
  const {url,key}=CONFIG.supabase; const H={'content-type':'application/json',apikey:key,Authorization:'Bearer '+key};
  const ocup=_ocup(r);
  toast('Generando QR…');
  try{
    let qrUrl=null;
    if(esComunidad(depto)){
      const propertyId=getComunidadProperty(depto);
      const companion=ocup.slice(1).filter(o=>(o.nombre||'').trim()).map(o=>({name:o.nombre.trim()}));
      const input=[{guestType:"guest",name:r.nombre||depto,propertyId:String(propertyId),public:true,registeredAt:isoMX(fecha,"13:00"),estimatedLeavingDate:isoMX(r.fecha_salida||fecha,"11:00"),companionGuests:companion}];
      const fn=await fetch(`${url}/functions/v1/comunidad-visita`,{method:'POST',headers:H,body:JSON.stringify({input,depto,fecha})});
      const out=await fn.json(); if(out.error)throw new Error(out.error); qrUrl=out.qrUrl||out.invitationUrl;
    }else if(esFrakcioQR(depto)){
      const fn=await fetch(`${url}/functions/v1/frakcio-qr`,{method:'POST',headers:H,body:JSON.stringify({depto,fechaEntrada:fecha,fechaSalida:r.fecha_salida||fecha,nombre:r.nombre,adultos:r.num_adultos,menores:r.num_menores,ocupantes:ocup})});
      const out=await fn.json(); if(out.error)throw new Error(out.error);
      if(out.split&&out.urls){const txt=QR_MSG+'\n\n'+out.urls.filter(u=>u.url).map(u=>`${u.depto}: ${u.url}`).join('\n');copyTxt(txt);if(reservaUrl)window.open(reservaUrl,'_blank');toast('QR (2 grupos) copiado · pégalo en el chat');return;}
      qrUrl=out.qrUrl;
    }else{toast('Este depa no genera QR');return;}
    if(!qrUrl){toast('No obtuve la URL del QR — revisa el registro');return;}
    copyTxt(QR_MSG+'\n\n'+qrUrl);
    if(reservaUrl){window.open(reservaUrl,'_blank');toast('QR copiado · pégalo en el chat');}
    else toast('QR copiado · no encontré la reserva en Airbnb, ábrela manual');
  }catch(e){toast('❌ '+(e.message||e));}
}

let REGISTROS=[], REG_LOADED=false, REG_ERR=null;
async function loadRegistros(){
  const {url,key}=CONFIG.supabase; if(!url||!key){REG_ERR='nokey';return;}
  try{
    const hoy=new Date();const d1=new Date(hoy);d1.setDate(hoy.getDate()+6);
    const desde=hoy.toISOString().split('T')[0], hasta=d1.toISOString().split('T')[0];
    const fields='id,depto,nombre,fecha_entrada,fecha_salida,num_adultos,num_menores,ocupantes,pdf_generado,tipo_formato,frakcio_enviado,maritima_enviado,telefono,email';
    const H={apikey:key,Authorization:'Bearer '+key};
    const [res,resC,resF,resV]=await Promise.all([
      fetch(`${url}/rest/v1/registros_checkin?select=${fields}&fecha_entrada=gte.${desde}&fecha_entrada=lte.${hasta}&order=fecha_entrada.asc,created_at.desc`,{headers:H}),
      fetch(`${url}/rest/v1/correos_enviados?select=depto,fecha,enviado&fecha=gte.${desde}`,{headers:H}).catch(()=>null),
      fetch(`${url}/rest/v1/frakcio_qr?select=depto,fecha,qr_enviado&fecha=gte.${desde}`,{headers:H}).catch(()=>null),
      fetch(`${url}/rest/v1/comunidad_visitas?select=depto,fecha&fecha=gte.${desde}`,{headers:H}).catch(()=>null)
    ]);
    if(!res.ok)throw new Error('HTTP '+res.status);
    CORREOS=(resC&&resC.ok)?await resC.json():[];
    FRQR=(resF&&resF.ok)?await resF.json():[];
    CFV=(resV&&resV.ok)?await resV.json():[];
    const rows=await res.json();
    REGISTROS=rows.map(r=>{r._tipo=(r.tipo_formato&&r.tipo_formato!=='general')?r.tipo_formato:getTipo(r.depto);r._depto=displayDepto(r.depto);r._enviado=esEnviado(r);r._noches=nochesEntre(r.fecha_entrada,r.fecha_salida);r._corta=(r._noches!=null&&r._noches<=1);return r;});
    REG_LOADED=true;REG_ERR=null;evaluarRegistros();
  }catch(e){REG_ERR=e.message;console.warn('registros',e);}
}

function regStats(){let total=0,env=0,pendHoy=0,cortas=0,listos=0;const h=_hoyStr();REGISTROS.forEach(r=>{total++;if(r._enviado)env++;if(r._corta&&!r._enviado)cortas++;if(!r._enviado&&r.fecha_entrada<=h&&r._tipo!=='manual'&&!r._corta)pendHoy++;if(!r._enviado&&!r._corta&&(r._tipo==='pdf'||r._tipo==='correo'))listos++;});return{total,env,pend:total-env,pendHoy,cortas,listos};}
function evaluarRegistros(){
  if(REG_ERR||!REG_LOADED)return;const s=regStats();
  const srU = RES_LOADED ? sinRegistro().filter(r=>r.fecha_entrada<=_tomStr()) : [];
  NOTIFS=NOTIFS.filter(n=>n.id!=='reg-pend'&&n.id!=='reg-corta'&&n.id!=='reg-sinreg');
  if(s.pendHoy>0)ensureNotif({id:'reg-pend',persona:'registros',color:0xE0563E,titulo:'⚠ '+s.pendHoy+' registro(s) pendientes HOY',detalle:'Check-in de hoy sin enviar · emergencia (push)',accion:'Ver'});
  if(s.cortas>0)ensureNotif({id:'reg-corta',persona:'registros',color:0xE0A23E,titulo:s.cortas+' registro(s) de 1 noche',detalle:'Posible error de fecha del huésped · revisa en el portal',accion:'Ver'});
  if(srU.length)ensureNotif({id:'reg-sinreg',persona:'registros',color:0xE0A23E,titulo:srU.length+' huésped(es) sin registro',detalle:'Llegan hoy/mañana · recuérdales llenar el formulario',accion:'Ver'});
  if(s.pendHoy>0){setEstado('registros','aprobacion');formUp('registros',true);}
  else if(s.cortas>0||srU.length){setEstado('registros','aprobacion');formUp('registros',false);}
  else{setEstado('registros','trabajando');standDown('registros');}
  renderNotifs();
  if(document.getElementById('modpanel').classList.contains('open'))openModule('registros');
}
function fmtDia(s){const d=new Date(s+'T00:00:00');return d.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'});}
function regDe(depto,fecha){const d=normD(displayDepto(depto));return REGISTROS.find(x=>{const xd=normD(displayDepto(x.depto));return x.fecha_entrada===fecha&&(xd===d||xd.startsWith(d)||d.startsWith(xd));})||null;}
function entradasUnificadas(){
  const map=new Map();const key=(dep,f)=>normD(displayDepto(dep))+'|'+f;
  if(RES_LOADED)RESERVAS.forEach(res=>{map.set(key(res.depto,res.fecha_entrada),{depto:displayDepto(res.depto),fecha:res.fecha_entrada,tel4:res.tel4||'',url:res.url||'',reg:regDe(res.depto,res.fecha_entrada)});});
  REGISTROS.forEach(r=>{const k=key(r.depto,r.fecha_entrada);if(!map.has(k))map.set(k,{depto:r._depto,fecha:r.fecha_entrada,tel4:'',url:findReservaUrl(r._depto,r.fecha_entrada)||'',reg:r});});
  return [...map.values()];
}
function _rowU(e){
  const reg=e.reg;let badge,btn='';
  if(!reg){badge='<span class="rb sinreg">Sin registro</span>';btn=e.url?`<button class="lbtn" onclick="VRM.nudge('${e.url}')">Abrir chat ✈</button>`:'';}
  else if(reg._corta&&!reg._enviado){badge='<span class="rb warn">Revisar fecha</span>';btn=esQR(reg.depto)?`<button class="lbtn" onclick="VRM.enviarQR('${reg.id}')">QR ✈</button>`:'';}
  else if(reg._enviado){badge='<span class="rb ok">Enviado</span>';}
  else if(reg._tipo==='manual'){badge='<span class="rb man">Manual</span>';}
  else{badge='<span class="rb pend">Por enviar</span>';btn=esQR(reg.depto)?`<button class="lbtn" onclick="VRM.enviarQR('${reg.id}')">QR ✈</button>`:'';}
  const nombre=reg?(reg.nombre||'—'):`llega${e.tel4?` · …${e.tel4}`:''}`;
  const tipo=reg?`${TIPO_LABEL[reg._tipo]||reg._tipo}${reg._noches!=null?` · ${reg._noches}n`:''}`:'';
  return `<div class="rrow ${!reg?'sinr':''}"><div class="rl"><span class="rdep">${e.depto}</span><span class="rgu">${nombre}</span>${tipo?`<span class="rtipo">${tipo}</span>`:''}</div><div class="rr">${badge}${btn}</div></div>`;
}
function registrosPanelHTML(){
  if(REG_ERR==='nokey')return `<div class="rnote">Falta tu <b>SUPABASE_URL</b> y <b>anon key</b> en CONFIG.supabase.</div>`;
  if(REG_ERR)return `<div class="rnote" style="color:var(--red)">No pude leer Supabase: ${REG_ERR}. (Revisa RLS / la anon key.)</div>`;
  if(!REG_LOADED)return `<div class="rnote">Cargando check-ins…</div>`;
  const s=regStats();const h=_hoyStr();const tmStr=_tomStr();
  const ents=entradasUnificadas();
  const groups={};ents.forEach(e=>{(groups[e.fecha]=groups[e.fecha]||[]).push(e);});
  const dias=Object.keys(groups).sort();
  let html=`<div class="rsum"><span><b>${s.env}</b>/${s.total} enviados</span><span class="rpill ${s.pend?'on':''}">${s.pend} pendientes</span></div>`;
  if(!dias.length){html+=`<div class="rnote">Sin llegadas ni check-ins próximos.</div>`;}
  const ord=e=>{const r=e.reg;return (r&&(r._enviado||r._tipo==='manual'))?1:0;};
  dias.forEach(d=>{
    const lbl=d===h?'Hoy':d===tmStr?'Mañana':fmtDia(d);
    html+=`<div class="rday">${lbl}</div>`;
    groups[d].sort((a,b)=>ord(a)-ord(b)||a.depto.localeCompare(b.depto));
    groups[d].forEach(e=>{html+=_rowU(e);});
  });
  html+=`<div class="rmind"><div class="rmh">📨 Mensajes que se copian</div><div class="rmtxt"><b>Recordatorio:</b> ${REMINDER_MSG}</div><div class="rmtxt" style="margin-top:6px"><b>QR:</b> ${QR_MSG}</div></div>`;
  return html;
}
function cabinetPaper(name,color){
  const W=240,H=132,cv=document.createElement('canvas');cv.width=W;cv.height=H;const x=cv.getContext('2d');
  const tex=new THREE.CanvasTexture(cv);tex.colorSpace=THREE.SRGBColorSpace;tex.anisotropy=8;
  function d(){
    x.clearRect(0,0,W,H);
    x.fillStyle='rgba(40,25,10,.18)';rr(x,28,24,W-48,H-40,5);x.fill();        // sombra
    x.fillStyle='#fbf7ee';rr(x,24,18,W-48,H-40,4);x.fill();                    // papel
    x.strokeStyle='rgba(0,0,0,.08)';x.lineWidth=2;x.stroke();
    x.save();x.translate(W/2,20);x.rotate(-0.07);x.fillStyle='rgba(205,185,150,.5)';x.fillRect(-26,-9,52,18);x.restore(); // cinta
    x.fillStyle='#2a2018';x.font='600 29px "JetBrains Mono",monospace';x.textAlign='center';x.textBaseline='middle';x.fillText(name,W/2,H/2+7);
    const tw=x.measureText(name).width;x.fillStyle=hex(color);x.fillRect(W/2-tw/2,H/2+25,tw,3);
    tex.needsUpdate=true;
  }
  d();if(document.fonts)document.fonts.ready.then(d);
  return new THREE.Mesh(new THREE.PlaneGeometry(0.66,0.36),new THREE.MeshBasicMaterial({map:tex,transparent:true}));
}

  const tiles=6,step=S/tiles;x.strokeStyle='rgba(120,114,104,.22)';x.lineWidth=2.5;
  for(let i=1;i<tiles;i++){x.beginPath();x.moveTo(i*step,0);x.lineTo(i*step,S);x.moveTo(0,i*step);x.lineTo(S,i*step);x.stroke();}

function clipByName(clips,...names){for(const n of names){const c=clips.find(c=>new RegExp(n,'i').test(c.name));if(c)return c;}return clips[0];}
function playAnim(a,kind){
  if(!a.mixer||!a.clips.length||a._cur===kind)return;a._cur=kind;
  let clip;
  if(kind==='walk')clip=clipByName(a.clips,'walk','run','idle');
  else if(kind==='sit')clip=clipByName(a.clips,'sitdown','sit','idle');
  else clip=clipByName(a.clips,'idle','sitdown');
  if(!clip)return;
  a.mixer.stopAllAction();const act=a.mixer.clipAction(clip);
  if(kind==='sit'){act.setLoop(THREE.LoopOnce);act.clampWhenFinished=true;}else act.setLoop(THREE.LoopRepeat,Infinity);
  act.reset().play();
}

async function loadNomina(){

  const sem=nomGetSemana(); NOM.sem=sem;
  const f=`&fecha=gte.${sem.viernesISO}&fecha=lte.${sem.juevesISO}`;
  try{
    const get=async(path,label)=>{const r=await fetch(`${url}/rest/v1/${path}`,{headers:H});if(!r.ok){const t=await r.text();throw new Error(`${label}: ${r.status} ${t.slice(0,90)}`);}return r.json();};
    const [staff,limp,aj,ex]=await Promise.all([
      get(`staff_limpieza?select=id,nombre,nombre_completo,cuenta_bancaria,banco,es_fijo,monto_fijo&activo=eq.true&order=nombre.asc`,'staff_limpieza'),

      get(`nomina_ajustes?select=staff_id,monto&estatus=in.(pendiente,pagado)${f}`,'nomina_ajustes'),
      fetch(`${url}/rest/v1/dispersion_extras?semana_inicio=eq.${sem.viernesISO}&select=*`,{headers:H}).then(r=>r.ok?r.json():[])
    ]);
    const m={}; (limp||[]).forEach(l=>{m[l.staff_id]=(m[l.staff_id]||0)+parseFloat(l.tarifa_aplicada||0);});

async function nomPrepararArchivo(){
  NOM.file=null; NOM.fileErr=null;
  const setBtn=t=>{const b=document.getElementById('nomconfirm-btn');if(b)b.textContent=t;};
  setBtn('⏳ Preparando archivo…');
  try{
    const tpl='https://grsykedeppdwenpfxlfh.supabase.co/storage/v1/object/public/assets/macro%20(1)%20(2).xlsx%2001.04.26.xlsx';
    const res=await fetch(tpl);
    if(!res.ok) throw new Error('plantilla '+res.status+' (storage)');
    const buf=await res.arrayBuffer();
    const XLSX=await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs');
    const wb=XLSX.read(new Uint8Array(buf),{type:'array',cellFormula:true});
    const ws=wb.Sheets['Dispersion'];
    const st=c=>ws[c]?JSON.parse(JSON.stringify(ws[c])):{};
    const A2=st('A2'),B2=st('B2'),C2=st('C2'),D2=st('D2'),E2=st('E2');
    const range=XLSX.utils.decode_range(ws['!ref']||'A1:E100');
    for(let r=1;r<=range.e.r;r++)['A','B','C','D','E'].forEach(c=>delete ws[c+(r+1)]);
    NOM.personas.forEach((p,i)=>{const r=i+2;
      ws['A'+r]=Object.assign({},A2,{t:'s',v:String(p.cuenta),w:String(p.cuenta)});
      ws['B'+r]=Object.assign({},B2,{t:'s',v:p.banco||'',w:p.banco||''});
      ws['C'+r]=Object.assign({},C2,{t:'s',v:p.nombre,w:p.nombre});
      ws['D'+r]=Object.assign({},D2,{t:'n',v:p.monto,w:String(p.monto)});
      ws['E'+r]=Object.assign({},E2,{t:'s',v:'Transferencia ',w:'Transferencia '});
    });
    ws['!ref']=`A1:E${NOM.personas.length+1}`;
    wb.SheetNames=['Dispersion']; wb.Sheets={Dispersion:ws};
    const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const s=NOM.sem; const ff=d=>`${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getFullYear()).slice(2)}`;
    NOM.fname=`dispersion_${ff(s.viernes)}_${ff(s.jueves)}.xlsx`;
    NOM.blob=new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    NOM.file=new File([NOM.blob],NOM.fname,{type:NOM.blob.type});
    NOM.shareText=`Dispersión ${nomFmt(s.viernes)}–${nomFmt(s.jueves)} · ${nomMoney(NOM.total)}`;
    setBtn('✅ Confirmar y enviar por WhatsApp');
  }catch(e){ NOM.fileErr=e.message; setBtn('⚠️ Reintentar generar'); }
}

function openModule(key){const m=MODULES.find(x=>x.key===key);if(!m)return;
  const p=document.getElementById('modpanel');
  if(key==='registros'){
    p.innerHTML=`<button class="mclose" onclick="VRM.closeModule()">✕</button>
      <div class="mhd"><span class="mdot" style="color:${hex(m.color)}"></span><h2>Registros</h2></div>
      <div class="mkey">Agente · check-in digital</div>
      <div class="regwrap">${registrosPanelHTML()}</div>
      <div class="mnote">Lee tu tabla <b>registros_checkin</b> en vivo (de hoy en adelante, hasta +6 días). El tipo de envío se detecta por depa; generar/enviar automático (PDF, Frakcio, mensaje) se conecta en la siguiente capa.</div>`;
    document.getElementById('modalBg').classList.add('open');p.classList.add('open');
    if(!REG_LOADED&&REG_ERR!=='nokey'){loadRegistros().then(()=>{if(p.classList.contains('open'))openModule('registros');});}
    return;
  }
  if(key==='nomina'||key==='dispersion'){
    p.innerHTML=`<button class="mclose" onclick="VRM.closeModule()">✕</button>
      <div class="mhd"><span class="mdot" style="color:${hex(0x7C5CCB)}"></span><h2>Nómina</h2></div>
      <div class="mkey">Agente · dispersión semanal</div>
      <div class="regwrap">${nominaPanelHTML()}</div>
      <div class="mnote">Calcula la semana que se paga igual que tu generador. Al confirmar genera el Excel del banco (banco ya escrito, solo hoja Dispersion) y abre compartir para enviarlo por WhatsApp.</div>`;
    document.getElementById('modalBg').classList.add('open');p.classList.add('open');
    if(!NOM.loaded&&NOM.err!=='nokey'){loadNomina().then(()=>{if(p.classList.contains('open'))openModule('nomina');});}
    else if(NOM.loaded&&NOM.personas.length&&!NOM.file&&!NOM.fileErr){nomPrepararArchivo();}
    return;
  }
  p.innerHTML=`<button class="mclose" onclick="VRM.closeModule()">✕</button>
    <div class="mhd"><span class="mdot" style="color:${hex(m.color)}"></span><h2>${m.nombre}</h2></div>
    <div class="mkey">Módulo del portal · mod-${m.key}</div>
    <div class="mdesc">${m.desc}</div>
    ${m.rows().map(r=>`<div class="mstat"><span class="ml">${r[0]}</span><span class="mv">${r[1]}</span></div>`).join('')}
    <button class="open-portal" onclick="VRM.toast('Aquí se abrirá el módulo «${m.nombre}» del portal')">Abrir en el portal →</button>
    <div class="mnote">Vista previa · se conectará al módulo real (mod-${m.key}) de tu portal.</div>`;
  document.getElementById('modalBg').classList.add('open');p.classList.add('open');
}
function closeModule(){document.getElementById('modpanel').classList.remove('open');document.getElementById('modalBg').classList.remove('open');}
document.getElementById('modalBg').addEventListener('click',closeModule);

const raycaster=new THREE.Raycaster(),pointer=new THREE.Vector2();let downXY=null;
renderer.domElement.addEventListener('pointerdown',e=>{downXY=[e.clientX,e.clientY];});
renderer.domElement.addEventListener('pointerup',e=>{
  if(!downXY)return;const moved=Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1]);downXY=null;if(moved>6)return;
  const r=renderer.domElement.getBoundingClientRect();
  pointer.x=((e.clientX-r.left)/r.width)*2-1;pointer.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  const hits=raycaster.intersectObjects(clickableCabinets.concat(clickableAgents),true);
  if(hits.length){let o=hits[0].object;while(o&&o.userData.module===undefined)o=o.parent;if(o)openModule(o.userData.module);}
});
renderer.domElement.addEventListener('pointermove',e=>{
  const r=renderer.domElement.getBoundingClientRect();
  pointer.x=((e.clientX-r.left)/r.width)*2-1;pointer.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  renderer.domElement.style.cursor=raycaster.intersectObjects(clickableCabinets.concat(clickableAgents),true).length?'pointer':'';
});

let pending=CONFIG.equipo.length;const loader=new GLTFLoader();
CONFIG.equipo.forEach(p=>{loader.load(CONFIG.baseUrl+p.modelo,
  g=>{placeCharacter(p,g.scene,g.animations||[]);done();},
  undefined,
  e=>{console.warn('no cargó',p.modelo,e);placeCharacter(p,null,[]);done();});});
function done(){if(--pending<=0){hideBoot();evaluarRegistros();evaluarNomina();toast('Oficina lista · el mono se forma en Dirección si hay algo urgente');}}
function hideBoot(){const b=document.getElementById('boot');b.classList.add('hide');setTimeout(()=>b.remove(),650);}

/* ── loop / resize ── */
const clk=new THREE.Clock();
(function animate(){requestAnimationFrame(animate);const dt=clk.getDelta(),t=clk.elapsedTime;
  mixers.forEach(m=>m.update(dt));
  Object.values(agents).forEach(a=>{ if(!a.target)return; const m=a.model;
    const dx=a.target.x-m.position.x, dz=a.target.z-m.position.z, dist=Math.hypot(dx,dz);
    if(dist<0.06){m.position.x=a.target.x;m.position.z=a.target.z;m.rotation.y=a.faceOnArrive;a.target=null;playAnim(a,a.arriveAnim);}
    else{const step=Math.min(dist,3.4*dt);m.position.x+=dx/dist*step;m.position.z+=dz/dist*step;m.rotation.y=Math.atan2(dx,dz);}
  });
  CONFIG.equipo.forEach((p,i)=>{const m=monitors[p.id];if(m)m.emissiveIntensity=0.78+Math.sin(t*2+i)*0.16;});
  controls.update();renderer.render(scene,camera);labelRenderer.render(scene,camera);})();
addEventListener('resize',()=>{sizeCamera();renderer.setSize(innerWidth,innerHeight);labelRenderer.setSize(innerWidth,innerHeight);});
renderer.setSize(innerWidth,innerHeight);labelRenderer.setSize(innerWidth,innerHeight);
