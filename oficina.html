<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>VRM · Oficina Virtual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1410; --muted:#7c7468; --dim:#a89f90;
    --terra:#E07A3E; --terra-soft:#f0995f; --gold:#E0A23E;
    --green:#1FA968; --blue:#3E8FE0; --yellow:#E0A23E; --red:#E0563E;
    --glass:rgba(255,255,255,.72); --border:rgba(0,0,0,.08);
    --font-display:'Plus Jakarta Sans',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font-body);color:var(--ink);overflow:hidden;background:#f4ead9}
  #app{position:fixed;inset:0}
  #scene{position:absolute;inset:0}
  canvas{display:block}
  #labels{position:absolute;inset:0;pointer-events:none;overflow:hidden}

  .brand{position:absolute;top:24px;left:28px;z-index:6;pointer-events:none}
  .brand .mark{display:flex;align-items:center;gap:13px}
  .brand .crest{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;
    background:linear-gradient(150deg,var(--terra-soft),var(--terra) 55%,#b5571f);
    font-family:var(--font-display);font-weight:800;font-size:21px;color:#fff;
    box-shadow:0 8px 22px rgba(224,122,62,.45),inset 0 1px 0 rgba(255,255,255,.4)}
  .brand h1{font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:-.01em;line-height:1;color:#2a2018}
  .brand .sub{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--terra);margin-top:6px;font-weight:600}

  .legend{position:absolute;top:26px;right:26px;z-index:6;display:flex;flex-direction:column;gap:8px;
    background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:14px;padding:14px 16px;pointer-events:none;
    box-shadow:0 10px 30px rgba(120,80,40,.12)}
  .legend .row{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;font-weight:500}
  .legend .dot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 8px currentColor}

  .tag{transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;user-select:none}
  .tag .pill{display:flex;align-items:center;gap:8px;background:var(--glass);backdrop-filter:blur(8px);
    border:1px solid var(--border);border-radius:999px;padding:5px 12px;box-shadow:0 8px 20px rgba(120,80,40,.18)}
  .tag .name{font-family:var(--font-display);font-size:12.5px;font-weight:700;color:#2a2018}
  .tag .role{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.05em;color:var(--dim);text-transform:uppercase}
  .tag .sdot{width:7px;height:7px;border-radius:50%;box-shadow:0 0 8px currentColor;flex:0 0 auto}

  .approval{transform:translate(-50%,-100%);pointer-events:auto;width:216px;
    background:linear-gradient(168deg,#fffaf2,#fff1df);border:1px solid rgba(224,122,62,.4);border-radius:16px;
    box-shadow:0 22px 50px rgba(120,60,20,.3),0 0 0 4px rgba(224,122,62,.1);overflow:hidden;animation:floaty 3.6s ease-in-out infinite}
  @keyframes floaty{0%,100%{translate:0 0}50%{translate:0 -6px}}
  .approval::after{content:"";position:absolute;left:50%;bottom:-9px;translate:-50% 0;width:18px;height:18px;
    background:#fff1df;rotate:45deg;border-right:1px solid rgba(224,122,62,.4);border-bottom:1px solid rgba(224,122,62,.4)}
  .approval .hd{display:flex;align-items:center;gap:9px;padding:12px 14px 6px}
  .approval .ping{width:9px;height:9px;border-radius:50%;background:var(--terra);box-shadow:0 0 0 0 rgba(224,122,62,.6);animation:ping 1.7s ease-out infinite}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(224,122,62,.5)}100%{box-shadow:0 0 0 13px rgba(224,122,62,0)}}
  .approval .hd b{font-family:var(--font-display);font-size:13.5px;color:#b5571f}
  .approval .body{padding:0 14px 12px;font-size:12px;color:#8a6a4a;line-height:1.45}
  .approval .body .unit{font-weight:700;color:#2a2018}
  .approval .act{display:flex;gap:8px;padding:0 12px 13px}
  .approval button{flex:1;border:0;cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:12.5px;padding:9px 10px;border-radius:10px;transition:transform .12s,filter .2s}
  .approval button:active{transform:scale(.96)}
  .approval .ok{background:linear-gradient(160deg,var(--terra-soft),var(--terra));color:#fff;box-shadow:0 6px 16px rgba(224,122,62,.4)}
  .approval .ok:hover{filter:brightness(1.06)}
  .approval .no{background:rgba(0,0,0,.05);color:var(--muted)}
  .approval.gone{animation:poof .45s ease forwards}
  @keyframes poof{to{opacity:0;scale:.7;translate:0 -14px}}

  .dock{position:absolute;left:50%;bottom:24px;translate:-50% 0;z-index:6;display:flex;gap:12px;padding:14px;border-radius:20px;
    background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);box-shadow:0 24px 60px rgba(120,80,40,.2)}
  .stat{min-width:132px;padding:11px 17px;border-radius:14px;background:linear-gradient(165deg,rgba(255,255,255,.6),rgba(255,255,255,.2));border:1px solid rgba(0,0,0,.05)}
  .stat .k{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .stat .v{font-family:var(--font-display);font-weight:800;font-size:30px;line-height:1.05;margin-top:5px;color:#2a2018}
  .stat .v small{font-size:15px;color:var(--terra);font-weight:600}
  .stat .v.bump{animation:bump .5s ease}
  @keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.2)}100%{transform:scale(1)}}

  #boot{position:absolute;inset:0;z-index:9;display:grid;place-items:center;background:radial-gradient(110% 80% at 50% 20%,#fff4e6,#f4ead9);transition:opacity .6s}
  #boot .ring{width:46px;height:46px;border-radius:50%;border:3px solid rgba(224,122,62,.25);border-top-color:var(--terra);animation:spin 1s linear infinite}
  @keyframes spin{to{rotate:360deg}}
  #boot p{margin-top:16px;color:var(--muted);font-family:var(--font-mono);font-size:12px;letter-spacing:.06em}
  #boot.hide{opacity:0;pointer-events:none}
  .toast{position:absolute;left:50%;top:80px;translate:-50% 0;z-index:8;background:var(--glass);border:1px solid rgba(224,122,62,.3);
    color:#b5571f;font-family:var(--font-mono);font-size:12px;padding:9px 16px;border-radius:11px;backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(120,80,40,.18);max-width:440px;text-align:center;opacity:0;transition:opacity .4s;pointer-events:none}
  .toast.show{opacity:1}
  .hint{position:absolute;left:50%;bottom:112px;translate:-50% 0;z-index:5;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase;pointer-events:none}

  /* avisos */
  .bell{position:absolute;top:88px;left:28px;z-index:7;display:flex;align-items:center;gap:9px;cursor:pointer;
    background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:999px;padding:9px 15px;
    box-shadow:0 8px 22px rgba(120,80,40,.15);font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#5a5248;font-weight:600;transition:transform .12s}
  .bell:active{transform:scale(.97)}
  .bell .ico{font-size:14px;filter:grayscale(.1)}
  .bell .cnt{background:var(--terra);color:#fff;border-radius:999px;min-width:19px;height:19px;display:grid;place-items:center;font-size:10px;font-weight:700;padding:0 5px}
  .bell .cnt.zero{display:none}
  .notifs{position:absolute;top:134px;left:28px;z-index:7;width:286px;display:none;flex-direction:column;gap:8px;
    background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:16px;padding:12px;box-shadow:0 18px 44px rgba(120,80,40,.22)}
  .notifs.open{display:flex}
  .notifs .empty{font-family:var(--font-mono);font-size:11px;color:var(--dim);text-align:center;padding:12px}
  .nrow{display:flex;flex-direction:column;gap:5px;background:rgba(255,255,255,.55);border:1px solid var(--border);border-radius:12px;padding:10px 12px}
  .nrow .top{display:flex;align-items:center;gap:9px}
  .nrow .ndot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 8px currentColor}
  .nrow .ntit{font-family:var(--font-display);font-size:12.5px;font-weight:700;color:#2a2018}
  .nrow .ndet{font-family:var(--font-body);font-size:11px;color:var(--muted);margin-left:17px}
  .nrow .nact{align-self:flex-start;margin:3px 0 0 17px;border:0;cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:11.5px;padding:6px 13px;border-radius:9px;background:linear-gradient(160deg,var(--terra-soft),var(--terra));color:#fff;transition:transform .12s}
  .nrow .nact:active{transform:scale(.95)}
  .pend{width:14px;height:14px;border-radius:50%;background:var(--gold);transform:translate(-50%,-50%);box-shadow:0 0 0 0 rgba(224,162,62,.6);animation:ping2 1.7s ease-out infinite}
  @keyframes ping2{0%{box-shadow:0 0 0 0 rgba(224,162,62,.55)}100%{box-shadow:0 0 0 13px rgba(224,162,62,0)}}

  /* panel de módulo */
  .modal-bg{position:absolute;inset:0;z-index:10;background:rgba(40,25,10,.22);backdrop-filter:blur(2px);display:none}
  .modal-bg.open{display:block}
  .modpanel{position:absolute;top:0;right:0;height:100%;width:344px;z-index:11;background:#fffaf1;border-left:1px solid var(--border);
    box-shadow:-18px 0 50px rgba(120,80,40,.28);transform:translateX(100%);transition:transform .32s cubic-bezier(.34,1.2,.5,1);display:flex;flex-direction:column;padding:24px}
  .modpanel.open{transform:translateX(0)}
  .modpanel .mhd{display:flex;align-items:center;gap:11px}
  .modpanel .mdot{width:11px;height:11px;border-radius:50%;box-shadow:0 0 10px currentColor;flex:0 0 auto}
  .modpanel h2{font-family:var(--font-display);font-size:23px;color:#2a2018}
  .modpanel .mkey{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin:6px 0 16px}
  .modpanel .mdesc{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:18px}
  .modpanel .mstat{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;background:rgba(255,255,255,.6)}
  .modpanel .ml{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .modpanel .mv{font-family:var(--font-display);font-weight:800;font-size:22px;color:#2a2018}
  .modpanel .open-portal{margin-top:14px;border:0;cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:13px;padding:11px;border-radius:11px;background:linear-gradient(160deg,var(--terra-soft),var(--terra));color:#fff}
  .modpanel .mnote{margin-top:auto;font-family:var(--font-mono);font-size:10.5px;color:var(--dim);line-height:1.5;border-top:1px solid var(--border);padding-top:14px}
  .modpanel .mclose{position:absolute;top:18px;right:18px;border:0;background:rgba(0,0,0,.05);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:14px;color:var(--muted)}
</style>
</head>
<body>
<div id="app">
  <div id="scene"></div><div id="labels"></div>
  <div class="brand"><div class="mark"><div class="crest">V</div>
    <div><h1>Oficina Virtual</h1><div class="sub">Vacation Rental México</div></div></div></div>
  <button class="bell" id="bell"><span class="ico">🔔</span> Avisos <span class="cnt zero" id="bellCnt">0</span></button>
  <div class="notifs" id="notifs"></div>
  <div class="legend" id="legend"></div>
  <div class="hint">arrastra para girar · rueda para acercar</div>
  <div id="boot"><div style="text-align:center"><div class="ring"></div><p>Encendiendo la oficina…</p></div></div>
  <div class="toast" id="toast"></div>
  <div class="modal-bg" id="modalBg"></div>
  <div class="modpanel" id="modpanel"></div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { clone as cloneSkinned } from 'three/addons/utils/SkeletonUtils.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

/* ════════════════ CONFIG ════════════════ */
const CONFIG = {
  baseUrl: "https://pub-28277a6ce79d49479afd0cb1bba27b44.r2.dev/oficina/",
  escala: 1.2, asientoY: 0.0,
  mirada: Math.PI/4,   // hacia dónde miran (Math.PI/4 = hacia la cámara). Ajusta si salen de lado.

  estados: {
    trabajando:{color:0x1FA968,label:"Trabajando"},
    aprobacion:{color:0xE0A23E,label:"Pide tu OK"},
    esperando: {color:0x9a8f7e,label:"Esperando"},
    observando:{color:0x3E8FE0,label:"Observando"},
  },

  // modelo = archivo en R2 · acento = silla + franja del cubículo
  equipo: [
    { id:"rodrigo", nombre:"Rodrigo", rol:"Dirección",     x:-7.0, z:-4.5, estado:"observando", acento:0xE0A23E, pose:"sit", modelo:"OldClassy_Male.gltf" },
    { id:"josimar", nombre:"Josimar", rol:"Operaciones",   x:-1.0, z:-4.5, estado:"trabajando", acento:0x3E8FE0, pose:"sit", modelo:"Ninja_Male.gltf" },
    { id:"paulo",   nombre:"Paulo",   rol:"Mantenimiento", x:-7.0, z: 1.5, estado:"esperando",  acento:0xE07A3E, pose:"sit", modelo:"Zombie_Male.gltf" },
    { id:"daniel",  nombre:"Daniel",  rol:"Remoto · Italia",x:-1.0,z: 1.5, estado:"observando", acento:0x7C5CCB, pose:"sit", modelo:"Elf.gltf" },
    { id:"zayda",   nombre:"Zayda",   rol:"Recepción",     x: 6.5, z: 3.2, estado:"aprobacion", acento:0xE0A23E, pose:"sit", modelo:"Chef_Female.gltf", recepcion:true },
    { id:"daniela", nombre:"Daniela", rol:"Limpieza",      x: 6.5, z:-3.5, estado:"trabajando", acento:0x1FA968, pose:"stand", modelo:"Viking_Female.gltf" },
    { id:"lola",    nombre:"Lola",    rol:"Mascota VRM",   x:-6.5, z: 8.5, estado:"trabajando", acento:0xE07A3E, pose:"stand", modelo:"Cow.gltf", escala:1.0, mascota:true },
  ],
};

/* ════════════════ STATE  (← Supabase) ════════════════ */
const STATE = { checkins:5, checkouts:3, limpiezas:3, ocupacion:86, reportes:2, alertas:1 };
// ←SUPABASE: Object.assign(STATE, dataDesdeSupabase); renderDock(); updateBoards();

/* ════════════════════════════════════════ */
const EST = CONFIG.estados;
const hex = n => '#'+n.toString(16).padStart(6,'0');
const scene = new THREE.Scene();
const office = new THREE.Group();
scene.add(office);

/* cielo cálido de fondo */
(function sky(){
  const c=document.createElement('canvas');c.width=4;c.height=256;const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,256);
  g.addColorStop(0,'#ffd9a8');g.addColorStop(.45,'#ffeed6');g.addColorStop(1,'#f3e6d2');
  x.fillStyle=g;x.fillRect(0,0,4,256);
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;scene.background=t;
})();
scene.fog = new THREE.Fog(0xf3e6d2, 46, 80);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
document.getElementById('scene').appendChild(renderer.domElement);

const labelRenderer=new CSS2DRenderer();
labelRenderer.domElement.style.cssText="position:absolute;inset:0;pointer-events:none";
document.getElementById('labels').appendChild(labelRenderer.domElement);

/* cámara iso */
const FRUST=10; let camera=new THREE.OrthographicCamera(-FRUST,FRUST,FRUST,-FRUST,0.1,200);
camera.position.set(22,18,22);
function sizeCamera(){const a=innerWidth/innerHeight;camera.left=-FRUST*a;camera.right=FRUST*a;camera.top=FRUST;camera.bottom=-FRUST;camera.updateProjectionMatrix();}
sizeCamera();
const controls=new OrbitControls(camera,renderer.domElement);
controls.target.set(0,1.2,0); controls.enableDamping=true; controls.dampingFactor=.08;
controls.minPolarAngle=.55; controls.maxPolarAngle=1.12; controls.minZoom=.7; controls.maxZoom=2.4; controls.enablePan=false;
controls.minAzimuthAngle=-Math.PI/4-0.05; controls.maxAzimuthAngle=3*Math.PI/4+0.05;   // de frente a perfil, sin pasar a la espalda
controls.update();

/* luz de día cálida */
scene.add(new THREE.HemisphereLight(0xfff1dc,0xb59c80,1.05));
const sun=new THREE.DirectionalLight(0xfff0d6,1.9); sun.position.set(-12,18,6); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
Object.assign(sun.shadow.camera,{left:-22,right:22,top:22,bottom:-22,near:1,far:80}); sun.shadow.bias=-0.0004; scene.add(sun);
const fill=new THREE.DirectionalLight(0xbcd2ff,.35); fill.position.set(10,9,-8); scene.add(fill);

/* ── materiales (vivos) ── */
const M={
  floor:  new THREE.MeshStandardMaterial({color:0xd9b787,roughness:.85}),
  floorB: new THREE.MeshStandardMaterial({color:0xcaa974,roughness:.85}),
  wall:   new THREE.MeshStandardMaterial({color:0xf2e7d4,roughness:.95}),
  wallAccent:new THREE.MeshStandardMaterial({color:0x2f8f7e,roughness:.9}),
  trim:   new THREE.MeshStandardMaterial({color:0xE07A3E,roughness:.5,metalness:.2}),
  panel:  new THREE.MeshStandardMaterial({color:0xe7ddc9,roughness:.85}),
  desk:   new THREE.MeshStandardMaterial({color:0xdcb98a,roughness:.65}),
  deskLeg:new THREE.MeshStandardMaterial({color:0x8a7559,roughness:.6}),
  monitor:new THREE.MeshStandardMaterial({color:0x1b1b1b,roughness:.4}),
  counter:new THREE.MeshStandardMaterial({color:0xcaa06a,roughness:.7}),
  gold:   new THREE.MeshStandardMaterial({color:0xE0A23E,roughness:.4,metalness:.4}),
  leaf:   new THREE.MeshStandardMaterial({color:0x3aa564,roughness:.9}),
  leaf2:  new THREE.MeshStandardMaterial({color:0x2f8f7e,roughness:.9}),
  pot:    new THREE.MeshStandardMaterial({color:0xd9794a,roughness:.8}),
  sofa:   new THREE.MeshStandardMaterial({color:0xE07A3E,roughness:.85}),
  sofa2:  new THREE.MeshStandardMaterial({color:0x3E8FE0,roughness:.85}),
  wood:   new THREE.MeshStandardMaterial({color:0xb08654,roughness:.7}),
  lamp:   new THREE.MeshStandardMaterial({color:0xE0A23E,roughness:.4,metalness:.5,emissive:0xE0A23E,emissiveIntensity:.5}),
  white:  new THREE.MeshStandardMaterial({color:0xf4f0e8,roughness:.6}),
};
const box=(w,h,d,m)=>{const g=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);g.castShadow=g.receiveShadow=true;return g;};
const cyl=(r,h,m,seg=16)=>{const g=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,seg),m);g.castShadow=g.receiveShadow=true;return g;};
const accentMat=c=>new THREE.MeshStandardMaterial({color:c,roughness:.55});

/* ── pizarrones ── */
const boards=[];
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function makeBoard(title,rows,w,h){
  const cw=580,ch=Math.round(cw*h/w),cv=document.createElement('canvas');cv.width=cw;cv.height=ch;
  const x=cv.getContext('2d'),tex=new THREE.CanvasTexture(cv);tex.colorSpace=THREE.SRGBColorSpace;tex.anisotropy=8;
  function draw(){
    x.clearRect(0,0,cw,ch);rr(x,3,3,cw-6,ch-6,20);x.fillStyle='#fffaf1';x.fill();
    x.lineWidth=3;x.strokeStyle='rgba(224,122,62,.5)';x.stroke();x.textBaseline='alphabetic';
    x.fillStyle='#b5571f';x.font='600 27px "JetBrains Mono",monospace';x.fillText(title.toUpperCase(),38,60);
    x.fillStyle='rgba(224,122,62,.4)';x.fillRect(38,74,cw-76,2);let y=132;

    const mixer=new THREE.AnimationMixer(model);const want=(p.pose==='stand')?'Idle':(p.pose==='walk')?'Walk':'SitDown';
    const clip=clips.find(c=>c.name===want)||clips.find(c=>/idle/i.test(c.name))||clips[0];
    if(clip){const a=mixer.clipAction(clip);if(p.pose==='sit'){a.setLoop(THREE.LoopOnce);a.clampWhenFinished=true;}a.play();}mixers.push(mixer);
  }else{model=new THREE.Group();const b=new THREE.Mesh(new THREE.CapsuleGeometry(.28,.6,4,12),accentMat(p.acento));b.position.y=.7;b.castShadow=true;
    const h=new THREE.Mesh(new THREE.SphereGeometry(.26,16,12),M.white);h.position.y=1.3;h.castShadow=true;model.add(b,h);}
  model.scale.setScalar(p.escala||CONFIG.escala);const sit=p.pose==='sit';
  model.position.set(p.x,sit?CONFIG.asientoY:0,p.z+(sit?0.7:1.0));model.rotation.y=CONFIG.mirada;
  if(p.recepcion)model.rotation.y=CONFIG.mirada-0.25;office.add(model);}

/* ── montaje ── */
buildRoom();renderLegend();renderDock();
CONFIG.equipo.forEach(p=>{
  if(p.mascota){/* sin estación */}
  else if(p.recepcion)buildReception(p);
  else if(p.pose==='stand'){const g=deskCore(p);g.position.set(p.x,0,p.z);office.add(g);buildCart(p);}
  else buildCubicle(p);
  makeTag(p);
});
// puntos pulsantes + campana
NOTIFS.forEach(n=>{if(n.persona){const p=CONFIG.equipo.find(e=>e.id===n.persona);if(p)makePending(p);}});
renderNotifs();
document.getElementById('bell').addEventListener('click',()=>document.getElementById('notifs').classList.toggle('open'));

/* ── clic en archiveros → panel de módulo ── */
function openModule(key){const m=MODULES.find(x=>x.key===key);if(!m)return;
  const p=document.getElementById('modpanel');
  p.innerHTML=`<button class="mclose" onclick="VRM.closeModule()">✕</button>
    <div class="mhd"><span class="mdot" style="color:${hex(m.color)}"></span><h2>${m.nombre}</h2></div>
    <div class="mkey">Módulo del portal · mod-${m.key}</div>
    <div class="mdesc">${m.desc}</div>
    ${m.rows().map(r=>`<div class="mstat"><span class="ml">${r[0]}</span><span class="mv">${r[1]}</span></div>`).join('')}
    <button class="open-portal" onclick="VRM.toast('Aquí se abrirá el módulo «${m.nombre}» del portal')">Abrir en el portal →</button>
    <div class="mnote">Vista previa · se conectará al módulo real (mod-${m.key}) de tu portal.</div>`;
  document.getElementById('modalBg').classList.add('open');p.classList.add('open');
}
function closeModule(){document.getElementById('modpanel').classList.remove('open');document.getElementById('modalBg').classList.remove('open');}
document.getElementById('modalBg').addEventListener('click',closeModule);

const raycaster=new THREE.Raycaster(),pointer=new THREE.Vector2();let downXY=null;
renderer.domElement.addEventListener('pointerdown',e=>{downXY=[e.clientX,e.clientY];});
renderer.domElement.addEventListener('pointerup',e=>{
  if(!downXY)return;const moved=Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1]);downXY=null;if(moved>6)return;
  const r=renderer.domElement.getBoundingClientRect();
  pointer.x=((e.clientX-r.left)/r.width)*2-1;pointer.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  const hits=raycaster.intersectObjects(clickableCabinets,true);
  if(hits.length){let o=hits[0].object;while(o&&o.userData.module===undefined)o=o.parent;if(o)openModule(o.userData.module);}
});
renderer.domElement.addEventListener('pointermove',e=>{
  const r=renderer.domElement.getBoundingClientRect();
  pointer.x=((e.clientX-r.left)/r.width)*2-1;pointer.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  renderer.domElement.style.cursor=raycaster.intersectObjects(clickableCabinets,true).length?'pointer':'';
});

let pending=CONFIG.equipo.length;const loader=new GLTFLoader();
CONFIG.equipo.forEach(p=>{loader.load(CONFIG.baseUrl+p.modelo,
  g=>{placeCharacter(p,g.scene,g.animations||[]);done();},
  undefined,
  e=>{console.warn('no cargó',p.modelo,e);placeCharacter(p,null,[]);done();});});
function done(){if(--pending<=0){hideBoot();toast('Equipo cargado · abre Avisos para confirmar reservas');}}
function hideBoot(){const b=document.getElementById('boot');b.classList.add('hide');setTimeout(()=>b.remove(),650);}

/* ── loop / resize ── */
const clk=new THREE.Clock();
(function animate(){requestAnimationFrame(animate);const dt=clk.getDelta(),t=clk.elapsedTime;
  mixers.forEach(m=>m.update(dt));
  CONFIG.equipo.forEach((p,i)=>{const m=monitors[p.id];if(m)m.emissiveIntensity=0.78+Math.sin(t*2+i)*0.16;});
  controls.update();renderer.render(scene,camera);labelRenderer.render(scene,camera);})();
addEventListener('resize',()=>{sizeCamera();renderer.setSize(innerWidth,innerHeight);labelRenderer.setSize(innerWidth,innerHeight);});
renderer.setSize(innerWidth,innerHeight);labelRenderer.setSize(innerWidth,innerHeight);
window.VRM={setEstado,STATE,renderDock,updateBoards,CONFIG,closeModule,openModule,toast};
</script>
</body>
</html>
